<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 { font-size: 50px; }

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #e50914;
  border: none;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-size: 18px;
  display: none;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
  margin: auto;
}

.card {
  height: 190px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* ========================= */
/* CALENDARIO 🔥 MEJORADO */
/* ========================= */

.calendar-screen {
  position: fixed;
  inset: 0;
  background: #050507;
  display: none;
  z-index: 100;
  overflow-y: auto;
  padding: 20px;
}

.calendar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.calendar-header button {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
}

.month {
  margin-bottom: 40px;
  padding: 25px;
  border-radius: 20px;
}

.month-title {
  font-size: 28px;
  margin-bottom: 15px;
  font-weight: bold;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day {
  height: 90px;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.past {
  text-decoration: line-through;
  opacity: 0.4;
}

.today {
  background: #e50914;
  font-weight: bold;
  box-shadow: 0 0 20px #e50914;
  border: 2px solid white;
}

/* COLORES */
.jan { background: linear-gradient(135deg,#ff4e50,#f9d423); }
.feb { background: linear-gradient(135deg,#ff6a88,#ff99ac); }
.mar { background: linear-gradient(135deg,#ff9966,#ff5e62); }
.apr { background: linear-gradient(135deg,#f7971e,#ffd200); }
.may { background: linear-gradient(135deg,#f857a6,#ff5858); }

/* ========================= */
/* AJUSTES MEJORADOS */
/* ========================= */

.settings {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 50;
  overflow-y: auto; /* 🔥 FIX */
}

.settings::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

.settings-panel {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: #141414;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.4s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.settings.show .settings-panel {
  transform: translateX(0);
}

/* HEADER */
.settings-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.settings-header h2 {
  font-size: 22px;
}

.settings-header button {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
}

/* PERFIL */
.profile-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #333;
  background-size: cover;
  background-position: center;
  border: 2px solid white;
}

#usernameInput {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
}

.profile-box button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  background: #e50914;
  color: white;
}

/* AVATARES */
.avatar-category {
  font-size: 20px;
  margin-top: 20px;
}

.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.avatar-grid img {
  width: 100%;
  border-radius: 50%;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="menu">

    <div class="card" onclick="openCalendar()" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4')">
      <div class="overlay"></div>
      <div class="content">📅 Calendario</div>
    </div>

  </div>
</div>

<!-- CALENDARIO -->
<div class="calendar-screen" id="calendar">

  <div class="calendar-header">
    <button onclick="closeCalendar()">←</button>
    <h2>Calendario 2026</h2>
  </div>

  <div id="calendarContainer"></div>

</div>

<!-- AJUSTES -->
<div class="settings" id="settings">
  <div class="settings-panel">

    <div class="settings-header">
      <button onclick="toggleSettings()">←</button>
      <h2>Perfil</h2>
    </div>

    <div class="profile-box">
      <div class="avatar" id="avatar"></div>
      <input id="usernameInput">
      <button onclick="saveProfile(event)">Guardar</button>
    </div>

    <div class="avatar-category">🟥 Marvel</div>
    <div class="avatar-grid">
      <img src="https://image.tmdb.org/t/p/w200/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" onclick="setAvatar(this.src)">
    </div>

  </div>
</div>

<script>

/* INTRO */
window.onload = () => {
  document.getElementById("app").style.display = "block";

  setTimeout(() => {
    document.getElementById("intro").classList.add("hide");

    setTimeout(() => {
      document.getElementById("intro").style.display = "none";
      document.querySelector(".settings-btn").style.display = "block";
    }, 1200);

  }, 1500);

  generateCalendar();
};

/* CALENDARIO */
function openCalendar() {
  document.getElementById("calendar").style.display = "block";
}

function closeCalendar() {
  document.getElementById("calendar").style.display = "none";
}

function generateCalendar() {
  const container = document.getElementById("calendarContainer");
  const today = new Date();

  const months = ["Enero","Febrero","Marzo","Abril","Mayo"];

  months.forEach((m, i) => {

    let monthDiv = document.createElement("div");
    monthDiv.className = "month " + ["jan","feb","mar","apr","may"][i];

    let title = document.createElement("div");
    title.className = "month-title";
    title.textContent = m + " 2026";

    let daysDiv = document.createElement("div");
    daysDiv.className = "days";

    for(let d=1; d<=30; d++){
      let day = document.createElement("div");
      day.className = "day";

      let date = new Date(2026, i, d);

      if(date < today) day.classList.add("past");
      if(date.toDateString() === today.toDateString()) day.classList.add("today");

      day.textContent = d;
      daysDiv.appendChild(day);
    }

    monthDiv.appendChild(title);
    monthDiv.appendChild(daysDiv);
    container.appendChild(monthDiv);
  });
}

/* AJUSTES */
function toggleSettings() {
  const s = document.getElementById("settings");

  if (s.style.display === "block") {
    s.style.display = "none";
    s.classList.remove("show");
  } else {
    s.style.display = "block";
    setTimeout(() => s.classList.add("show"), 10);
  }
}

</script>

</body>
</html>
