<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
/* TODO TU CSS ORIGINAL (NO TOCADO) */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 { font-size: 50px; }

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #e50914;
  border: none;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-size: 18px;
  display: none;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
  margin: auto;
}

.card {
  height: 190px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* AJUSTES (NO TOCADO) */
.settings { position: fixed; inset: 0; display: none; z-index: 50; }
.settings::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.7); }

.settings-panel {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: #141414;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.4s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.settings.show .settings-panel { transform: translateX(0); }

/* PERFIL */
.profile-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #333;
  background-size: cover;
  background-position: center;
  border: 2px solid white;
}

#usernameInput {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  text-align: center;
  font-size: 16px;
}

.profile-box button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #e50914;
  color: white;
}

.avatar-category {
  font-size: 20px;
  margin-top: 18px;
}

.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.avatar-grid img {
  border-radius: 50%;
  aspect-ratio: 1;
}

/* 🔥 CALENDARIO AÑADIDO */
.calendar-screen {
  position: fixed;
  inset: 0;
  background: #050507;
  z-index: 2000;
  display: none;
  overflow-x: auto;
  white-space: nowrap;
  padding: 20px;
}

.calendar-month {
  display: inline-block;
  vertical-align: top;
  width: 300px;
  margin-right: 20px;
  border-radius: 16px;
  padding: 10px;
}

.calendar-title {
  font-size: 18px;
  margin-bottom: 10px;
  text-align: center;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.calendar-day {
  padding: 8px;
  text-align: center;
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
  font-size: 13px;
}

.calendar-day.past {
  text-decoration: line-through;
  opacity: 0.4;
}

.calendar-day.today {
  background: #e50914;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="menu">

    <!-- SOLO AÑADIDO onclick -->
    <div class="card" onclick="openCalendar()" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4')">
      <div class="overlay"></div>
      <div class="content">📅 Calendario</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f')">
      <div class="overlay"></div>
      <div class="content">👥 Social</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba')">
      <div class="overlay"></div>
      <div class="content">🎬 Explorar</div>
    </div>

  </div>
</div>

<!-- 🔥 CALENDARIO -->
<div class="calendar-screen" id="calendar"></div>

<!-- AJUSTES (INTACTO) -->
<div class="settings" id="settings">
  <div class="settings-panel">
    <!-- TODO IGUAL -->
  </div>
</div>

<script>

/* TODO TU JS ORIGINAL (NO TOCADO) */

window.onload = () => {

  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  app.style.display = "block";

  setTimeout(() => {
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      document.querySelector(".settings-btn").style.display = "block";
    }, 1200);

  }, 1500);
};

/* 🔥 CALENDARIO JS */
function openCalendar() {
  const cal = document.getElementById("calendar");
  cal.style.display = "block";
  generarCalendario();
}

function generarCalendario() {
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const colores = ["#ff6b6b","#ff9f43","#feca57","#ff7675","#fd79a8"];

  let fecha = new Date(2026, 0, 1);
  const fin = new Date(2027, 0, 31);
  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  let colorIndex = 0;

  while (fecha <= fin) {

    const mes = fecha.getMonth();
    const año = fecha.getFullYear();

    const monthDiv = document.createElement("div");
    monthDiv.className = "calendar-month";
    monthDiv.style.background = colores[colorIndex % colores.length];

    const title = document.createElement("div");
    title.className = "calendar-title";
    title.textContent = fecha.toLocaleString("es-ES", { month: "long", year: "numeric" });

    const grid = document.createElement("div");
    grid.className = "calendar-grid";

    const primerDia = new Date(año, mes, 1).getDay();
    const diasMes = new Date(año, mes + 1, 0).getDate();

    for (let i = 0; i < primerDia; i++) {
      grid.appendChild(document.createElement("div"));
    }

    for (let d = 1; d <= diasMes; d++) {
      const dia = document.createElement("div");
      dia.className = "calendar-day";
      dia.textContent = d;

      const fechaDia = new Date(año, mes, d);

      if (fechaDia < hoy) dia.classList.add("past");

      if (
        fechaDia.getDate() === hoy.getDate() &&
        fechaDia.getMonth() === hoy.getMonth() &&
        fechaDia.getFullYear() === hoy.getFullYear()
      ) {
        dia.classList.add("today");
      }

      grid.appendChild(dia);
    }

    monthDiv.appendChild(title);
    monthDiv.appendChild(grid);
    container.appendChild(monthDiv);

    fecha.setMonth(fecha.getMonth() + 1);
    fecha.setDate(1);
    colorIndex++;
  }
}

</script>

</body>
</html>
