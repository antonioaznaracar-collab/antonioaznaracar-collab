<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
:root {
  --bg: #060608;
  --card: rgba(255,255,255,0.06);
  --accent: #e50914;
  --text: #fff;
  --muted: #aaa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* =====================
   INTRO / TELÓN
===================== */
.curtain {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  z-index: 10;
}

.curtain::before,
.curtain::after {
  content: "";
  position: absolute;
  width: 50%;
  height: 100%;
  background: linear-gradient(to right, #000, #1a1a1a);
  transition: 1.5s cubic-bezier(0.77, 0, 0.175, 1);
}

.curtain::before { left: 0; }
.curtain::after { right: 0; }

/* abrir telón */
.open::before { transform: translateX(-100%); }
.open::after { transform: translateX(100%); }

/* LOGO */
.logo {
  font-size: 55px;
  font-weight: bold;
  letter-spacing: 3px;
  opacity: 0;
  animation: logoIn 1.5s ease forwards;
}

@keyframes logoIn {
  0% { opacity: 0; transform: scale(1.3); filter: blur(8px); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

/* loader */
.loader {
  margin-top: 15px;
  font-size: 14px;
  color: var(--muted);
  opacity: 0;
  animation: fadeLoader 2s ease forwards;
  animation-delay: 1s;
}

@keyframes fadeLoader {
  to { opacity: 1; }
}

/* =====================
   APP
===================== */
.app {
  display: none;
  padding: 20px;
  animation: fadeApp 1s ease;
}

@keyframes fadeApp {
  from { opacity: 0; transform: scale(1.05); }
  to { opacity: 1; transform: scale(1); }
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 25px;
}

.header h1 {
  font-size: 28px;
}

/* GRID MENÚ */
.menu {
  display: grid;
  gap: 15px;
}

.item {
  background: var(--card);
  padding: 22px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(10px);
}

.item:hover {
  background: var(--accent);
  transform: translateY(-5px) scale(1.02);
}

.item h2 {
  margin-bottom: 5px;
}

.item p {
  font-size: 13px;
  color: var(--muted);
}

/* contenido */
#content {
  margin-top: 25px;
  text-align: center;
  color: var(--muted);
}

/* RESPONSIVE */
@media(min-width: 768px) {
  .menu {
    grid-template-columns: repeat(3, 1fr);
    max-width: 900px;
    margin: auto;
  }
}
</style>
</head>

<body>

<!-- ===== INTRO ===== -->
<div class="curtain" id="curtain">
  <div>
    <div class="logo">🎬 CineMach</div>
    <div class="loader">Cargando experiencia...</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="app">

  <div class="header">
    <h1>🎬 CineMach</h1>
  </div>

  <div class="menu">

    <div class="item" onclick="openSection('calendario')">
      <h2>📅 Calendario</h2>
      <p>Organiza y planea películas</p>
    </div>

    <div class="item" onclick="openSection('social')">
      <h2>👥 Social</h2>
      <p>Grupos con amigos</p>
    </div>

    <div class="item" onclick="openSection('explorar')">
      <h2>🎬 Explorar</h2>
      <p>Descubre nuevas películas</p>
    </div>

  </div>

  <div id="content"></div>

</div>

<script>
/* ===== INTRO CONTROLADA ===== */
window.onload = () => {

  setTimeout(() => {
    document.getElementById("curtain").classList.add("open");

    setTimeout(() => {
      document.getElementById("curtain").style.display = "none";
      document.getElementById("app").style.display = "block";
    }, 1600);

  }, 3000); // ⬅️ TIEMPO DE “CARGA”
};

/* ===== NAVEGACIÓN ===== */
function openSection(sec) {
  const c = document.getElementById("content");

  if (sec === "calendario") {
    c.innerHTML = "<h3>📅 Calendario</h3><p>Próximamente planes de cine reales.</p>";
  }

  if (sec === "social") {
    c.innerHTML = "<h3>👥 Social</h3><p>Grupos y votaciones entre amigos.</p>";
  }

  if (sec === "explorar") {
    c.innerHTML = "<h3>🎬 Explorar</h3><p>Descubre películas como en Netflix.</p>";
  }
}
</script>

</body>
</html>
