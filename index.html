<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NARCOS: Tiñi Games</title>
    <style>
        :root { --brightness: 100%; --accent: #39ff14; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; filter: brightness(var(--brightness)); overflow: hidden; }

        /* --- EFECTO DISPATCH (SOMBRA Y LUZ) --- */
        .vignette { position: fixed; width: 100%; height: 100%; box-shadow: inset 0 0 200px rgba(0,0,0,0.9); z-index: 1; pointer-events: none; }

        /* --- FONDOS DINÁMICOS POR CAPÍTULO --- */
        #bg-container { position: fixed; width: 100%; height: 100%; background-size: cover; background-position: center; transition: 2s ease-in-out; z-index: 0; }
        
        /* --- INTRO TIÑI GAMES --- */
        #intro { position: fixed; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; }
        .flash { position: absolute; width: 100%; height: 100%; opacity: 0; animation: sirenas 0.15s infinite; }
        @keyframes sirenas { 0% { background: rgba(255,0,0,0.1); opacity:1; } 50% { background: rgba(0,0,255,0.1); opacity:1; } 100% { opacity:0; } }
        #logo-tiñi { color: #fff; font-size: 3rem; letter-spacing: 10px; opacity: 0; transform: translateY(20px); transition: 2s; }

        /* --- MENÚ PRINCIPAL --- */
        #menu { position: relative; z-index: 2; height: 100%; display: none; flex-direction: column; justify-content: flex-end; padding: 0 0 80px 80px; box-sizing: border-box; }
        .logo-juego { font-size: 5rem; color: #fff; margin-bottom: 40px; text-transform: uppercase; font-weight: 900; letter-spacing: -2px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        button { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2); padding: 12px 40px; width: 300px; text-align: left; font-size: 1rem; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: rgba(255,255,255,0.2); color: #fff; border-color: #fff; padding-left: 55px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- PANEL DE AJUSTES MEJORADO --- */
        #settings-panel { display: none; position: fixed; top: 0; right: 0; width: 400px; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; padding: 60px 40px; box-sizing: border-box; border-left: 1px solid var(--accent); color: #fff; }
        .setting-item { margin-bottom: 30px; }
        label { display: block; margin-bottom: 10px; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        select { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div id="bg-container"></div>

    <!-- Intro -->
    <div id="intro">
        <div class="flash"></div>
        <h1 id="logo-tiñi">TIÑI GAMES</h1>
    </div>

    <!-- Menú -->
    <div id="menu">
        <div class="logo-juego" id="txt-titulo">NARCOS</div>
        <div class="btn-group">
            <button onclick="nuevaPartida()" id="btn-nueva">Nueva Partida</button>
            <button onclick="continuar()" id="btn-continuar" disabled>Continuar</button>
            <button onclick="toggleSettings(true)" id="btn-ajustes">Ajustes</button>
        </div>
    </div>

    <!-- Ajustes -->
    <div id="settings-panel">
        <h2 id="st-tit">AJUSTES</h2>
        <div class="setting-item">
            <label id="st-bri">BRILLO</label>
            <input type="range" min="40" max="130" value="100" oninput="cambiarBrillo(this.value)">
        </div>
        <div class="setting-item">
            <label id="st-idi">IDIOMA</label>
            <select onchange="cambiarIdioma(this.value)">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
            </select>
        </div>
        <button onclick="toggleSettings(false)" style="width: 100%; text-align: center;">VOLVER</button>
    </div>

    <script>
        const langData = {
            es: { titulo: "NARCOS", nueva: "Nueva Partida", continuar: "Continuar", ajustes: "Ajustes", st_tit: "CONFIGURACIÓN", st_bri: "BRILLO", st_idi: "IDIOMA" },
            en: { titulo: "NARCOS", nueva: "New Game", continuar: "Continue", ajustes: "Settings", st_tit: "SETTINGS", st_bri: "BRIGHTNESS", st_idi: "LANGUAGE" },
            fr: { titulo: "NARCOS", nueva: "Nouvelle Partie", continuar: "Continuer", ajustes: "Paramètres", st_tit: "PARAMÈTRES", st_bri: "LUMINOSITÉ", st_idi: "LANGUE" },
            de: { titulo: "NARCOS", nueva: "Neues Spiel", continuar: "Weiter", ajustes: "Einstellungen", st_tit: "EINSTELLUNGEN", st_bri: "HELLIGKEIT", st_idi: "SPRACHE" }
        };

        // Imágenes para los capítulos (puedes cambiarlas por otras URLs)
        const fondosCapitulos = {
            0: "https://giphy.com", // Capítulo 1: Caravana
            1: "https://wallpaperaccess.com", // Capítulo 2: Laboratorio
            2: "https://wallpapercave.com"  // Ejemplo Capítulo 3
        };

        window.onload = () => {
            // Animación Intro
            setTimeout(() => { document.getElementById('logo-tiñi').style.opacity = '1'; }, 500);
            setTimeout(() => { 
                document.getElementById('intro').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
                actualizarFondo();
                comprobarPartida();
            }, 4000);
        };

        function actualizarFondo() {
            let cap = localStorage.getItem('narcos_capitulo') || 0;
            document.getElementById('bg-container').style.backgroundImage = `url('${fondosCapitulos[cap]}')`;
        }

        function nuevaPartida() {
            localStorage.setItem('narcos_capitulo', 0);
            alert("Capítulo 1: La Caravana - Iniciado");
            comprobarPartida();
            actualizarFondo();
        }

        function comprobarPartida() {
            if(localStorage.getItem('narcos_capitulo')) {
                document.getElementById('btn-continuar').disabled = false;
            }
        }

        function toggleSettings(show) {
            document.getElementById('settings-panel').style.display = show ? 'block' : 'none';
        }

        function cambiarBrillo(v) { document.documentElement.style.setProperty('--brightness', v + '%'); }

        function cambiarIdioma(l) {
            let d = langData[l];
            document.getElementById('txt-titulo').innerText = d.titulo;
            document.getElementById('btn-nueva').innerText = d.nueva;
            document.getElementById('btn-continuar').innerText = d.continuar;
            document.getElementById('btn-ajustes').innerText = d.ajustes;
            document.getElementById('st-tit').innerText = d.st_tit;
            document.getElementById('st-bri').innerText = d.st_bri;
            document.getElementById('st-idi').innerText = d.st_idi;
        }
    </script>
</body>
</html>
