<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARCOS: DISPATCH | PRESTIGE v24.0</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #d4ff00; 
            --accent-low: rgba(212, 255, 0, 0.15);
            --bg: #050607; 
            --terminal-green: #15ff00;
        }

        * { box-sizing: border-box; cursor: crosshair; transition: 0.15s cubic-bezier(0.23, 1, 0.32, 1); }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; font-family: 'JetBrains Mono', monospace;
            overflow: hidden; user-select: none;
        }

        /* --- POST-PROCESADO CINEMÁTICO (EFECTOS DE LENTE) --- */
        .fx-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }
        .vignette { background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 120%); }
        .crt-grain { opacity: 0.05; background: url('https://giphy.com'); }
        .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%); background-size: 100% 3px; }

        /* --- INTRO & FULLSCREEN PROTOCOL --- */
        #boot-screen {
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-main {
            font-family: 'Oswald'; font-size: 6rem; letter-spacing: 25px;
            text-shadow: 0 0 30px var(--accent-low); animation: pulse 2s infinite;
        }

        /* --- INTERFAZ PRINCIPAL ESTILO "DASHBOARD" --- */
        #game-interface { display: none; padding: 40px; height: 100vh; grid-template-columns: 350px 1fr 300px; gap: 20px; }
        
        .side-panel { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
        }

        .nav-btn {
            background: none; border: 1px solid transparent; color: #555;
            padding: 15px; text-align: left; font-weight: 800; font-size: 0.9rem;
            letter-spacing: 3px; cursor: pointer; text-transform: uppercase;
        }
        .nav-btn:hover { color: var(--accent); border-left: 4px solid var(--accent); background: var(--accent-low); }
        .nav-btn.active { color: white; border-left: 4px solid var(--accent); }

        /* --- TERMINAL DE LOGS (ESTILO DISPATCH) --- */
        .terminal-box {
            background: #000; border: 1px solid #111; height: 100%;
            padding: 20px; font-size: 0.75rem; overflow-y: hidden;
            box-shadow: inset 0 0 20px rgba(0,255,0,0.05); color: var(--terminal-green);
        }
        .log-entry { margin-bottom: 8px; border-left: 2px solid #111; padding-left: 10px; opacity: 0.8; }

        /* --- STATS DINÁMICOS --- */
        .stat-card { background: #0a0a0a; padding: 15px; border-bottom: 2px solid var(--accent); }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
    </style>
</head>
<body>

    <div class="fx-layer vignette"></div>
    <div class="fx-layer crt-grain"></div>
    <div class="fx-layer scanlines"></div>

    <!-- PANTALLA DE ENTRADA -->
    <div id="boot-screen" onclick="launchGame()">
        <div class="logo-main">NARCOS</div>
        <div style="letter-spacing: 8px; color: var(--accent); font-weight: 300;">[ CLICK_TO_AUTHORIZE_ACCESS ]</div>
    </div>

    <!-- INTERFAZ DE JUEGO (REFORMADA) -->
    <div id="game-interface">
        
        <!-- PANEL IZQUIERDO: NAVEGACIÓN -->
        <aside class="side-panel">
            <div style="margin-bottom: 40px;">
                <h2 style="margin:0; font-family: 'Oswald'; letter-spacing: 2px;">SISTEMA_DISPATCH</h2>
                <small style="color: #444;">V.24.0 FINAL PRESTIGE</small>
            </div>
            <nav style="display: flex; flex-direction: column; gap: 10px;">
                <button class="nav-btn active" onclick="changeTab('map')">CENTRO_MANDO</button>
                <button class="nav-btn" onclick="changeTab('ops')">OPERACIONES_CAP_1</button>
                <button class="nav-btn" onclick="changeTab('fin')">LAVADO_ACTIVOS</button>
                <button class="nav-btn" onclick="toggleSettings()">ENCRIPTACIÓN_AJUSTES</button>
            </nav>
        </aside>

        <!-- PANEL CENTRAL: TERMINAL DE OPERACIONES -->
        <main class="terminal-box" id="main-terminal">
            <div class="log-entry">[ SYSTEM ] ESTABLECIENDO CONEXIÓN CON SATELITE...</div>
            <div class="log-entry">[ INFO ] OBJETIVO: WALTER W. / LOCALIZACIÓN: ALBUQUERQUE</div>
            <div class="log-entry" style="color: var(--accent)">> ESPERANDO ÓRDENES DEL DESPACHO_</div>
        </main>

        <!-- PANEL DERECHO: ESTADO DEL CARTEL -->
        <aside class="side-panel">
            <div class="stat-card">
                <small>EFECTIVO_NETO</small>
                <div class="stat-val">$0.00</div>
            </div>
            <div class="stat-card">
                <small>PUREZA_PRODUCTO</small>
                <div class="stat-val">0%</div>
            </div>
            <div class="stat-card" style="border-bottom-color: #ff0044;">
                <small>NOTORIEDAD_DEA</small>
                <div class="stat-val">Baja</div>
            </div>
        </aside>
    </div>

    <script>
        function launchGame() {
            // REFORMA OBLIGATORIA: FULLSCREEN
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

            // TRANSICIÓN CINEMÁTICA
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('game-interface').style.display = 'grid';
                addLog("ACCESO CONCEDIDO: BIENVENIDO AL DESPACHO");
            }, 800);
        }

        function addLog(text) {
            const term = document.getElementById('main-terminal');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `[ ${new Date().toLocaleTimeString()} ] > ${text}`;
            term.prepend(entry); // Los logs más nuevos arriba como en Dispatch
        }

        function changeTab(id) {
            // Sonido mecánico de cambio (simulado por ahora)
            addLog("CAMBIANDO FRECUENCIA A: " + id.toUpperCase());
        }
    </script>
</body>
</html>

</body>
