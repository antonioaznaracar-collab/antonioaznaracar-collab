<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #0b0b0f;
  color: white;
}

/* INTRO */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #0b0b0f);
  text-align: center;
  padding: 20px;
}

#intro h1 {
  font-size: 48px;
  letter-spacing: 2px;
}

#intro p {
  margin: 15px 0 30px;
  color: #aaa;
}

.btn {
  padding: 14px 35px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(90deg, #e50914, #ff2a2a);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* APP LAYOUT */
.app {
  display: none;
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR (desktop) */
.sidebar {
  width: 220px;
  background: #111;
  padding: 20px;
  display: none;
  flex-direction: column;
  gap: 15px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar div {
  cursor: pointer;
  padding: 10px;
  border-radius: 10px;
}

.sidebar div:hover {
  background: #e50914;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* HEADER */
.header {
  margin-bottom: 20px;
}

.header h1 {
  font-size: 24px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.03);
  background: #e50914;
}

/* BOTTOM NAV (mobile) */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.bottom-nav div {
  text-align: center;
  font-size: 12px;
  cursor: pointer;
}

/* CONTENIDO */
#content {
  margin-top: 20px;
  color: #ccc;
}

/* RESPONSIVE */
@media (min-width: 768px) {
  .sidebar {
    display: flex;
  }

  .bottom-nav {
    display: none;
  }

  .cards {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>

</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>🎬 CineMach</h1>
  <p>La forma más inteligente de ver películas con amigos</p>
  <button class="btn" onclick="start()">Entrar</button>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>CineMach</h2>
    <div onclick="openSection('calendario')">📅 Calendario</div>
    <div onclick="openSection('social')">👥 Social</div>
    <div onclick="openSection('explorar')">🎬 Explorar</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <h1>Descubre películas</h1>
    </div>

    <div class="cards">
      <div class="card" onclick="openSection('calendario')">
        📅 Calendario<br><small>Organiza tus planes</small>
      </div>

      <div class="card" onclick="openSection('social')">
        👥 Social<br><small>Grupos con amigos</small>
      </div>

      <div class="card" onclick="openSection('explorar')">
        🎬 Explorar<br><small>Busca nuevas películas</small>
      </div>
    </div>

    <div id="content"></div>
  </div>
</div>

<!-- BOTTOM NAV (móvil) -->
<div class="bottom-nav">
  <div onclick="openSection('calendario')">📅<br>Calendario</div>
  <div onclick="openSection('social')">👥<br>Social</div>
  <div onclick="openSection('explorar')">🎬<br>Explorar</div>
</div>

<script>
function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("app").style.display = "flex";
}

function openSection(sec) {
  const c = document.getElementById("content");

  if (sec === "calendario") {
    c.innerHTML = "<h2>📅 Calendario</h2><p>Aquí verás tus películas y planes.</p>";
  }

  if (sec === "social") {
    c.innerHTML = "<h2>👥 Social</h2><p>Crea grupos con amigos y vota películas.</p>";
  }

  if (sec === "explorar") {
    c.innerHTML = "<h2>🎬 Explorar</h2><p>Busca y descubre películas populares.</p>";
  }
}
</script>

</body>
</html>
