<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 20px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #e50914;
  border: none;
  padding: 14px;
  border-radius: 12px;
  color: white;
  display: none;
}

/* MENÚ GIGANTE */
.menu {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.card {
  height: 240px;
  border-radius: 22px;
  background-size: cover;
  background-position: center;
  position: relative;
  cursor: pointer;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.2));
  border-radius: 22px;
}

.content {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* CALENDARIO */
.calendar-screen {
  position: fixed;
  inset: 0;
  background: #050507;
  display: none;
  overflow-y: auto;
  padding: 20px;
}

.month {
  margin-bottom: 40px;
  padding: 25px;
  border-radius: 20px;
}

.month-title {
  font-size: 28px;
  margin-bottom: 15px;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day {
  height: 80px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  padding: 5px;
}

.today {
  background: #e50914;
}

/* AJUSTES */
.settings {
  position: fixed;
  inset: 0;
  display: none;
}

.settings-panel {
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: #141414;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.4s;
  overflow-y: auto;
}

.settings.show .settings-panel {
  transform: translateX(0);
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #333;
}

/* AVATARES */
.avatar-category {
  font-size: 20px;
  margin-top: 20px;
}

.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.avatar-grid img {
  width: 100%;
  border-radius: 50%;
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="menu">

    <div class="card" onclick="openCalendar()" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4')">
      <div class="overlay"></div>
      <div class="content">📅 Calendario</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f')">
      <div class="overlay"></div>
      <div class="content">👥 Social</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba')">
      <div class="overlay"></div>
      <div class="content">🎬 Explorar</div>
    </div>

  </div>
</div>

<!-- CALENDARIO -->
<div class="calendar-screen" id="calendar">
  <button onclick="closeCalendar()">←</button>
  <h2>Calendario</h2>
  <div id="calendarContainer"></div>
</div>

<!-- AJUSTES -->
<div class="settings" id="settings">
  <div class="settings-panel">

    <button onclick="toggleSettings()">←</button>
    <h2>Perfil</h2>

    <div class="avatar" id="avatar"></div>

    <div class="avatar-category">🟥 Marvel</div>
    <div class="avatar-grid">
      <img src="https://image.tmdb.org/t/p/w200/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" onclick="setAvatar(this.src)">
    </div>

    <div class="avatar-category">🔵 DC</div>
    <div class="avatar-grid">
      <img src="https://image.tmdb.org/t/p/w200/5TQ6Y4V7b5Qp1nK0uQd5u6rXzXG.jpg" onclick="setAvatar(this.src)">
    </div>

    <div class="avatar-category">🟡 Warner</div>
    <div class="avatar-grid"></div>

    <div class="avatar-category">🟣 Universal</div>
    <div class="avatar-grid"></div>

  </div>
</div>

<script>

/* INTRO */
window.onload = () => {
  document.getElementById("app").style.display = "flex";

  setTimeout(() => {
    document.getElementById("intro").classList.add("hide");

    setTimeout(() => {
      document.getElementById("intro").style.display = "none";
      document.querySelector(".settings-btn").style.display = "block";
    },1200);

  },1500);

  generateCalendar();
};

/* CALENDARIO */
function openCalendar(){
  document.getElementById("calendar").style.display="block";
}

function closeCalendar(){
  document.getElementById("calendar").style.display="none";
}

function generateCalendar(){
  const container = document.getElementById("calendarContainer");

  const months=["Enero","Febrero","Marzo","Abril","Mayo","Junio"];

  months.forEach((m,i)=>{
    let month=document.createElement("div");
    month.className="month";

    let title=document.createElement("div");
    title.className="month-title";
    title.textContent=m+" 2026";

    let days=document.createElement("div");
    days.className="days";

    for(let d=1;d<=30;d++){
      let day=document.createElement("div");
      day.className="day";
      day.textContent=d;
      days.appendChild(day);
    }

    month.appendChild(title);
    month.appendChild(days);
    container.appendChild(month);
  });
}

/* AJUSTES */
function toggleSettings(){
  let s=document.getElementById("settings");

  if(s.style.display==="block"){
    s.style.display="none";
    s.classList.remove("show");
  } else {
    s.style.display="block";
    setTimeout(()=>s.classList.add("show"),10);
  }
}

function setAvatar(src){
  document.getElementById("avatar").style.backgroundImage=`url(${src})`;
}

</script>

</body>
</html>
