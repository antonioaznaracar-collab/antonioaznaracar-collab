<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Starship Cockpit v1.0</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #0f0; text-shadow: 0 0 5px #0f0; pointer-events: none; }
        .hud-border { position: absolute; border: 2px solid #0f0; width: 80%; height: 60%; top: 20%; left: 10%; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        [ PROPULSIÓN: <span id="pwr">0</span>% ] | [ ESTADO: ESTABLE ] | [ SISTEMA: BORDE EXTERIOR ]
    </div>
    <div class="hud-border"></div>
    <canvas id="space"></canvas>

<script>
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let stars = [];
    let numStars = 400;
    let speed = 0;
    let targetSpeed = 0;
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;

    // Crear estrellas iniciales
    for(let i = 0; i < numStars; i++) {
        stars.push({
            x: Math.random() * canvas.width - canvas.width/2,
            y: Math.random() * canvas.height - canvas.height/2,
            z: Math.random() * canvas.width
        });
    }

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX - canvas.width / 2;
        mouseY = e.clientY - canvas.height / 2;
    });

    window.addEventListener('keydown', (e) => {
        if(e.key === 'w' || e.key === 'ArrowUp') targetSpeed = 20;
        if(e.key === 's' || e.key === 'ArrowDown') targetSpeed = 0;
    });

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Suavizar aceleración
        speed += (targetSpeed - speed) * 0.05;
        document.getElementById('pwr').innerText = Math.round((speed/20)*100);

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);

        stars.forEach(s => {
            s.z -= speed; // Mover hacia adelante

            // Si la estrella pasa al piloto, se resetea al fondo
            if (s.z <= 0) {
                s.z = canvas.width;
                s.x = Math.random() * canvas.width - canvas.width/2;
                s.y = Math.random() * canvas.height - canvas.height/2;
            }

            // Proyección 3D a 2D simple
            let px = (s.x - mouseX * 0.5) * (canvas.width / s.z);
            let py = (s.y - mouseY * 0.5) * (canvas.width / s.z);
            let size = (1 - s.z / canvas.width) * 3;

            ctx.fillStyle = `rgba(255, 255, 255, ${1 - s.z/canvas.width})`;
            ctx.beginPath();
            ctx.arc(px, py, size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Mira de la nave (HUD)
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-20, 0); ctx.lineTo(20, 0);
        ctx.moveTo(0, -20); ctx.lineTo(0, 20);
        ctx.stroke();
        
        ctx.restore();

        // Marco de la cabina (Simulado)
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 40;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);

        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
