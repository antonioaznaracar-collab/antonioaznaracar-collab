<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=landscape">
    <title>CineMatch 2027</title>
    <style>
        :root {
            --bg-color: #0b0b0d;
            --accent-color: #e50914; /* Rojo Netflix */
            --glass: rgba(255, 255, 255, 0.05);
            --neon-blue: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0b0b0d 100%);
        }

        /* Contenedor del Menú */
        .menu-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            width: 90%;
            max-width: 1200px;
            /* CAMBIO AUTOMÁTICO: Vertical en PC / Horizontal en Móvil */
            flex-direction: column; 
        }

        @media (min-aspect-ratio: 1/1) {
            .menu-container { flex-direction: row; }
        }

        /* Tarjetas de Botones */
        .menu-item {
            flex: 1;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .menu-item:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .title {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge {
            background: var(--accent-color);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* Estilo para los textos de 2027 */
        .hype-text {
            color: var(--neon-blue);
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <!-- BOTÓN MARATÓN -->
        <div class="menu-item" onclick="alert('Abriendo Maratones...')">
            <div class="icon">🍿</div>
            <div class="title">Maratones</div>
            <div class="badge">NUEVO</div>
        </div>

        <!-- BOTÓN CALENDARIO -->
        <div class="menu-item" onclick="alert('Calendario 2026-2027')">
            <div class="icon">📅</div>
            <div class="title">Estrenos</div>
            <div class="hype-text">Hype 2027</div>
        </div>

        <!-- BOTÓN CINE-CHAT -->
        <div class="menu-item" onclick="alert('Abriendo Chat de Amigos...')">
            <div class="icon">💬</div>
            <div class="title">Cine-Chat</div>
            <div class="badge">10 Amigos</div>
        </div>

        <!-- BOTÓN GRUPOS -->
        <div class="menu-item" onclick="alert('Tus grupos de cine')">
            <div class="icon">👥</div>
            <div class="title">Mis Grupos</div>
        </div>
    </div>

</body>
</html>
