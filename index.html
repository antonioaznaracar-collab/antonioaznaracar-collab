<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARCOS: DISPATCH | Tiñi Games Ultra-Edition</title>
    <style>
        /* --- VARIABLES GLOBALES Y TEMAS --- */
        :root { 
            --accent: #39ff14; 
            --accent-glow: rgba(57, 255, 20, 0.4);
            --bg-dark: #050505;
            --ui-border: 1px solid rgba(57, 255, 20, 0.3);
            --transition-speed: 0.6s;
        }

        /* --- RESET Y ESTILOS BASE --- */
        * { box-sizing: border-box; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; color: white; user-select: none;
        }

        /* --- CAPAS CINEMÁTICAS (SCANLINES Y VIÑETA) --- */
        .overlay-fx {
            position: fixed; inset: 0; pointer-events: none; z-index: 10000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        radial-gradient(circle, transparent 20%, black 150%);
            background-size: 100% 3px, 100% 100%;
        }

        /* --- INTRO: TIÑI GAMES --- */
        #intro-sequence { 
            position: fixed; inset: 0; z-index: 20000; background: black; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: crosshair; transition: transform 1.5s cubic-bezier(1, 0, 0, 1);
        }
        #intro-sequence h1 { font-size: 4.5rem; letter-spacing: 20px; margin: 0; transition: 0.8s; }
        #intro-sequence:hover h1 { color: var(--accent); text-shadow: 0 0 30px var(--accent); }

        /* --- CONTENEDOR MAESTRO DE INTERFAZ --- */
        #main-interface { 
            opacity: 0; visibility: hidden; transition: opacity 2s ease;
            height: 100vh; width: 100vw; display: flex; align-items: center;
        }
        #video-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: linear-gradient(90deg, black 20%, transparent 80%),
                        url('https://alphacoders.com') center/cover;
            filter: brightness(0.4) contrast(1.2); transition: 4s;
        }

        /* --- MENÚ PRINCIPAL RESPONSIVO --- */
        #menu-container { padding-left: 8%; z-index: 100; max-width: 600px; }
        .logo-main { font-size: 6.5rem; font-weight: 900; margin: 0; letter-spacing: -6px; line-height: 0.9; }
        .chapter-label { color: var(--accent); font-size: 0.85rem; letter-spacing: 4px; margin-bottom: 10px; display: block; font-weight: bold; }

        .btn-narcos { 
            background: rgba(0,0,0,0.85); color: var(--accent); 
            border: var(--ui-border); padding: 18px 35px; width: 380px;
            text-align: left; cursor: pointer; margin: 12px 0;
            font-family: inherit; font-weight: bold; text-transform: uppercase; 
            transition: all 0.3s; font-size: 0.95rem; position: relative;
        }
        .btn-narcos:hover:not(:disabled) { 
            background: var(--accent); color: black; transform: translateX(20px);
            box-shadow: 0 0 25px var(--accent);
        }
        
        /* BOTÓN "SEGUIR" DESHABILITADO */
        .btn-narcos:disabled { 
            border-color: #222; color: #444; cursor: not-allowed; 
            background: rgba(10,10,10,0.9); transform: none; box-shadow: none;
        }

        /* --- PANEL DE AJUSTES INTERACTIVO --- */
        #settings-menu { 
            display: none; position: fixed; inset: 0; background: rgba(0,8,0,0.98); 
            z-index: 15000; padding: 5% 10%; border: 10px solid rgba(57,255,20,0.05);
        }
        .settings-header { border-bottom: 1px solid var(--accent); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; }
        .tab-group { display: flex; gap: 30px; margin-bottom: 40px; }
        .tab-trigger { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .tab-trigger.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        
        .control-row { 
            background: rgba(255,255,255,0.02); padding: 25px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(57,255,20,0.1);
        }
        input[type=range] { -webkit-appearance: none; background: #222; height: 5px; width: 250px; accent-color: var(--accent); }

        /* --- HUD Y LOGS DEA --- */
        .hud-top-right { position: fixed; top: 40px; right: 60px; text-align: right; color: var(--accent); font-size: 0.75rem; line-height: 1.8; z-index: 105; }
        #surveillance-logs { position: fixed; bottom: 40px; left: 40px; color: var(--accent); font-size: 0.65rem; opacity: 0.5; pointer-events: none; }
        .radar-box { position: fixed; bottom: 50px; right: 60px; width: 110px; height: 110px; border: 1px solid var(--accent); border-radius: 50%; }
        .radar-line { position: absolute; width: 50%; height: 2px; background: var(--accent); top: 50%; left: 50%; transform-origin: left; animation: radar-spin 4s linear infinite; }
        @keyframes radar-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- CINEMÁTICA Y TÍTULO FINAL --- */
        #cinematic-engine { display: none; position: fixed; inset: 0; background: black; z-index: 18000; padding: 10% 15%; box-sizing: border-box; }
        #typewriter-text { font-size: 1.7rem; line-height: 1.6; border-left: 4px solid var(--accent); padding-left: 40px; }
        #skip-cinematic-btn { 
            position: fixed; bottom: 50px; right: 80px; z-index: 19000; display: none;
            background: none; border: 1px solid var(--accent); color: var(--accent); padding: 12px 30px; cursor: pointer; transition: 0.3s;
        }
        #skip-cinematic-btn:hover { background: var(--accent); color: black; }

        #epic-reveal { 
            display: none; position: fixed; inset: 0; background: black; 
            z-index: 25000; align-items: center; justify-content: center;
        }
        .reveal-logo { font-size: 9rem; letter-spacing: 30px; opacity: 0; transform: scale(0.8); filter: blur(20px); }
        .reveal-active { opacity: 1; transform: scale(1); filter: blur(0); transition: 4s cubic-bezier(0.1, 0, 0.1, 1); }

        #global-fade { position: fixed; inset: 0; background: black; z-index: 30000; pointer-events: none; opacity: 0; transition: 1.8s; }
    </style>
</head>
<body onload="initNarcosOS()">

    <div id="global-fade"></div>
    <div class="overlay-fx"></div>
    <audio id="ambient-audio" loop src="https://soundhelix.com"></audio>

    <!-- INTRO -->
    <div id="intro-sequence" onclick="executeBoot()">
        <h1 id="intro-logo">TIÑI GAMES</h1>
        <p style="letter-spacing: 5px; margin-top: 20px; font-size: 0.8rem; color: #444;">INICIALIZANDO PROTOCOLO...</p>
    </div>

    <!-- INTERFAZ PRINCIPAL -->
    <div id="main-interface">
        <div id="video-bg"></div>
        
        <div class="hud-top-right">
            SISTEMA: DEA_NET_V4.0<br>
            COORD: 35.0844 N / 106.6504 W<br>
            FECHA: 01-ABR-2026<br>
            RELOJ: <span id="realtime-clock">00:00:00</span>
        </div>

        <div id="surveillance-logs"></div>

        <div class="radar-box"><div class="radar-line"></div></div>

        <div id="menu-container">
            <span class="chapter-label" id="lang-chapter">[ CAPÍTULO 1 // LA CARAVANA ]</span>
            <h1 class="logo-main">NARCOS</h1>
            <div style="height: 40px;"></div>
            <button class="btn-narcos" id="lang-new" onclick="startWalterHistory()">Nueva Partida</button>
            <button class="btn-narcos" id="btn-continue" disabled>Seguir con Partida</button>
            <button class="btn-narcos" id="lang-settings" onclick="toggleSettings(true)">Ajustes de Sistema</button>
        </div>
    </div>

    <!-- PANEL AJUSTES -->
    <div id="settings-menu">
        <div class="settings-header">
            <h2 id="lang-set-title">CONFIGURACIÓN DE TERMINAL</h2>
            <button class="btn-narcos" style="width:auto; margin:0;" onclick="toggleSettings(false)">CERRAR [X]</button>
        </div>

        <div class="tab-group">
            <button class="tab-trigger active" onclick="switchTab('video', this)">01. VIDEO</button>
            <button class="tab-trigger" onclick="switchTab('audio', this)">02. SONIDO</button>
            <button class="tab-trigger" onclick="switchTab('lang', this)">03. IDIOMA</button>
        </div>

        <div id="tab-video" class="settings-content">
            <div class="control-row">
                <span id="lang-fs">PANTALLA COMPLETA</span>
                <button class="btn-narcos" style="width:150px; text-align:center;" onclick="toggleFullscreen()">CONMUTAR</button>
            </div>
            <div class="control-row">
                <span>FILTRO CRT / BRILLO</span>
                <input type="range" min="50" max="150" value="100" oninput="document.body.style.filter = `brightness(${this.value}%)`">
            </div>
        </div>

        <div id="tab-audio" class="settings-content" style="display:none">
            <div class="control-row">
                <span id="lang-vol">VOLUMEN MAESTRO</span>
                <input type="range" min="0" max="100" value="50" oninput="adjustAudio(this.value)">
            </div>
        </div>

        <div id="tab-lang" class="settings-content" style="display:none">
            <div class="control-row">
                <span>SELECCIONAR LENGUAJE</span>
                <select onchange="updateLanguage(this.value)" style="background:black; color:var(--accent); border:1px solid var(--accent); padding:10px;">
                    <option value="es">Español (Castellano)</option>
                    <option value="en">English (US)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ESCENA WALTER WHITE -->
    <div id="cinematic-engine">
        <div id="typewriter-text"></div>
    </div>
    <button id="skip-cinematic-btn" onclick="triggerEpicTitle()">SALTAR ESCENA >></button>

    <!-- REVELACIÓN FINAL -->
    <div id="epic-reveal">
        <h1 class="reveal-logo" id="final-logo">NARCOS</h1>
    </div>

<script>
    /* --- MOTOR LÓGICO NARCOS: DISPATCH (v1.0.9) --- */

    const NarcosState = {
        saveExists: false,
        lang: 'es',
        isTyping: false
    };

    const i18n = {
        es: {
            chapter: "[ CAPÍTULO 1 // LA CARAVANA ]",
            new: "Nueva Partida",
            settings: "Ajustes de Sistema",
            setTitle: "CONFIGURACIÓN DE TERMINAL",
            fs: "PANTALLA COMPLETA",
            vol: "VOLUMEN MAESTRO",
            skip: "SALTAR ESCENA >>",
            history: "Walter Hartwell White... un profesor de química. Una caravana en el desierto. El inicio de un imperio que lo cambiará todo. No hay vuelta atrás."
        },
        en: {
            chapter: "[ CHAPTER 1 // THE CONVOY ]",
            new: "New Game",
            settings: "System Settings",
            setTitle: "TERMINAL CONFIGURATION",
            fs: "FULLSCREEN MODE",
            vol: "MASTER VOLUME",
            skip: "SKIP SCENE >>",
            history: "Walter Hartwell White... a chemistry teacher. An RV in the desert. The start of an empire that will change everything. There is no turning back."
        }
    };

    function initNarcosOS() {
        console.log("Sistema Inicializado. Comprobando registros...");
        startTime();
        generateLogs();
        // Verificar si existe guardado
        if(localStorage.getItem('narcos_save_v1')) {
            const btn = document.getElementById('btn-continue');
            btn.disabled = false;
            btn.style.color = 'var(--accent)';
        }
    }

    function executeBoot() {
        const intro = document.getElementById('intro-sequence');
        const main = document.getElementById('main-interface');
        intro.style.transform = 'translateY(-100%)';
        setTimeout(() => {
            main.style.opacity = '1';
            main.style.visibility = 'visible';
            document.getElementById('video-bg').style.opacity = '0.5';
        }, 1200);
    }

    // --- SISTEMA DE AJUSTES ---
    function toggleSettings(show) {
        document.getElementById('settings-menu').style.display = show ? 'block' : 'none';
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.settings-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        el.classList.add('active');
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.error(e));
        } else {
            document.exitFullscreen();
        }
    }

    function adjustAudio(v) {
        document.getElementById('ambient-audio').volume = v / 100;
        document.getElementById('ambient-audio').play();
    }

    function updateLanguage(l) {
        NarcosState.lang = l;
        document.getElementById('lang-chapter').innerText = i18n[l].chapter;
        document.getElementById('lang-new').innerText = i18n[l].new;
        document.getElementById('lang-settings').innerText = i18n[l].settings;
        document.getElementById('lang-set-title').innerText = i18n[l].setTitle;
        document.getElementById('lang-fs').innerText = i18n[l].fs;
        document.getElementById('lang-vol').innerText = i18n[l].vol;
        document.getElementById('skip-cinematic-btn').innerText = i18n[l].skip;
    }

    // --- HISTORIA Y CINEMÁTICA ---
    function startWalterHistory() {
        const engine = document.getElementById('cinematic-engine');
        const skip = document.getElementById('skip-cinematic-btn');
        engine.style.display = 'block';
        
        let text = i18n[NarcosState.lang].history;
        let i = 0;
        const target = document.getElementById('typewriter-text');
        target.innerHTML = "";
        
        const typeLoop = setInterval(() => {
            target.innerHTML += text.charAt(i);
            i++;
            if(i > 15) skip.style.display = 'block';
            if(i >= text.length) clearInterval(typeLoop);
        }, 50);
    }

    function triggerEpicTitle() {
        const fade = document.getElementById('global-fade');
        const reveal = document.getElementById('epic-reveal');
        const logo = document.getElementById('final-logo');
        
        fade.style.opacity = '1';
        
        setTimeout(() => {
            document.getElementById('cinematic-engine').style.display = 'none';
            document.getElementById('skip-cinematic-btn').style.display = 'none';
            reveal.style.display = 'flex';
            fade.style.opacity = '0';
            
            setTimeout(() => {
                logo.classList.add('reveal-active');
            }, 500);
        }, 1800);
    }

    // --- HUD LOGIC ---
    function startTime() {
        setInterval(() => {
            const d = new Date();
            document.getElementById('realtime-clock').innerText = d.toLocaleTimeString('es-ES', {hour12:false});
        }, 1000);
    }

    function generateLogs() {
        const logs = [
            "SCANNING_SATELLITE_LINK...", "ENCRYPTING_DEA_CHANNEL...", 
            "UPDATING_DRONE_POS...", "INTERCEPTING_RADIO_B61...", 
            "MONITORING_TRUCK_CONVOY...", "SIGNAL_STRENGTH_98%..."
        ];
        const container = document.getElementById('surveillance-logs');
        setInterval(() => {
            const line = document.createElement('div');
            line.innerText = `> ${logs[Math.floor(Math.random()*logs.length)]}`;
            container.appendChild(line);
            if(container.children.length > 8) container.removeChild(container.firstChild);
        }, 3000);
    }
</script>
</body>
</html>
