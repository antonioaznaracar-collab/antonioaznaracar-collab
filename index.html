<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 { font-size: 50px; }

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
}

/* BOTÓN */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #e50914;
  border: none;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 1000px;
  margin: auto;
}

.card {
  height: 160px;
  border-radius: 16px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  font-size: 18px;
}

/* CARRUSEL (NUEVO) */
.carousel {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px 0;
}

.carousel .card {
  min-width: 220px;
  height: 130px;
}

/* AJUSTES */
.settings {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 50;
}

.settings::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

.settings-panel {
  position: absolute;
  left: 0;
  top: 0;
  width: 340px;
  height: 100%;
  background: #141414;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.4s ease;
  display: flex;
  flex-direction: column;
}

.settings.show .settings-panel {
  transform: translateX(0);
}

/* HEADER */
.settings-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.settings-header button {
  background: none;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* PERFIL */
.profile-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #333;
  background-size: cover;
  background-position: center;
  border: 2px solid white;
}

#usernameInput {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

/* BOTÓN GUARDAR */
.profile-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #e50914;
  color: white;
}

/* CATEGORÍAS */
.avatar-category {
  font-size: 18px;
  font-weight: bold;
  margin-top: 15px;
}

/* AVATARES */
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.avatar-grid img {
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}

.avatar-grid img:hover {
  transform: scale(1.1);
}

</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="menu">

    <div class="carousel">
      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4')">
        <div class="overlay"></div>
        <div class="content">📅 Calendario</div>
      </div>

      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f')">
        <div class="overlay"></div>
        <div class="content">👥 Social</div>
      </div>

      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba')">
        <div class="overlay"></div>
        <div class="content">🎬 Explorar</div>
      </div>
    </div>

  </div>
</div>

<!-- AJUSTES -->
<div class="settings" id="settings">
  <div class="settings-panel">

    <div class="settings-header">
      <button onclick="toggleSettings()">←</button>
      <h2>Perfil</h2>
    </div>

    <div class="settings-body">

      <div class="profile-box">
        <div class="avatar" id="avatar"></div>
        <input id="usernameInput">
        <button onclick="saveProfile(event)">Guardar</button>
      </div>

      <div class="avatar-category">🎬 Películas</div>
      <div class="avatar-grid">
        <img src="https://image.tmdb.org/t/p/w200/5Kg76ldv7V1q7v9Zp1R6.jpg" onclick="setAvatar(this.src)">
        <img src="https://image.tmdb.org/t/p/w200/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" onclick="setAvatar(this.src)">
      </div>

      <div class="avatar-category">🦸 Superhéroes</div>
      <div class="avatar-grid">
        <img src="https://image.tmdb.org/t/p/w200/9G2hQnVZ9y8Q7lY7R8r5v7Z.jpg" onclick="setAvatar(this.src)">
      </div>

      <div class="avatar-category">🎃 Terror</div>
      <div class="avatar-grid">
        <img src="https://image.tmdb.org/t/p/w200/4U9G4Yk5Xh9.jpg" onclick="setAvatar(this.src)">
      </div>

    </div>
  </div>
</div>

<script>

window.onload = () => {

  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  app.style.display = "block";

  let user = localStorage.getItem("user") || "CineUser";
  let avatar = localStorage.getItem("avatar");

  document.getElementById("usernameInput").value = user;

  if (avatar) document.getElementById("avatar").style.backgroundImage = `url(${avatar})`;

  setTimeout(() => {
    intro.classList.add("hide");
    setTimeout(() => {
      intro.style.display = "none";
    }, 1200);
  }, 1500);
};

function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
  setTimeout(() => s.classList.toggle("show"), 10);
}

function saveProfile(e) {
  const name = document.getElementById("usernameInput").value.trim();
  if (!name) return;

  localStorage.setItem("user", name);

  const avatar = document.getElementById("avatar").style.backgroundImage;
  if (avatar) localStorage.setItem("avatar", avatar);

  e.target.textContent = "✔ Guardado";
  setTimeout(() => e.target.textContent = "Guardar", 1500);
}

function setAvatar(src) {
  localStorage.setItem("avatar", src);
  document.getElementById("avatar").style.backgroundImage = `url(${src})`;
}

</script>

</body>
</html>
