<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
/* ===== VARIABLES ===== */
:root {
  --bg: #07070a;
  --card: rgba(255,255,255,0.05);
  --text: #ffffff;
  --muted: #aaaaaa;
  --accent: #e50914;
}

/* ===== GLOBAL ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: radial-gradient(circle at top, #1a1a2e, var(--bg));
  color: var(--text);
  overflow: hidden;
}

/* ===== INTRO ===== */
.intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: black;
  animation: fadeBg 4s forwards;
}

@keyframes fadeBg {
  0% { background: black; }
  70% { background: black; }
  100% { background: transparent; }
}

.logo {
  font-size: 70px;
  font-weight: bold;
  letter-spacing: 4px;
  opacity: 0;
  animation: logoIn 3s ease forwards;
}

@keyframes logoIn {
  0% { opacity: 0; transform: scale(1.3); filter: blur(10px); }
  50% { opacity: 1; transform: scale(1); filter: blur(0); }
  100% { opacity: 0; transform: scale(0.9); }
}

.tagline {
  margin-top: 20px;
  color: var(--muted);
  opacity: 0;
  animation: textIn 3s ease forwards;
  animation-delay: 1s;
}

@keyframes textIn {
  to { opacity: 1; }
}

/* ===== APP ===== */
.app {
  display: none;
  padding: 20px;
  animation: appIn 1s ease forwards;
}

@keyframes appIn {
  from { opacity: 0; transform: scale(1.05); }
  to { opacity: 1; transform: scale(1); }
}

/* HEADER */
.header {
  margin-bottom: 30px;
  text-align: center;
}

.header h1 {
  font-size: 30px;
}

/* GRID */
.grid {
  display: grid;
  gap: 15px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  background: rgba(229,9,20,0.8);
}

.card h2 {
  margin-bottom: 5px;
}

.card p {
  font-size: 13px;
  color: var(--muted);
}

/* CONTENIDO */
.content {
  margin-top: 30px;
  text-align: center;
  opacity: 0.8;
}

/* RESPONSIVE */
@media (min-width: 768px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
    max-width: 800px;
    margin: auto;
  }
}
</style>

</head>

<body>

<!-- ===== INTRO ===== -->
<div class="intro" id="intro">
  <div>
    <div class="logo">🎬 CineMach</div>
    <div class="tagline">La nueva forma de vivir el cine</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div class="app" id="app">

  <div class="header">
    <h1>🎬 CineMach</h1>
  </div>

  <div class="grid">

    <div class="card" onclick="openSection('calendario')">
      <h2>📅 Calendario</h2>
      <p>Organiza tus planes de cine</p>
    </div>

    <div class="card" onclick="openSection('social')">
      <h2>👥 Social</h2>
      <p>Comparte con amigos</p>
    </div>

    <div class="card" onclick="openSection('explorar')">
      <h2>🎬 Explorar</h2>
      <p>Descubre películas</p>
    </div>

  </div>

  <div class="content" id="content"></div>

</div>

<script>
/* ===== TRANSICIÓN INTRO ===== */
setTimeout(() => {
  const intro = document.getElementById("intro");

  intro.style.transition = "opacity 1s ease";
  intro.style.opacity = "0";

  setTimeout(() => {
    intro.style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 1000);

}, 3500);

/* ===== NAVEGACIÓN ===== */
function openSection(section) {
  const content = document.getElementById("content");

  if (section === "calendario") {
    content.innerHTML = "<h2>📅 Calendario</h2><p>Planes de cine con amigos próximamente.</p>";
  }

  if (section === "social") {
    content.innerHTML = "<h2>👥 Social</h2><p>Grupos y votaciones en camino.</p>";
  }

  if (section === "explorar") {
    content.innerHTML = "<h2>🎬 Explorar</h2><p>Catálogo de películas próximamente.</p>";
  }
}
</script>

</body>
</html>
