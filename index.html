<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMatch 2027</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* --- ESTILO NATIVO DE APP --- */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; /* Quita el cuadro azul al tocar en Android */
            user-select: none; /* No permite seleccionar texto, como una app real */
            -webkit-user-select: none;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: manipulation; /* Optimiza toques en móvil */
        }

        /* --- INTRO NATIVA --- */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .logo-intro {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15vw;
            letter-spacing: 12px;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; transform: scale(0.9); filter: blur(5px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* --- MENU APP ADAPTABLE --- */
        #main-app {
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #151525 0%, #050505 100%);
            padding: calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
        }

        .menu-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            max-height: 500px; /* Evita que se estiren infinito en PC */
        }

        /* MÓVIL: HORIZONTAL (Landscape) */
        @media (orientation: landscape) {
            .menu-container { flex-direction: row; align-items: center; }
            .card { height: 70%; }
        }

        /* PC / MÓVIL: VERTICAL (Portrait) */
        @media (orientation: portrait) {
            .menu-container { flex-direction: column; align-items: stretch; }
            .card { flex: 1; }
        }

        /* --- TARJETAS ESTILO "PLATAFORMA" --- */
        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Feedback visual de toque */
        .card:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
        }

        .icon { font-size: clamp(2.5rem, 10vh, 4.5rem); margin-bottom: 10px; }
        .label { 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: clamp(0.9rem, 2.5vh, 1.3rem);
            letter-spacing: 2px;
        }
        .subtitle { 
            font-size: 0.7rem; 
            color: #00f2ff; 
            margin-top: 8px; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .notification {
            position: absolute; top: 20px; right: 20px;
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
        }
    </style>
</head>
<body>

    <!-- INTRO -->
    <div id="intro-screen">
        <div class="logo-intro">CINEMATCH</div>
    </div>

    <!-- APP -->
    <main id="main-app">
        <nav class="menu-container">
            <div class="card" onclick="vibrate()">
                <span class="icon">🍿</span>
                <div class="label">Maratones</div>
                <div class="subtitle">Sagas & Orden</div>
            </div>

            <div class="card" onclick="vibrate()">
                <span class="icon">📅</span>
                <div class="label">Calendario</div>
                <div class="subtitle">Estrenos 2027</div>
            </div>

            <div class="card" onclick="vibrate()">
                <div class="notification"></div>
                <span class="icon">👥</span>
                <div class="label">Social</div>
                <div class="subtitle">Club de 10</div>
            </div>
        </nav>
    </main>

    <script>
        // Efecto de vibración para cuando sea app real
        function vibrate() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10); 
            }
            console.log("Haptic Feedback");
        }

        // Transición de Intro
        window.onload = () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.style.transform = 'translateY(-100%)'; // Sube como una persiana
            }, 2500);
        };
    </script>
</body>
</html>
