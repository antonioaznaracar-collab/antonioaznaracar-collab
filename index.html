<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE SMASH BROS: SUPREME EDITION 2026</title>
    <style>
        @import url('https://googleapis.com');
        
        :root { --red: #ff4757; --blue: #2e9eff; --gold: #ffa502; --dark: #0a0a1a; }
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Archivo Black', sans-serif; color: white; user-select: none; cursor: none !important; }

        /* EFECTOS DINÁMICOS */
        #viewport { width: 100vw; height: 100vh; transition: transform 0.2s ease-out; } /* Para el zoom de cámara */
        #brightness-overlay { position: fixed; inset: 0; background-color: black; opacity: 0; pointer-events: none; z-index: 2000000; }
        #custom-cursor { position: fixed; font-size: 50px; z-index: 3000000; pointer-events: none; transition: transform 0.05s; display: flex; align-items: center; justify-content: center; }
        
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .active { display: flex; }

        /* ESCENARIO CIUDAD GALÁCTICA 2026 */
        #game-screen { 
            background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 200% 200%;
            animation: skyGradient 15s infinite alternate;
        }
        @keyframes skyGradient { from { background-position: 0% 0%; } to { background-position: 100% 100%; } }

        #stage-main { 
            position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); 
            width: 1000px; height: 45px; background: linear-gradient(to bottom, #444, #111); 
            border-top: 6px solid #00d2ff; box-shadow: 0 0 60px rgba(0,210,255,0.6); border-radius: 5px; 
        }

        /* LUCHADORES SUPREME */
        .fighter { position: absolute; width: 180px; height: 180px; background-size: contain; background-repeat: no-repeat; background-position: bottom center; z-index: 1000; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8)); }
        
        /* EFECTOS DE PARTÍCULAS */
        .dust { position: absolute; width: 20px; height: 20px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: dustFade 0.5s forwards; pointer-events: none; }
        @keyframes dustFade { to { transform: scale(3) translateY(-20px); opacity: 0; } }

        .hit-ring { position: absolute; border: 8px solid white; border-radius: 50%; z-index: 2000; animation: ringExpand 0.3s forwards; }
        @keyframes ringExpand { from { width: 0; height: 0; opacity: 1; } to { width: 300px; height: 300px; opacity: 0; } }

        /* MENÚS ESTILO ULTIMATE */
        .menu-grid { display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 2fr 1fr; gap: 20px; width: 90%; height: 80%; }
        .m-item { position: relative; cursor: pointer; transition: 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); border: 4px solid transparent; overflow: hidden; }
        .m-item:hover { transform: scale(1.05); border-color: white; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .m-label { position: absolute; bottom: 25px; left: 35px; font-size: 4rem; font-style: italic; text-shadow: 5px 5px #000; }

        /* SELECTOR DE PERSONAJES */
        .grid-pjs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 70%; padding: 25px; background: rgba(0,0,0,0.5); border-radius: 15px; border: 2px solid #444; }
        .ficha { background: #222; border: 3px solid #444; aspect-ratio: 1; cursor: pointer; transition: 0.2s; position: relative; padding: 10px; }
        .ficha img { width: 80%; transition: 0.3s; }
        .ficha:hover img { transform: scale(1.2) translateY(-5px); }
        .confirmed-p1 { border-color: var(--red) !important; background: #500; }
        .confirmed-cpu { border-color: var(--blue) !important; background: #003; }

        #ready-banner { position: fixed; top: 40%; left: -160%; width: 200%; height: 160px; background: var(--gold); transform: rotate(-4deg); z-index: 10000; display: flex; align-items: center; justify-content: center; font-size: 100px; color: black; font-weight: 900; border: 12px solid white; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); cursor: pointer; }
        #ready-banner.show { left: -50%; }

        /* HUD MEJORADO */
        .hud-container { position: fixed; bottom: 40px; display: flex; flex-direction: column; align-items: center; width: 350px; z-index: 10000; }
        .hud-name { font-size: 25px; background: rgba(0,0,0,0.7); padding: 5px 20px; border-radius: 10px; margin-bottom: 10px; font-style: italic; }
        .perc-text { font-size: 100px; color: white; -webkit-text-stroke: 4px black; text-shadow: 6px 6px 0px red; }

        /* PANTALLA VICTORIA */
        #results-screen { background: radial-gradient(circle, #4facfe, #00f2fe); }
        .win-tag { font-size: 120px; color: gold; -webkit-text-stroke: 3px black; transform: rotate(-5deg); animation: blink 0.5s infinite; }
    </style>
</head>
<body>

    <div id="brightness-overlay"></div>
    <div id="custom-cursor">👉</div>

    <div id="viewport">
        <!-- PANTALLAS -->
        <div id="intro-screen" class="screen active" onclick="iniciarMenu()">
            <h1 style="font-size: 120px; text-shadow: 0 0 50px red; margin:0;">SUPREME SMASH</h1>
            <p id="txt-start" style="font-size: 35px; animation: blink 1s infinite; letter-spacing: 5px;">HAZ CLIC PARA PELEAR</p>
        </div>

        <div id="menu-screen" class="screen">
            <div class="menu-grid">
                <div class="m-item" style="background: linear-gradient(135deg, #f00, #800);" onclick="goToCharSelect()">
                    <div class="m-label" id="lbl-smash">SMASH</div>
                </div>
                <div class="m-item" style="background: #27ae60;" onclick="showBuild()"><div class="m-label" id="lbl-spirits">SPIRITS</div></div>
                <div class="m-item" style="background: #2e9eff;" onclick="showBuild()"><div class="m-label" id="lbl-games">GAMES</div></div>
                <div class="m-item" style="background: #8e44ad;" onclick="showBuild()"><div class="m-label" id="lbl-vault">VAULT</div></div>
            </div>
            <div style="position: absolute; right: 50px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 40px;">
                <div onclick="openSettings()" style="font-size: 60px; cursor: pointer; filter: drop-shadow(0 0 10px white);">⚙️</div>
                <div onclick="openHelp()" style="font-size: 60px; cursor: pointer;">❓</div>
            </div>
        </div>

        <div id="char-select-screen" class="screen" style="background: #0a0a1a;">
            <h2 id="txt-choose" style="font-size: 40px; font-style: italic;">ELIGE TU LUCHADOR</h2>
            <div class="grid-pjs" id="grid"></div>
            <div style="display:flex; width:100%; height:300px; margin-top:auto; border-top: 10px solid white;">
                <div id="p1-panel" style="flex:1; padding:40px; background:linear-gradient(to right, #d32f2f, #600); border-right: 5px solid white;">
                    <div id="p1-n" style="font-size:4rem">P1</div>
                    <p id="p1-h" style="font-size: 1.2rem; font-family: 'Roboto';">Selecciona tu campeón...</p>
                </div>
                <div id="p2-panel" style="flex:1; padding:40px; background:linear-gradient(to right, #1976d2, #003); opacity:0.4;">
                    <div id="p2-n" style="font-size:4rem">CPU</div>
                    <p id="p2-h" style="font-size: 1.2rem; font-family: 'Roboto';">Esperando rival...</p>
                </div>
            </div>
            <div id="ready-banner" onclick="empezarPartida()">READY TO FIGHT!</div>
        </div>

        <div id="game-screen" class="screen">
            <div id="stage-main"></div>
            <div id="player-1" class="fighter"></div>
            <div id="player-ia" class="fighter"></div>
            
            <div id="timer" style="position:fixed; top:30px; font-size:70px; font-style:italic;">15:00</div>
            
            <div class="hud-container" style="left: 10%;">
                <div class="hud-name" id="hud-n1">MARIO</div>
                <div id="p1-p" class="perc-text">0%</div>
            </div>
            <div class="hud-container" style="right: 10%;">
                <div class="hud-name" id="hud-n2">CPU</div>
                <div id="p2-p" class="perc-text">0%</div>
            </div>
        </div>

        <div id="results-screen" class="screen">
            <div class="win-tag">GAME!</div>
            <h1 id="winner-name" style="font-size: 80px; margin: 20px;">WINNER</h1>
            <div id="winner-img" class="fighter" style="position:relative; width:400px; height:400px; transform:none;"></div>
            <div onclick="location.reload()" style="margin-top:50px; font-size:40px; cursor:pointer; background:red; padding:20px 50px;">➡ VOLVER AL MENÚ</div>
        </div>
    </div>

    <!-- AJUSTES -->
    <div id="modal-settings" class="modal">
        <h1 id="t-sett">AJUSTES</h1>
        <div class="opt-row"><span id="t-lang">IDIOMA</span>
            <select onchange="cambiarIdioma(this.value)" style="font-size:25px; background: #333; color: white;">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <div class="opt-row"><span>BRILLO</span><input type="range" min="0" max="90" value="0" oninput="document.getElementById('brightness-overlay').style.opacity = this.value/100"></div>
        <button onclick="closeModals()" style="padding:20px 60px; background:var(--gold); border:none; cursor:pointer; font-weight:900;">GUARDAR</button>
    </div>

    <script>
        const spriteAssets = {
            "MARIO": "https://smashbros.com",
            "PACMAN": "https://smashbros.com",
            "PIKACHU": "https://smashbros.com",
            "DK": "https://smashbros.com",
            "STEVE": "https://smashbros.com",
            "SONIC": "https://smashbros.com",
            "LINK": "https://smashbros.com",
            "BOWSER": "https://smashbros.com",
            "SAMUS": "https://smashbros.com",
            "RYU": "https://smashbros.com"
        };

        const personajes = [
            { id: "MARIO", h: "El fontanero más fuerte.", f: "8/10" },
            { id: "PACMAN", h: "Héroe retro insaciable.", f: "7/10" },
            { id: "PIKACHU", h: "Ataque trueno veloz.", f: "7.5/10" },
            { id: "DK", h: "Pura potencia simia.", f: "10/10" },
            { id: "STEVE", h: "Constructor de diamantes.", f: "8/10" },
            { id: "SONIC", h: "Velocidad del sonido.", f: "7/10" },
            { id: "LINK", h: "Maestro de la Trifuerza.", f: "9/10" },
            { id: "BOWSER", h: "Gigante lanzallamas.", f: "10/10" },
            { id: "SAMUS", h: "Armadura láser letal.", f: "9/10" },
            { id: "RYU", h: "Puño del dragón.", f: "9/10" }
        ];

        let p1Sel, cpuSel, fase = "P1", gameActive = false, time = 900;
        const p1 = { x: 300, y: 0, vx: 0, vy: 0, p: 0, id: "p1", el: null };
        const cpu = { x: 800, y: 0, vx: 0, vy: 0, p: 0, id: "p2", el: null };
        const keys = {};

        window.onmousemove = e => { 
            const c = document.getElementById('custom-cursor');
            c.style.left = e.clientX-15+'px'; c.style.top = e.clientY-10+'px'; 
        };

        function iniciarMenu() {
            document.getElementById('intro-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function goToCharSelect() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('char-select-screen').classList.add('active');
            const g = document.getElementById('grid'); g.innerHTML = "";
            personajes.forEach(p => {
                const d = document.createElement('div'); d.className='ficha';
                d.innerHTML=`<img src="${spriteAssets[p.id]}"><br><strong>${p.id}</strong>`;
                d.onclick = () => {
                    if(fase === "P1") { p1Sel = p; d.classList.add('confirmed-p1'); fase = "CPU"; document.getElementById('p2-panel').style.opacity="1"; }
                    else { cpuSel = p; d.classList.add('confirmed-cpu'); document.getElementById('ready-banner').classList.add('show'); }
                    document.getElementById(fase==='CPU'?'p1-n':'p2-n').innerText = p.id;
                    document.getElementById(fase==='CPU'?'hud-n1':'hud-n2').innerText = p.id;
                };
                g.appendChild(d);
            });
        }

        function empezarPartida() {
            document.getElementById('char-select-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            p1.el = document.getElementById('player-1');
            cpu.el = document.getElementById('player-ia');
            p1.el.style.backgroundImage = `url('${spriteAssets[p1Sel.id]}')`;
            cpu.el.style.backgroundImage = `url('${spriteAssets[cpuSel.id]}')`;
            gameActive = true; loop(); startTimer();
        }

        window.onkeydown = e => keys[e.code]=true; window.onkeyup = e => keys[e.code]=false;

        function loop() {
            if(!gameActive) return;

            // P1
            if(keys['KeyA']) { p1.vx -= 1.4; spawnDust(p1.x+80, p1.y+160); }
            if(keys['KeyD']) { p1.vx += 1.4; spawnDust(p1.x+80, p1.y+160); }
            if(keys['KeyW'] && p1.y > 450) p1.vy = -20;
            if(keys['KeyK']) atacar(p1, cpu);

            // IA PRO
            if(p1.x > cpu.x) cpu.vx += 1.1; else cpu.vx -= 1.1;
            if(Math.abs(p1.x - cpu.x) < 130 && Math.random() > 0.94) atacar(cpu, p1);

            phys(p1); phys(cpu);

            // CÁMARA DINÁMICA (Zoom suave)
            const dist = Math.abs(p1.x - cpu.x);
            const zoom = Math.max(0.7, 1.2 - (dist / 1500));
            const centerX = (p1.x + cpu.x) / 2;
            document.getElementById('viewport').style.transform = `scale(${zoom}) translateX(${(window.innerWidth/2 - centerX)*0.3}px)`;

            p1.el.style.transform = `translate(${p1.x}px, ${p1.y}px)`;
            cpu.el.style.transform = `translate(${cpu.x}px, ${cpu.y}px)`;

            if(p1.y > 900 || p1.x < -300 || p1.x > window.innerWidth+300) morir(p1);
            if(cpu.y > 900 || cpu.x < -300 || cpu.x > window.innerWidth+300) morir(cpu);
            
            requestAnimationFrame(loop);
        }

        function phys(o) {
            o.vy += 0.8; o.x += o.vx; o.y += o.vy; o.vx *= 0.85;
            if(o.y > 470 && o.x > window.innerWidth/2-500 && o.x < window.innerWidth/2+500) { o.y=470; o.vy=0; }
        }

        function atacar(a, v) {
            if(Math.abs(a.x-v.x)<150 && Math.abs(a.y-v.y)<120) {
                v.p += 8; document.getElementById(v.id === 'p1' ? 'p1-p' : 'p2-p').innerText = v.p + "%";
                v.vx = (a.x < v.x ? 1 : -1) * (v.p/4 + 15); v.vy = -12;
                
                // EFECTO ANILLO
                const r = document.createElement('div'); r.className='hit-ring'; r.style.left=v.x+'px'; r.style.top=v.y+'px';
                document.getElementById('game-screen').appendChild(r); setTimeout(()=>r.remove(), 300);
            }
        }

        function spawnDust(x, y) {
            const d = document.createElement('div'); d.className='dust'; d.style.left=x+'px'; d.style.top=y+'px';
            document.getElementById('game-screen').appendChild(d); setTimeout(()=>d.remove(), 500);
        }

        function morir(o) {
            o.x=window.innerWidth/2; o.y=0; o.p=0; o.vx=0; o.vy=0;
            document.getElementById(o.id+'-p').innerText = "0%";
            if(o.id === 'p1') { gameActive=false; showVictory("CPU"); } else { gameActive=false; showVictory("PLAYER 1"); }
        }

        function showVictory(winner) {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('results-screen').classList.add('active');
            document.getElementById('winner-name').innerText = winner;
            const winObj = winner === "CPU" ? cpuSel : p1Sel;
            document.getElementById('winner-img').style.backgroundImage = `url('${spriteAssets[winObj.id]}')`;
        }

        function startTimer() {
            setInterval(() => { if(gameActive) { time--; let m=Math.floor(time/60), s=time%60; document.getElementById('timer').innerText=`${m}:${s<10?'0'+s:s}`; } }, 1000);
        }
        function openSettings() { document.getElementById('modal-settings').classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        function showBuild() { alert("🏗️ PRÓXIMAMENTE..."); }
    </script>
</body>
</html>
