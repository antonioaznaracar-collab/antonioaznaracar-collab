<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>System Kernel - Secure Gateway</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 80%; max-width: 600px; border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px #004400; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .success { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="console">
    <div id="log"></div>
    <div id="cursor" class="blink">_</div>
</div>

<script>
    const logElement = document.getElementById('log');
    const logs = [
        "Iniciando secuencia de bypass...",
        "Detectando extensión de filtrado: [LAZARUS_DETECTED]",
        "Inyectando scripts de ofuscación de tráfico...",
        "Generando Token de sesión anónima...",
        "Limpiando cabeceras Referrer para evitar tracking...",
        "Conexión establecida. Redirigiendo a zona segura..."
    ];

    let step = 0;
    function runTerminal() {
        if (step < logs.length) {
            const line = document.createElement('div');
            line.innerHTML = `<span style="color: #008800">[OK]</span> ${logs[step]}`;
            logElement.appendChild(line);
            step++;
            setTimeout(runTerminal, 500 + Math.random() * 500);
        } else {
            executeBypass();
        }
    }

    function executeBypass() {
        // Codificamos la URL en Base64 para que la extensión no lea "chatgpt" en el código
        const secretBase = "aHR0cHM6Ly9jaGF0Z3B0LmNvbQ=="; 
        const target = atob(secretBase);

        const line = document.createElement('div');
        line.className = "success";
        line.innerHTML = "<br>> ABRIENDO PUERTO SEGURO EN PESTAÑA INDEPENDIENTE...";
        logElement.appendChild(line);

        setTimeout(() => {
            // El truco definitivo: Abrir una pestaña con 'noopener' y 'noreferrer'
            // Esto corta el vínculo con tu index.html y dificulta que la extensión
            // aplique reglas basadas en el origen del tráfico.
            const win = window.open(target, '_blank', 'noopener,noreferrer');
            
            if (!win) {
                // Si el navegador bloquea el pop-up
                alert("Bloqueador de ventanas detectado. Haz clic en 'Permitir' para acceder a ChatGPT.");
                window.location.replace(target); // Redirección forzada en la misma pestaña
            } else {
                // Cerramos esta pestaña de "puente" para no dejar rastro
                window.close();
            }
        }, 1500);
    }

    window.onload = runTerminal;
</script>
</body>
</html>
