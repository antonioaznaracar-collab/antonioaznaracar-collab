<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch Pro - Fase 1</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.07);
            --accent: #ff003c; /* Rojo Eléctrico */
            --neon-blue: #00f2ff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #050505 100%);
        }

        /* --- CONTENEDOR INTELIGENTE --- */
        .menu-grid {
            display: grid;
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
            /* Por defecto: MÓVIL VERTICAL (1 columna) */
            grid-template-columns: 1fr; 
        }

        /* --- CAMBIO A PC HORIZONTAL (Pantallas anchas) --- */
        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr); /* 4 columnas en horizontal */
            }
        }

        /* --- TARJETAS DE BOTONES --- */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .label {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--neon-blue);
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Decoración de "Cine" */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="menu-grid">
        <!-- BOTÓN 1: MARATONES -->
        <div class="card" onclick="alert('Generando Maratón Marvel...')">
            <span class="icon">🍿</span>
            <div class="label">Maratones</div>
            <div class="subtitle">Orden Cronológico</div>
        </div>

        <!-- BOTÓN 2: CALENDARIO -->
        <div class="card" onclick="alert('Cargando Estrenos 2027...')">
            <span class="icon">📅</span>
            <div class="label">Calendario</div>
            <div class="subtitle">Hype 2027</div>
        </div>

        <!-- BOTÓN 3: CHAT -->
        <div class="card" onclick="alert('Abriendo Chat Grupal...')">
            <span class="icon">💬</span>
            <div class="label">Cine-Chat</div>
            <div class="subtitle">10 Amigos Max</div>
        </div>

        <!-- BOTÓN 4: AMIGOS -->
        <div class="card" onclick="alert('Gestionando Amigos...')">
            <span class="icon">👥</span>
            <div class="label">Mi Grupo</div>
            <div class="subtitle">Social Hub</div>
        </div>
    </div>

</body>
</html>
