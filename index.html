<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CineMatch 2027 | Pro Version</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- FONDO DINÁMICO PARA PC --- */
        #main-app {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Degradado más profundo para que no se vea plano en PC */
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            padding: 20px;
        }

        /* --- CONTENEDOR QUE SE ADAPTA DE VERDAD --- */
        .menu-container {
            display: grid;
            gap: 20px;
            width: 100%;
            /* En PC: Las tarjetas ocupan más espacio */
            max-width: 1400px; 
            height: auto;
        }

        /* MÓVIL: VERTICAL (Portrait) */
        @media (orientation: portrait) {
            .menu-container {
                grid-template-columns: 1fr;
                height: 85vh; /* Ocupa casi toda la altura */
            }
        }

        /* PC / MÓVIL: HORIZONTAL (Landscape) */
        @media (orientation: landscape) {
            .menu-container {
                grid-template-columns: repeat(3, 1fr); /* 3 columnas anchas */
                height: 60vh; /* No tan alto para que no se vea estirado */
            }
        }

        /* --- TARJETAS REFORZADAS --- */
        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: relative;
        }

        /* Efecto PC: Brillo al pasar el ratón */
        @media (hover: hover) {
            .card:hover {
                transform: translateY(-15px) scale(1.02);
                border-color: var(--accent);
                background: rgba(255, 255, 255, 0.12);
                box-shadow: 0 20px 50px rgba(255, 0, 60, 0.3);
            }
        }

        /* Efecto Móvil: Vibración visual al tocar */
        .card:active { transform: scale(0.95); }

        /* Iconos y textos proporcionales */
        .icon { font-size: clamp(3rem, 12vh, 6rem); margin-bottom: 15px; }
        .label { 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: clamp(1rem, 3vh, 1.8rem); /* Texto más grande en PC */
            letter-spacing: 2px;
        }
        .subtitle { 
            font-size: clamp(0.7rem, 1.5vh, 1rem); 
            color: #00f2ff; 
            margin-top: 10px; 
            font-weight: bold;
            opacity: 0.8;
        }

        .notification {
            position: absolute; top: 25px; right: 25px;
            width: clamp(10px, 2vh, 15px); 
            height: clamp(10px, 2vh, 15px);
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent);
        }
    </style>
</head>
<body>

    <main id="main-app">
        <div class="menu-container">
            
            <div class="card" onclick="console.log('Maratones')">
                <span class="icon">🍿</span>
                <div class="label">Maratones</div>
                <div class="subtitle">Sagas & Orden</div>
            </div>

            <div class="card" onclick="console.log('Calendario')">
                <span class="icon">📅</span>
                <div class="label">Calendario</div>
                <div class="subtitle">Estrenos 2027</div>
            </div>

            <div class="card" onclick="console.log('Social')">
                <div class="notification"></div>
                <span class="icon">👥</span>
                <div class="label">Social</div>
                <div class="subtitle">Club de 10</div>
            </div>

        </div>
    </main>

</body>
</html>
