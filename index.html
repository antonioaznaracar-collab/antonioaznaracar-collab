<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* =====================
   INTRO
===================== */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
  letter-spacing: 2px;
}

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* =====================
   APP
===================== */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #e50914;
  border: none;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
}

/* CARD */
.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.35s ease;
}

.card:hover {
  transform: scale(1.03);
}

/* overlay */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

/* contenido */
.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
}

/* AJUSTES PANEL */
.settings {
  display: none;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.setting {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* BOTÓN GOOGLE */
.google {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* SOCIAL BLOQUEADO */
.locked {
  opacity: 0.4;
  pointer-events: none;
}

/* escritorio */
@media(min-width: 768px) {
  .menu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    max-width: 1000px;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="header">
    <h1 id="title">CineMach</h1>
  </div>

  <!-- MENÚ -->
  <div class="menu" id="menu">

    <div class="card" onclick="alert('Calendario')" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content">
        <h2>📅 <span class="txt">Calendario</span></h2>
      </div>
    </div>

    <div class="card" id="socialCard" onclick="alert('Social')" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content">
        <h2>👥 Social</h2>
      </div>
    </div>

    <div class="card" onclick="alert('Explorar')" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content">
        <h2>🎬 <span class="txt">Explorar</span></h2>
      </div>
    </div>

  </div>

  <!-- AJUSTES -->
  <div class="settings" id="settings">

    <h2>⚙️ Ajustes</h2>

    <div class="setting">
      👤 Usuario: <span id="user"></span>
    </div>

    <div class="setting">
      🌍 Idioma:
      <select onchange="setLang(this.value)">
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>

    <button class="google" onclick="login()">🔵 Sign in with Google</button>

  </div>

</div>

<script>

/* INTRO */
window.onload = () => {

  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  // usuario
  let user = localStorage.getItem("user");
  if (!user) {
    user = "CineUser" + Math.floor(Math.random()*9999);
    localStorage.setItem("user", user);
  }

  document.getElementById("user").innerText = user;

  checkLogin();

  app.style.display = "block";

  setTimeout(() => {
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      app.classList.add("show");
    }, 1200);

  }, 2000);
};

/* AJUSTES */
function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
}

/* LOGIN SIMULADO */
function login() {
  localStorage.setItem("login", "true");
  checkLogin();
}

/* BLOQUEO SOCIAL */
function checkLogin() {
  const logged = localStorage.getItem("login");

  if (!logged) {
    document.getElementById("socialCard").classList.add("locked");
  } else {
    document.getElementById("socialCard").classList.remove("locked");
  }
}

/* IDIOMA (simple) */
function setLang(lang) {

  localStorage.setItem("lang", lang);

  const texts = document.querySelectorAll(".txt");

  if (lang === "en") {
    texts.forEach(t => t.innerText = t.innerText === "Calendario" ? "Calendar" : "Explore");
    document.getElementById("title").innerText = "CineMach";
  } else {
    location.reload();
  }
}

</script>

</body>
</html>
