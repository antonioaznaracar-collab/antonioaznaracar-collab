<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NARCOS: DISPATCH | Tiñi Games</title>
    <style>
        :root { --accent: #39ff14; --brightness: 100%; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: white; filter: brightness(var(--brightness)); }

        /* --- FONDO --- */
        #bg-container { position: fixed; width: 100%; height: 100%; background: url('https://images6.alphacoders.com/321/321927.jpg') center/cover; z-index: 0; opacity: 0; transition: opacity 2s; }
        .vignette { position: fixed; width: 100%; height: 100%; box-shadow: inset 0 0 300px #000; z-index: 1; pointer-events: none; }

        /* --- INTRO --- */
        #intro { position: fixed; width: 100%; height: 100%; z-index: 5000; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; }
        .flash { position: absolute; width: 100%; height: 100%; animation: sirenas 0.1s infinite; opacity: 0; pointer-events: none; }
        @keyframes sirenas { 0% { background: #f00; opacity: 0.1; } 50% { background: #00f; opacity: 0.1; } }

        /* --- MENÚ PRINCIPAL --- */
        #menu { position: relative; z-index: 100; height: 100%; display: none; flex-direction: column; justify-content: center; padding-left: 80px; opacity: 0; transition: 1s; }
        .logo { font-size: 7rem; font-weight: 900; letter-spacing: -6px; margin-bottom: 20px; }
        .btn-main { background: rgba(0,0,0,0.8); color: var(--accent); border: 1px solid var(--accent); padding: 15px 45px; width: 320px; text-align: left; cursor: pointer; margin: 10px 0; font-weight: bold; text-transform: uppercase; }
        .btn-main:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        /* --- TRANSICIÓN NEGRA --- */
        #fade-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 15000; pointer-events: none; opacity: 0; transition: opacity 1s; }

        /* --- PANTALLA DE TÍTULO ÉPICA --- */
        #epic-title-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 12000; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 2s; }
        .big-narcos { font-size: 8rem; font-weight: 900; letter-spacing: 15px; margin: 0; }
        .sub-breaking { color: var(--accent); letter-spacing: 5px; font-size: 1.2rem; margin-top: -10px; }
        .cap-info { margin-top: 50px; color: #555; font-size: 1rem; letter-spacing: 3px; border-top: 1px solid #222; padding-top: 20px; }

        /* --- AJUSTES Y UI --- */
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,10,0,0.98); z-index: 9999; padding: 50px 10%; border: 2px solid var(--accent); box-sizing: border-box; }
        .radar { position: absolute; bottom: 50px; right: 80px; width: 120px; height: 120px; border: 1px solid var(--accent); border-radius: 50%; opacity: 0.5; }
        .radar-line { position: absolute; width: 50%; height: 2px; background: var(--accent); top: 50%; left: 50%; transform-origin: left; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .ui-top { position: fixed; top: 40px; right: 80px; text-align: right; color: var(--accent); font-size: 0.8rem; z-index: 101; }

        /* --- PANTALLA DE CARGA Y POKÉBOX --- */
        #loading-screen { display:none; position:fixed; z-index:9000; width:100%; height:100%; background:black; flex-direction:column; align-items:center; justify-content:center; }
        #story-box { display:none; position:fixed; z-index:8000; width:100%; height:100%; background:black; }
        #story-bg { transition: opacity 1s ease-in-out; }
        .pkmn-msg { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); width:90%; height:150px; background:white; border:5px solid #444; border-radius:15px; padding:25px; color:black; font-size:1.4rem; font-weight:bold; cursor:pointer; overflow: hidden; }
    </style>
</head>
<body>

    <div id="fade-layer"></div>

    <!-- Intro de Tiñi Games -->
    <div id="intro" onclick="start()">
        <div class="flash" id="f"></div>
        <h1 id="lt" style="font-size: 4rem; letter-spacing: 20px; opacity:0; transition: 2.5s;">TIÑI GAMES</h1>
    </div>

    <div id="bg-container"></div>
    <div class="vignette"></div>

    <!-- Pantalla de Título Épica (Después de la historia) -->
    <div id="epic-title-screen">
        <h1 class="big-narcos">NARCOS</h1>
        <p class="sub-breaking">UN VIDEOJUEGO DE BREAKING BAD</p>
        <p class="cap-info">CAPÍTULO 1 // LA CARAVANA</p>
    </div>

    <!-- Pantalla de Carga -->
    <div id="loading-screen">
        <div style="width:300px; height:4px; background:#111; border:1px solid var(--accent);">
            <div id="load-bar" style="width:0%; height:100%; background:var(--accent);"></div>
        </div>
        <p style="margin-top:20px; color:white; font-style:italic;">Preparando cristales...</p>
    </div>

    <!-- Escena Historia con Imágenes -->
    <div id="story-box">
        <div id="story-bg" style="width:100%; height:100%; background-size:cover; background-position:center; opacity:1;"></div>
        <div class="pkmn-msg" onclick="nextStep()">
            <span id="story-txt"></span>
        </div>
    </div>

    <!-- UI General -->
    <div class="ui-top">
        LOC: 35.0844 N / 106.6504 W<br>
        DEPT: DEA_SURVEILLANCE<br>
        TIME: <span id="clock">00:00:00</span>
    </div>
    <div class="radar"><div class="radar-line"></div></div>

    <!-- Menú -->
    <div id="menu">
        <div id="txt-cap" style="color:var(--accent); letter-spacing:4px; font-size:0.9rem; margin-bottom:10px;">CAPÍTULO 1 // LA CARAVANA</div>
        <div class="logo">NARCOS</div>
        <button class="btn-main" onclick="nuevaPartida()">Nueva Partida</button>
        <button class="btn-main" disabled>Seguir con partida</button>
        <button class="btn-main" onclick="toggleSettings(true)">Ajustes</button>
    </div>

    <script>
        let step = 0;
        const historia = [
            { 
                t: "Walter White es un genio de la química atrapado en una vida mediocre, trabajando en una secundaria y un lavadero de autos donde nadie lo respeta...", 
                i: "url('https://alphacoders.com')" 
            },
            { 
                t: "Pero tras un diagnóstico de cáncer terminal, Walter ha decidido que el sistema ya no le sirve. Es hora de asegurar el futuro de su familia a cualquier precio.", 
                i: "url('https://alphacoders.com')" 
            },
            { 
                t: "Junto a un antiguo alumno llamado Jesse Pinkman, están a punto de cocinar el producto más puro que Alburquerque haya visto jamás en una vieja caravana.", 
                i: "url('https://images6.alphacoders.com/321/321927.jpg')" 
            }
        ];

        function start() {
            document.getElementById('lt').style.opacity = "1";
            setTimeout(() => {
                document.getElementById('intro').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('intro').style.display = "none";
                    document.getElementById('menu').style.display = "flex";
                    document.getElementById('menu').style.opacity = "1";
                    document.getElementById('bg-container').style.opacity = "0.4";
                }, 1000);
            }, 2500);
        }

        function nuevaPartida() {
            // Transición a negro
            const fade = document.getElementById('fade-layer');
            fade.style.opacity = "1";

            setTimeout(() => {
                document.getElementById('menu').style.display = "none";
                document.getElementById('loading-screen').style.display = "flex";
                fade.style.opacity = "0";
                
                // Simular barra de carga
                document.getElementById('load-bar').style.width = "100%";
                document.getElementById('load-bar').style.transition = "3s linear";

                setTimeout(() => {
                    fade.style.opacity = "1";
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = "none";
                        document.getElementById('story-box').style.display = "block";
                        fade.style.opacity = "0";
                        nextStep();
                    }, 1000);
                }, 3500);
            }, 1000);
        }

        function nextStep() {
            if (step < historia.length) {
                const bg = document.getElementById('story-bg');
                bg.style.opacity = "0"; // Efecto de transición entre imágenes
                
                setTimeout(() => {
                    bg.style.backgroundImage = historia[step].i;
                    document.getElementById('story-txt').innerText = historia[step].t;
                    bg.style.opacity = "1";
                    step++;
                }, 500);
            } else {
                showEpicTitle();
            }
        }

        function showEpicTitle() {
            const fade = document.getElementById('fade-layer');
            fade.style.opacity = "1";

            setTimeout(() => {
                document.getElementById('story-box').style.display = "none";
                const titleScreen = document.getElementById('epic-title-screen');
                titleScreen.style.display = "flex";
                
                setTimeout(() => {
                    fade.style.opacity = "0";
                    titleScreen.style.opacity = "1";
                }, 100);
            }, 1000);
        }

        // Reloj de la UI
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0') + ":" + 
                now.getSeconds().toString().padStart(2, '0');
        }, 1000);

        function toggleSettings(show) {
            // Lógica simple para mostrar/ocultar ajustes sin romper nada
            document.getElementById('settings-panel').style.display = show ? "block" : "none";
        }
    </script>
</body>
</html>
