<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* =====================
   INTRO
===================== */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
  letter-spacing: 2px;
}

/* salida suave */
.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* =====================
   APP
===================== */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

/* entrada suave */
.show {
  opacity: 1;
  transform: translateY(0);
}

/* =====================
   MENÚ NETFLIX STYLE
===================== */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
}

/* tarjetas tipo Netflix */
.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  cursor: pointer;

  transition: transform 0.35s ease;
}

/* hover */
.card:hover {
  transform: scale(1.03);
}

/* overlay oscuro */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

/* contenido */
.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  z-index: 2;
}

.content h2 {
  font-size: 22px;
  margin-bottom: 5px;
}

.content p {
  font-size: 13px;
  color: #ccc;
}

/* header */
.header {
  text-align: center;
  margin-bottom: 20px;
}

/* escritorio */
@media(min-width: 768px) {
  .menu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    max-width: 1000px;
  }

  .card {
    height: 220px;
  }
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">
    <h1>CineMach</h1>
  </div>

  <div class="menu">

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content">
        <h2>📅 Calendario</h2>
        <p>Organiza tus maratones</p>
      </div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content">
        <h2>👥 Social</h2>
        <p>Decide con amigos</p>
      </div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content">
        <h2>🎬 Explorar</h2>
        <p>Descubre películas</p>
      </div>
    </div>

  </div>

</div>

<script>

/* CONTROL INTRO */
window.onload = () => {

  setTimeout(() => {

    const intro = document.getElementById("intro");
    const app = document.getElementById("app");

    // salida intro
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";

      // mostrar app
      app.style.display = "block";

      // entrada suave
      setTimeout(() => {
        app.classList.add("show");
      }, 50);

    }, 1200);

  }, 2000); // tiempo de “carga”
};

</script>

</body>
</html>
