<!DOCTYPE html>
<html>
<head>
    <title>Physics Test 1.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #fff; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #score { position: absolute; top: 50px; color: white; font-size: 40px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="score">0</div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 600;

    // Ajustes del juego
    let bird = { x: 50, y: 300, w: 30, h: 30, v: 0, g: 0.6, jump: -9 };
    let pipes = [];
    let frame = 0;
    let score = 0;
    let gameOver = false;

    function createPipe() {
        let gap = 150;
        let minHeight = 50;
        let height = Math.floor(Math.random() * (canvas.height - gap - minHeight * 2)) + minHeight;
        pipes.push({ x: canvas.width, y: 0, w: 50, h: height, type: 'top' });
        pipes.push({ x: canvas.width, y: height + gap, w: 50, h: canvas.height, type: 'bottom' });
    }

    function update() {
        if (gameOver) return;

        bird.v += bird.g;
        bird.y += bird.v;

        if (frame % 90 === 0) createPipe();

        pipes.forEach((p, i) => {
            p.x -= 3;
            // Colisión
            if (bird.x < p.x + p.w && bird.x + bird.w > p.x && bird.y < p.y + p.h && bird.y + bird.h > p.y) {
                gameOver = true;
            }
            if (p.x + p.w < 0) {
                if(p.type === 'top') { score++; scoreElement.innerHTML = score; }
                pipes.splice(i, 1);
            }
        });

        if (bird.y + bird.h > canvas.height || bird.y < 0) gameOver = true;
        frame++;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar Jugador
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

        // Dibujar Tubos
        ctx.fillStyle = '#fff';
        pipes.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

        if (gameOver) {
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.fillText('GAME OVER', 110, 300);
            ctx.font = '15px Arial';
            ctx.fillText('Haz clic para reiniciar', 125, 330);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') bird.v = bird.jump; });
    window.addEventListener('mousedown', () => { 
        if(gameOver) location.reload();
        else bird.v = bird.jump; 
    });

    loop();
</script>
</body>
</html>
