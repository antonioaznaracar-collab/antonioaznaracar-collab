<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Orbital v4.0 - Laboratorio de Astrofísica</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #0f0; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; background: rgba(0,20,0,0.8); padding: 15px; border: 1px solid #0f0; border-radius: 8px; }
        canvas { display: block; }
        .key { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0">🌌 COSMOS CHAOS</h2>
    <p>• [CLIC IZQ] Crear Planeta</p>
    <p>• [CLIC DER] Crear Agujero Negro</p>
    <p>• [ESPACIO] Limpiar Galaxia</p>
    <p>• [MANTENER] Arrastrar para lanzar</p>
</div>

<script src="https://cloudflare.com"></script>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Vector, Body, Events } = Matter;
    
    const engine = Engine.create();
    engine.gravity.y = 0; // Gravedad cero para espacio exterior
    const world = engine.world;

    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false,
            background: '#050508'
        }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    let blackHoles = [];

    // Función para crear planetas de colores aleatorios
    function createPlanet(x, y) {
        const size = Math.random() * 15 + 5;
        const planet = Bodies.circle(x, y, size, {
            restitution: 0.8,
            frictionAir: 0.01,
            render: {
                fillStyle: `hsl(${Math.random() * 360}, 70%, 50%)`,
                strokeStyle: '#fff',
                lineWidth: 1
            }
        });
        Composite.add(world, planet);
    }

    // Función para crear Agujero Negro (Punto de gravedad masiva)
    function createBlackHole(x, y) {
        const bh = Bodies.circle(x, y, 20, {
            isStatic: true,
            isSensor: true,
            render: {
                fillStyle: '#000',
                strokeStyle: '#f0f',
                lineWidth: 4,
                sprite: { strokeStyle: '#f0f' }
            }
        });
        blackHoles.push(bh);
        Composite.add(world, bh);
    }

    // Lógica de atracción gravitatoria constante
    Events.on(engine, 'beforeUpdate', () => {
        const bodies = Composite.allBodies(world);
        blackHoles.forEach(bh => {
            bodies.forEach(body => {
                if (body === bh || body.isStatic) return;
                
                const forceVector = Vector.sub(bh.position, body.position);
                const distanceSq = Vector.magnitudeSquared(forceVector);
                const forceMagnitude = 0.001 * body.mass; // Intensidad de succión

                if (distanceSq < 1000) { // Si entra al centro, desaparece
                    Composite.remove(world, body);
                } else {
                    Body.applyForce(body, body.position, Vector.mult(Vector.normalise(forceVector), forceMagnitude));
                }
            });
        });
    });

    // Controles de interacción
    window.addEventListener('mousedown', (e) => {
        if (e.button === 0) createPlanet(e.clientX, e.clientY);
        if (e.button === 2) createBlackHole(e.clientX, e.clientY);
    });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            Composite.clear(world, false);
            blackHoles = [];
        }
    });

    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: { stiffness: 0.1, render: { visible: false } }
    });
    Composite.add(world, mouseConstraint);

    // Evitar menú contextual
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
