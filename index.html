<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
  letter-spacing: 2px;
}

/* salida suave */
.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

/* entrada suave */
.show {
  opacity: 1;
  transform: translateY(0);
}

/* MENÚ */
.menu {
  display: grid;
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #e50914;
}

/* RESPONSIVE */
@media(min-width: 768px) {
  .menu {
    grid-template-columns: repeat(3, 1fr);
    max-width: 900px;
    margin: auto;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <h2 style="text-align:center; margin-bottom:20px;">CineMach</h2>

  <div class="menu">

    <div class="card">📅 Calendario</div>
    <div class="card">👥 Social</div>
    <div class="card">🎬 Explorar</div>

  </div>

</div>

<script>

/* CONTROL DE INTRO */
window.onload = () => {

  setTimeout(() => {
    
    const intro = document.getElementById("intro");
    const app = document.getElementById("app");

    // salida intro
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";

      // mostrar app
      app.style.display = "block";

      // animación de entrada
      setTimeout(() => {
        app.classList.add("show");
      }, 50);

    }, 1200);

  }, 2000); // tiempo de carga
};

</script>

</body>
</html>
