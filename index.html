<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMatch 2027 | Pro Auth</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://google.com" async defer></script>
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.08);
            --text-sec: #00f2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- INTRO --- */
        #intro-screen { position: fixed; inset: 0; background: black; z-index: 2000; display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .logo-intro { font-family: 'Bebas Neue', sans-serif; font-size: 15vw; letter-spacing: 10px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* --- PÁGINAS --- */
        .page { position: absolute; inset: 0; display: none; background: radial-gradient(circle at center, #151525 0%, #050505 100%); padding: 40px 20px; overflow-y: auto; }
        .active-page { display: flex !important; flex-direction: column; align-items: center; }

        .menu-container { display: grid; gap: 20px; width: 100%; max-width: 1200px; margin: auto; }
        @media (orientation: portrait) { .menu-container { grid-template-columns: 1fr; padding-bottom: 60px; } .card { min-height: 180px; } }
        @media (orientation: landscape) { .menu-container { grid-template-columns: repeat(3, 1fr); height: 60vh; align-items: center; } .card { height: 100%; } }

        .card { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; transition: 0.3s; backdrop-filter: blur(15px); position: relative; }
        .card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        /* --- BOTÓN GOOGLE (ESTILO IMAGEN) --- */
        .google-btn {
            background-color: #131314; color: white; border: 1px solid #8e918f;
            border-radius: 20px; padding: 10px 24px; display: flex; align-items: center;
            justify-content: center; gap: 12px; cursor: pointer; font-weight: 500;
            transition: background 0.3s; margin-top: 10px;
        }
        .google-btn:hover { background-color: #1e1e1f; }
        .google-icon { width: 18px; height: 18px; }

        /* AJUSTES */
        .settings-card { background: var(--glass); width: 100%; max-width: 600px; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { background: var(--accent); border: none; color: white; padding: 12px 25px; border-radius: 15px; font-weight: 900; cursor: pointer; }
        #user-input { background: #111; color: var(--text-sec); border: 1px solid var(--accent); padding: 10px; border-radius: 10px; width: 100%; text-align: center; font-family: 'Inter', sans-serif; }
        #settings-btn { position: fixed; top: 20px; right: 20px; z-index: 100; font-size: 1.5rem; background: var(--glass); padding: 10px; border-radius: 50%; }
        
        .error-msg { color: var(--accent); font-size: 0.7rem; display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="intro-screen"><div class="logo-intro">CINEMATCH</div></div>
    <div id="settings-btn" onclick="goTo('settings')">⚙️</div>

    <main id="page-home" class="page active-page">
        <div class="menu-container">
            <div class="card">🍿 <div style="font-weight:900" data-key="marathons">Maratones</div></div>
            <div class="card">📅 <div style="font-weight:900" data-key="calendar">Calendario</div></div>
            <div id="card-social" class="card locked" onclick="checkSocial()">
                <div id="social-lock" style="position:absolute; top:10px; right:15px">🔒</div>
                👥 <div style="font-weight:900" data-key="social">Social</div>
            </div>
        </div>
    </main>

    <div id="page-settings" class="page">
        <button class="btn" style="margin-bottom:20px" onclick="goTo('home')">← <span data-key="back">Volver</span></button>
        
        <div class="settings-card">
            <div style="display:flex; justify-content:space-between"><b data-key="lang">Idioma</b>
                <select onchange="changeLang(this.value)" style="background:#111; color:white; border:1px solid var(--accent);">
                    <option value="es">Español</option><option value="en">English</option><option value="fr">Français</option>
                </select>
            </div>
        </div>

        <div class="settings-card">
            <b data-key="user">Usuario</b>
            <input type="text" id="user-input" placeholder="Apodo..." oninput="validateAndSave(this.value)">
            <div id="name-error" class="error-msg">⚠️ Este nombre ya está en uso</div>
        </div>

        <div class="settings-card" id="login-section">
            <div data-key="session" style="text-align:center">Inicia sesión para Social Hub</div>
            <div class="google-btn" onclick="fakeLogin()">
                <img src="https://wikimedia.org" class="google-icon">
                Sign in with Google
            </div>
        </div>
    </div>

    <script>
        const langData = {
            es: { marathons: "Maratones", calendar: "Calendario", social: "Social", settings: "Ajustes", back: "Volver", lang: "Idioma", user: "Usuario", session: "Sesión", login_req: "¡Inicia sesión primero!" },
            en: { marathons: "Marathons", calendar: "Calendar", social: "Social", settings: "Settings", back: "Back", lang: "Language", user: "Username", session: "Session", login_req: "Login required!" },
            fr: { marathons: "Marathons", calendar: "Calendrier", social: "Social", settings: "Réglages", back: "Retour", lang: "Langue", user: "Utilisateur", session: "Session", login_req: "Connexion requise !" }
        };

        // LISTA DE NOMBRES PROHIBIDOS (YA EXISTENTES)
        const takenNames = ["Thanos_271", "IronMan", "Admin", "CineMatch_Owner"];
        let userLoggedIn = false;
        let currentLang = 'es';

        window.onload = () => {
            const saved = localStorage.getItem('cineMatch_name');
            if (saved) document.getElementById('user-input').value = saved;
            setTimeout(() => { document.getElementById('intro-screen').style.transform = 'translateY(-100%)'; }, 2500);
        };

        function validateAndSave(name) {
            const errorEl = document.getElementById('name-error');
            if (takenNames.includes(name)) {
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';
            localStorage.setItem('cineMatch_name', name);
        }

        function fakeLogin() {
            userLoggedIn = true;
            const newName = "User_" + Math.floor(Math.random() * 888);
            document.getElementById('user-input').value = newName;
            localStorage.setItem('cineMatch_name', newName);
            document.getElementById('card-social').classList.remove('locked');
            document.getElementById('social-lock').innerText = "🟢";
            document.getElementById('login-section').style.display = 'none';
            alert("Login exitoso");
            goTo('home');
        }

        function goTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + id).classList.add('active-page');
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-key]').forEach(el => {
                el.innerText = langData[lang][el.getAttribute('data-key')];
            });
        }

        function checkSocial() {
            if(!userLoggedIn) alert(langData[currentLang].login_req);
            else alert("¡Entrando a Social!");
        }
    </script>
</body>
</html>
