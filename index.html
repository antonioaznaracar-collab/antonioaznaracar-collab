<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
}

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #e50914;
  border: none;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
}

.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.35s ease;
}

.card:hover {
  transform: scale(1.03);
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
}

/* SOCIAL BLOQUEADO */
.locked {
  opacity: 0.4;
  pointer-events: none;
}

/* =========================
   🔥 PANEL AJUSTES PRO
========================= */
.settings {
  position: fixed;
  inset: 0;
  background: #0b0b0f;
  display: none;
  flex-direction: column;
  z-index: 20;
}

/* HEADER AJUSTES */
.settings-header {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.settings-header button {
  background: transparent;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* CONTENIDO */
.settings-content {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* TARJETAS */
.settings-card {
  background: rgba(255,255,255,0.06);
  padding: 18px;
  border-radius: 16px;
}

.settings-card button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* BOTÓN GOOGLE */
.google {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* IDIOMA */
.lang-buttons {
  display: flex;
  gap: 10px;
}

.lang-buttons button {
  flex: 1;
}

/* escritorio */
@media(min-width: 768px) {
  .menu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    max-width: 1000px;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="header">
    <h1 id="title">CineMach</h1>
  </div>

  <!-- MENÚ -->
  <div class="menu">

    <div class="card" onclick="alert('Calendario')" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content">
        <h2>📅 Calendario</h2>
      </div>
    </div>

    <div class="card" id="socialCard" onclick="alert('Social')" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content">
        <h2>👥 Social</h2>
      </div>
    </div>

    <div class="card" onclick="alert('Explorar')" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content">
        <h2>🎬 Explorar</h2>
      </div>
    </div>

  </div>

</div>

<!-- AJUSTES PRO -->
<div class="settings" id="settings">

  <div class="settings-header">
    <button onclick="toggleSettings()">←</button>
    <h2>⚙️ Ajustes</h2>
  </div>

  <div class="settings-content">

    <div class="settings-card">
      👤 Usuario:
      <p id="user"></p>
      <button onclick="changeUser()">✏️ Cambiar nombre</button>
    </div>

    <div class="settings-card">
      🌍 Idioma
      <div class="lang-buttons">
        <button onclick="setLang('es')">Español</button>
        <button onclick="setLang('en')">English</button>
      </div>
    </div>

    <div class="settings-card">
      🔐 Sesión
      <p id="loginStatus">No has iniciado sesión</p>
      <button class="google" onclick="login()">🔵 Sign in with Google</button>
    </div>

  </div>

</div>

<script>

/* INTRO */
window.onload = () => {

  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  let user = localStorage.getItem("user");
  if (!user) {
    user = "CineUser" + Math.floor(Math.random()*9999);
    localStorage.setItem("user", user);
  }

  document.getElementById("user").innerText = user;

  checkLogin();

  app.style.display = "block";

  setTimeout(() => {
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      app.classList.add("show");
    }, 1200);

  }, 2000);
};

/* AJUSTES */
function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "flex" ? "none" : "flex";
}

/* CAMBIAR USUARIO */
function changeUser() {
  const newName = prompt("Nuevo nombre:");
  if (newName) {
    localStorage.setItem("user", newName);
    document.getElementById("user").innerText = newName;
  }
}

/* LOGIN */
function login() {
  localStorage.setItem("login", "true");
  checkLogin();
}

/* BLOQUEO SOCIAL */
function checkLogin() {
  const logged = localStorage.getItem("login");

  if (!logged) {
    document.getElementById("socialCard").classList.add("locked");
    document.getElementById("loginStatus").innerText = "No has iniciado sesión";
  } else {
    document.getElementById("socialCard").classList.remove("locked");
    document.getElementById("loginStatus").innerText = "Sesión iniciada";
  }
}

/* IDIOMA */
function setLang(lang) {
  localStorage.setItem("lang", lang);

  if (lang === "en") {
    document.getElementById("title").innerText = "CineMach";
  } else {
    location.reload();
  }
}

</script>

</body>
</html>
