<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NARCOS: DISPATCH | Tiñi Games Official</title>
    <style>
        :root { --accent: #39ff14; --bg-dark: rgba(2, 10, 2, 0.98); --brightness: 100%; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: white; filter: brightness(var(--brightness)); }

        /* --- EFECTO MONITOR --- */
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none; }

        /* --- FONDO DINÁMICO --- */
        #bg-container { position: fixed; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; transition: 2s ease-in-out, transform 20s linear; opacity: 0; }
        .vignette { position: fixed; width: 100%; height: 100%; box-shadow: inset 0 0 250px rgba(0,0,0,1); z-index: 1; pointer-events: none; }

        /* --- INTRO & HUMO --- */
        #intro { position: fixed; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; }
        .flash { position: absolute; width: 100%; height: 100%; animation: sirenas 0.1s infinite; opacity: 0; }
        @keyframes sirenas { 0% { background: #f00; opacity: 0.1; } 50% { background: #00f; opacity: 0.1; } }
        #humo-trans { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #8a2be2 0%, transparent 80%); z-index: 999; opacity: 0; pointer-events: none; transition: 1.5s; filter: blur(60px); }

        /* --- MENÚ --- */
        #menu { position: relative; z-index: 10; height: 100%; display: none; flex-direction: column; justify-content: center; padding-left: 80px; opacity: 0; transition: 2s; }
        .logo-juego { font-size: 7rem; font-weight: 900; letter-spacing: -5px; margin-bottom: 30px; text-shadow: 0 0 20px #000; }
        .btn-main { background: rgba(0,0,0,0.8); color: var(--accent); border: 1px solid var(--accent); padding: 15px 40px; width: 320px; text-align: left; cursor: pointer; margin: 12px 0; letter-spacing: 3px; transition: 0.3s; }
        .btn-main:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); transform: translateX(10px); }

        /* --- AJUSTES --- */
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 200; padding: 50px 100px; box-sizing: border-box; }
        .tab-btn { padding: 15px 40px; border: 1px solid var(--accent); background: none; color: var(--accent); cursor: pointer; margin-right: 5px; }
        .tab-btn.active { background: var(--accent); color: #000; }
        .row { background: rgba(57, 255, 20, 0.05); border: 1px solid rgba(57, 255, 20, 0.2); padding: 25px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* --- UI RADAR --- */
        .radar { position: absolute; bottom: 50px; right: 80px; width: 120px; height: 120px; border: 1px solid var(--accent); border-radius: 50%; opacity: 0.4; }
        .radar-line { position: absolute; width: 50%; height: 2px; background: var(--accent); top: 50%; left: 50%; transform-origin: left; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .ui-top { position: fixed; top: 40px; right: 80px; text-align: right; color: var(--accent); font-size: 0.8rem; line-height: 1.8; opacity: 0.8; z-index: 101; }
    </style>
</head>
<body>

    <audio id="siren" loop src="https://soundjay.com"></audio>

    <div id="humo-trans"></div>
    <div id="bg-container"></div>
    <div class="vignette"></div>

    <div id="intro" onclick="start()">
        <div class="flash" id="f"></div>
        <h1 id="lt" style="font-size: 3.5rem; letter-spacing: 25px; opacity:0; transition: 3s;">TIÑI GAMES</h1>
    </div>

    <div class="ui-top">
        LOC: 35.0844 N / 106.6504 W<br>
        DEPT: DEA_SURVEILLANCE<br>
        <span id="clock">00:00:00</span>
    </div>
    <div class="radar"><div class="radar-line"></div></div>

    <div id="menu">
        <div id="txt-cap" style="color:var(--accent); letter-spacing:5px; font-size:0.9rem; margin-bottom:10px;">CAPÍTULO 1 // LA CARAVANA</div>
        <div class="logo-juego">NARCOS</div>
        <button class="btn-main" onclick="nuevaPartida()">NUEVA PARTIDA</button>
        <button class="btn-main" id="btn-cont" disabled onclick="continuar()">CONTINUAR</button>
        <button class="btn-main" onclick="toggleSettings(true)">AJUSTES</button>
    </div>

    <!-- Ajustes Interactivos -->
    <div id="settings-panel">
        <h1 style="color:var(--accent); letter-spacing:15px;">SETTINGS</h1>
        <div class="row">
            <span>PANTALLA COMPLETA</span>
            <button onclick="toggleFS()" id="fs-status" style="background:var(--accent); border:none; padding:10px 20px; font-weight:bold;">ON</button>
        </div>
        <div class="row">
            <span>BRILLO</span>
            <input type="range" min="30" max="150" value="100" oninput="document.documentElement.style.setProperty('--brightness', this.value + '%')">
        </div>
        <button class="btn-main" style="margin-top:40px;" onclick="toggleSettings(false)">VOLVER</button>
    </div>

    <script>
        // CONFIGURACIÓN DE CAPÍTULOS E IMÁGENES
        const capitulos = {
            1: { 
                nombre: "CAPÍTULO 1 // LA CARAVANA", 
                img: "https://redd.it" 
            },
            2: { 
                nombre: "CAPÍTULO 2 // EL LABORATORIO", 
                img: "https://imgur.com" 
            }
        };

        function start() {
            toggleFS(true);
            document.getElementById('siren').play();
            document.getElementById('f').style.opacity = '1';
            document.getElementById('lt').style.opacity = '1';
            
            // Cargar imagen según capítulo guardado
            let capActual = localStorage.getItem('narco_cap') || 1;
            document.getElementById('bg-container').style.backgroundImage = `url('${capitulos[capActual].img}')`;
            document.getElementById('txt-cap').innerText = capitulos[capActual].nombre;

            setTimeout(() => { 
                document.getElementById('humo-trans').style.opacity = '1';
                document.getElementById('lt').style.opacity = '0';
            }, 3000);

            setTimeout(() => { 
                document.getElementById('intro').style.display = 'none'; 
                document.getElementById('humo-trans').style.opacity = '0'; 
                document.getElementById('bg-container').style.opacity = '1';
                document.getElementById('menu').style.display = 'flex'; 
                setTimeout(() => { document.getElementById('menu').style.opacity = '1'; }, 100);
                document.getElementById('bg-container').style.transform = 'scale(1.2)';
            }, 4500);
        }

        function nuevaPartida() {
            localStorage.setItem('narco_cap', 1);
            alert("Iniciando Capítulo 1...");
            location.reload();
        }

        function continuar() {
            let cap = localStorage.getItem('narco_cap');
            alert("Cargando Capítulo " + cap + "...");
        }

        if(localStorage.getItem('narco_cap')) {
            document.getElementById('btn-cont').disabled = false;
        }

        function toggleFS(force = false) {
            if (!document.fullscreenElement || force) {
                document.documentElement.requestFullscreen().catch(() => {});
                document.getElementById('fs-status').innerText = "ON";
            } else {
                document.exitFullscreen();
                document.getElementById('fs-status').innerText = "OFF";
            }
        }

        function toggleSettings(s) { document.getElementById('settings-panel').style.display = s ? 'block' : 'none'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
