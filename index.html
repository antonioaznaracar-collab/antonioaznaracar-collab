<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario vs DK: Barrel Jump (Dificultad Progresiva)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="score">Puntos: 0</h1>
        <p id="level">Dificultad: Normal</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const levelElement = document.getElementById("level");

        // Configuración inicial
        canvas.width = 800;
        canvas.height = 400;

        // Variables de juego
        let score = 0;
        let gameActive = true;
        let frameCount = 0;
        let difficultyFactor = 1; // Aumenta con el tiempo

        // Propiedades del Jugador (Mario)
        const player = {
            x: 50,
            y: 330,
            width: 30,
            height: 40,
            color: "#ff0000",
            dy: 0,
            jumpForce: 12,
            gravity: 0.6,
            grounded: false
        };

        // Obstáculos (Barriles)
        const barrels = [];
        let barrelSpeed = 5;
        let spawnRate = 90; // Frames entre cada barril

        // Control de teclado
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
            if (!gameActive && e.code === "Enter") {
                location.reload(); // Reiniciar juego
            }
        });

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // "Gorra" de Mario
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x + 5, player.y + 5, 20, 5);
        }

        function drawBarrels() {
            barrels.forEach((barrel, index) => {
                ctx.fillStyle = "#8B4513"; // Marrón barril
                ctx.beginPath();
                ctx.arc(barrel.x, barrel.y + 15, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // Efecto de rotación (líneas del barril)
                ctx.strokeStyle = "#4d260a";
                ctx.lineWidth = 3;
                ctx.stroke();

                barrel.x -= barrel.speed;

                // Colisión simple (AABB)
                if (
                    player.x < barrel.x + 15 &&
                    player.x + player.width > barrel.x - 15 &&
                    player.y < barrel.y + 30 &&
                    player.y + player.height > barrel.y
                ) {
                    gameOver();
                }

                // Eliminar barriles fuera de pantalla
                if (barrel.x < -50) {
                    barrels.splice(index, 1);
                    score += 10;
                }
            });
        }

        function updateDifficulty() {
            frameCount++;
            
            // Cada 500 frames (aprox 8 seg), sube la dificultad
            if (frameCount % 500 === 0) {
                difficultyFactor += 0.2;
                barrelSpeed += 1;
                spawnRate = Math.max(30, spawnRate - 5);
                levelElement.innerText = `Dificultad: x${difficultyFactor.toFixed(1)}`;
                levelElement.style.color = "yellow";
            }

            // Generar barriles
            if (frameCount % Math.floor(spawnRate) === 0) {
                barrels.push({
                    x: canvas.width + 50,
                    y: 340,
                    speed: barrelSpeed + Math.random() * 2 // Variación de velocidad
                });
            }
        }

        function updatePlayer() {
            player.dy += player.gravity;
            player.y += player.dy;

            // Colisión con suelo
            if (player.y > 340) {
                player.y = 340;
                player.dy = 0;
                player.grounded = true;
            }
        }

        function drawGround() {
            ctx.fillStyle = "#0000ff"; // Suelo azul clásico
            ctx.fillRect(0, 380, canvas.width, 20);
        }

        function gameOver() {
            gameActive = false;
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "40px Courier New";
            ctx.textAlign = "center";
            ctx.fillText("¡GAME OVER!", canvas.width / 2, canvas.height / 2);
            ctx.font = "20px Courier New";
            ctx.fillText("Presiona ENTER para reintentar", canvas.width / 2, canvas.height / 2 + 50);
        }

        function gameLoop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawGround();
            updatePlayer();
            drawPlayer();
            updateDifficulty();
            drawBarrels();

            scoreElement.innerText = `Puntos: ${score}`;

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
