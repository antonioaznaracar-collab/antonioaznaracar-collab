<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
:root {
  --bg: #050507;
  --accent: #e50914;
  --text: #ffffff;
  --muted: #aaa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ===== TELÓN ===== */
.curtain {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, #000, #0a0a0f);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.curtain::before,
.curtain::after {
  content: "";
  position: absolute;
  width: 50%;
  height: 100%;
  top: 0;
  background: linear-gradient(to right, #000, #1a1a1a);
  transition: 1.2s ease;
}

.curtain::before { left: 0; }
.curtain::after { right: 0; }

/* animación apertura */
.open::before {
  transform: translateX(-100%);
}

.open::after {
  transform: translateX(100%);
}

/* LOGO */
.logo {
  font-size: 50px;
  opacity: 0;
  animation: appear 2s ease forwards;
}

@keyframes appear {
  0% { opacity: 0; transform: scale(1.3); }
  50% { opacity: 1; }
  100% { opacity: 1; transform: scale(1); }
}

/* ===== APP ===== */
.app {
  display: none;
  padding: 20px;
  animation: fade 1s ease;
}

@keyframes fade {
  from { opacity: 0; transform: scale(1.05); }
  to { opacity: 1; transform: scale(1); }
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: 26px;
}

/* CARDS */
.cards {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(8px);
}

.card:hover {
  background: var(--accent);
  transform: translateY(-4px);
}

.card h2 {
  margin-bottom: 5px;
}

.card p {
  font-size: 13px;
  color: var(--muted);
}

/* CONTENIDO */
#content {
  margin-top: 30px;
  text-align: center;
  color: var(--muted);
}

/* RESPONSIVE */
@media(min-width: 768px){
  .cards {
    max-width: 600px;
    margin: auto;
  }
}
</style>
</head>

<body>

<!-- TELÓN -->
<div class="curtain" id="curtain">
  <div class="logo">🎬 CineMach</div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">
    <h1>🎬 CineMach</h1>
  </div>

  <div class="cards">
    <div class="card" onclick="openSection('calendario')">
      <h2>📅 Calendario</h2>
      <p>Planifica tus películas</p>
    </div>

    <div class="card" onclick="openSection('social')">
      <h2>👥 Social</h2>
      <p>Amigos y grupos</p>
    </div>

    <div class="card" onclick="openSection('explorar')">
      <h2>🎬 Explorar</h2>
      <p>Descubre contenido</p>
    </div>
  </div>

  <div id="content"></div>

</div>

<script>
/* ===== INTRO CINE ===== */
setTimeout(() => {
  const curtain = document.getElementById("curtain");

  curtain.classList.add("open");

  setTimeout(() => {
    curtain.style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 1200);

}, 2500);

/* ===== SECCIONES ===== */
function openSection(sec) {
  const c = document.getElementById("content");

  if (sec === "calendario") {
    c.innerHTML = "<h3>📅 Calendario</h3><p>Planes en desarrollo</p>";
  }

  if (sec === "social") {
    c.innerHTML = "<h3>👥 Social</h3><p>Grupos próximamente</p>";
  }

  if (sec === "explorar") {
    c.innerHTML = "<h3>🎬 Explorar</h3><p>Películas próximamente</p>";
  }
}
</script>

</body>
</html>
