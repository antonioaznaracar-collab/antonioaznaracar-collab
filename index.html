<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NARCOS: DISPATCH | Tiñi Games</title>
    <style>
        :root { 
            --accent: #39ff14; 
            --brightness: 100%; 
            --ui-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; color: white; filter: brightness(var(--brightness)); 
            transition: filter 0.5s ease-in-out; 
        }

        /* --- ANIMACIONES DE TRANSICIÓN --- */
        @keyframes glitch-intro {
            0% { transform: translate(0); text-shadow: 2px 2px red, -2px -2px blue; }
            20% { transform: translate(-8px, 4px); }
            40% { transform: translate(8px, -4px); text-shadow: -2px -2px red, 2px 2px blue; }
            60% { transform: translate(-4px, 4px); }
            100% { transform: translate(0); }
        }
        .glitch-active { animation: glitch-intro 0.15s linear infinite; }

        /* --- INTRO: TIÑI GAMES --- */
        #intro { 
            position: fixed; width: 100%; height: 100%; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            background: #000; cursor: pointer; transition: 1.8s cubic-bezier(0.7, 0, 0.3, 1); 
        }
        .flash { 
            position: absolute; width: 100%; height: 100%; 
            animation: sirenas 0.1s infinite; opacity: 0; pointer-events: none; 
        }
        @keyframes sirenas { 
            0% { background: #f00; opacity: 0.18; } 
            50% { background: #00f; opacity: 0.18; } 
        }
        #lt { font-size: 5rem; letter-spacing: 25px; opacity: 1; transition: 2.5s; z-index: 10000; text-transform: uppercase; }

        /* --- CONTENEDOR MAESTRO DE LA INTERFAZ --- */
        #game-interface { 
            opacity: 0; visibility: hidden; 
            transition: opacity 2.5s ease-in-out; 
        }

        #bg-container { 
            position: fixed; width: 100%; height: 100%; 
            background: url('https://alphacoders.com') center/cover; 
            z-index: 0; opacity: 0; transition: 4s ease-in-out; 
        }
        .vignette { 
            position: fixed; width: 100%; height: 100%; 
            box-shadow: inset 0 0 350px #000, inset 0 0 150px #000; 
            z-index: 1; pointer-events: none; 
        }

        /* HUD: RADAR, RELOJ, COORDENADAS */
        .ui-top { 
            position: fixed; top: 40px; right: 80px; text-align: right; 
            color: var(--accent); font-size: 0.8rem; line-height: 2; 
            z-index: 105; text-shadow: var(--ui-shadow); 
        }
        .radar { 
            position: absolute; bottom: 60px; right: 80px; 
            width: 130px; height: 130px; border: 1px solid var(--accent); 
            border-radius: 50%; opacity: 0.5; z-index: 105; 
            box-shadow: 0 0 20px var(--accent); 
        }
        .radar-line { 
            position: absolute; width: 50%; height: 2px; 
            background: var(--accent); top: 50%; left: 50%; 
            transform-origin: left; animation: spin-radar 3.5s linear infinite; 
        }
        @keyframes spin-radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MENÚ DE SELECCIÓN */
        #menu { 
            position: relative; z-index: 110; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; 
            padding-left: 100px; 
        }
        .logo { font-size: 7.5rem; font-weight: 900; letter-spacing: -7px; margin-bottom: 25px; }
        .btn-main { 
            background: rgba(0,0,0,0.85); color: var(--accent); 
            border: 1px solid var(--accent); padding: 18px 50px; 
            width: 400px; text-align: left; cursor: pointer; 
            margin: 12px 0; font-weight: bold; text-transform: uppercase; 
            transition: all 0.4s; font-size: 0.95rem; 
        }
        .btn-main:hover { 
            background: var(--accent); color: #000; 
            box-shadow: 0 0 35px var(--accent); transform: translateX(20px); 
        }
        .btn-main:disabled { opacity: 0.2; cursor: not-allowed; border-color: #333; }

        /* PANEL DE AJUSTES */
        #settings-panel { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,8,0,0.99); 
            z-index: 9000; padding: 70px 12%; border: 2px solid var(--accent); 
            box-sizing: border-box; overflow-y: auto; 
        }
        .tabs { display: flex; gap: 20px; margin-bottom: 50px; border-bottom: 1px solid #222; }
        .tab { 
            padding: 20px 40px; cursor: pointer; color: #555; 
            font-weight: bold; border: 1px solid transparent; transition: 0.3s; 
        }
        .tab.active { 
            color: var(--accent); border: 1px solid var(--accent); 
            border-bottom: 2px solid black; background: rgba(57,255,20,0.06); 
        }
        .row { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(57, 255, 20, 0.15); 
            padding: 25px; margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center; 
        }

        /* PANTALLA DE CARGA */
        #loading-screen { 
            display:none; position:fixed; z-index:11000; width:100%; height:100%; 
            background:black; flex-direction:column; align-items:center; justify-content:center; 
        }
        #load-bar-cont { 
            width:450px; height:10px; background:#111; 
            border: 1px solid var(--accent); box-shadow: 0 0 20px rgba(57,255,20,0.3); 
        }
        #load-bar { width:0%; height:100%; background:var(--accent); transition: 5s linear; }

        /* HISTORIA CINEMÁTICA */
        #story-box { display:none; position:fixed; z-index:10500; width:100%; height:100%; background:black; }
        .pkmn-msg { 
            position:absolute; bottom:40px; left:50%; transform:translateX(-50%); 
            width:92%; height:180px; background:white; border:8px solid #222; 
            border-radius:20px; padding:35px; color:black; font-size: 1.7rem; 
            font-weight:bold; cursor:pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.9); 
        }

        /* TÍTULO FINAL */
        #epic-title-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 15000; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        .t-step { opacity: 0; filter: blur(30px); transform: scale(0.7); transition: all 2.8s cubic-bezier(0.2, 0, 0.2, 1); text-align: center; }
        .reveal { opacity: 1; filter: blur(0px); transform: scale(1.1); }
        #step1 { font-size: 10rem; letter-spacing: 30px; text-shadow: 0 0 50px rgba(255,255,255,0.3); }

        #global-fade { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 25000; pointer-events: none; 
            opacity: 0; transition: 1.8s; 
        }
    </style>
</head>
<body>

    <div id="global-fade"></div>
    <audio id="siren" loop src="https://soundjay.com"></audio>

    <!-- INTRO -->
    <div id="intro" onclick="legendaryStart()">
        <div class="flash"></div>
        <h1 id="lt">TIÑI GAMES</h1>
    </div>

    <!-- INTERFAZ SINCRONIZADA -->
    <div id="game-interface">
        <div id="bg-container"></div>
        <div class="vignette"></div>

        <div class="ui-top">
            LOC: 35.0844 N / 106.6504 W<br>
            UNIT: DEA_SURVEILLANCE_TECH<br>
            TIME: <span id="clock">00:00:00</span>
        </div>
        <div class="radar"><div class="radar-line"></div></div>

        <div id="menu">
            <div id="txt-cap" style="color:var(--accent); letter-spacing:6px; font-size:1.1rem; margin-bottom:15px; font-weight: bold;">[ CAPÍTULO 1 // LA CARAVANA ]</div>
            <div class="logo">NARCOS</div>
            <button class="btn-main" id="btn-new" onclick="nuevaPartida()">Nueva Partida</button>
            <button class="btn-main" id="btn-cont" onclick="continuar()" disabled>Seguir con partida</button>
            <button class="btn-main" id="btn-sett" onclick="toggleSettings(true)">AJUSTES</button>
        </div>
    </div>

    <!-- AJUSTES -->
    <div id="settings-panel">
        <h1 id="sett-tit" style="color:var(--accent); letter-spacing:15px; margin-bottom:50px;">CONFIGURACIÓN DEL SISTEMA</h1>
        <div class="tabs">
            <div class="tab active" onclick="switchTab(event, 'general')" id="t-gen">GENERAL</div>
            <div class="tab" onclick="switchTab(event, 'video')" id="t-vid">VIDEO</div>
            <div class="tab" onclick="switchTab(event, 'audio')" id="t-aud">SONIDO</div>
        </div>
        <div id="general" class="tab-content" style="display:block;">
            <div class="row"><span id="lb-fs">PANTALLA COMPLETA</span><button class="btn-main" style="width:140px; text-align:center;" onclick="toggleFS()" id="fs-txt">OFF</button></div>
            <div class="row"><span id="lb-lang">LOCALIZACIÓN GLOBAL</span>
                <select onchange="applyGlobalLanguage(this.value)" id="lang-sel" style="background:#000; color:var(--accent); border:1px solid var(--accent); padding:12px; font-weight: bold;">
                    <option value="es">ESPAÑOL</option>
                    <option value="en">ENGLISH</option>
                    <option value="fr">FRANÇAIS</option>
                </select>
            </div>
        </div>
        <div id="video" class="tab-content" style="display:none;">
            <div class="row"><span>BRILLO DEL MONITOR</span><input type="range" min="40" max="160" value="100" oninput="changeBrightness(this.value)"></div>
        </div>
        <button class="btn-main" id="btn-back" style="margin-top:60px; width:100%; text-align:center;" onclick="toggleSettings(false)">VOLVER AL TERMINAL</button>
    </div>

    <!-- CARGA -->
    <div id="loading-screen">
        <div id="load-bar-cont"><div id="load-bar"></div></div>
        <p id="load-quote" style="margin-top:25px; color:white; font-style:italic; font-size:1.3rem; letter-spacing:3px;"></p>
    </div>

    <!-- HISTORIA -->
    <div id="story-box">
        <div id="story-bg" style="width:100%; height:100%; background-size:cover; transition: 2.5s ease-in-out;"></div>
        <div class="pkmn-msg" onclick="handleStoryClick()"><span id="story-txt"></span></div>
    </div>

    <!-- TÍTULO FINAL -->
    <div id="epic-title-screen">
        <h1 class="t-step" id="step1">NARCOS</h1>
        <p class="t-step" id="step2" style="color:var(--accent); font-size: 2.2rem; letter-spacing: 12px; margin-top: -15px; font-weight: bold;"></p>
        <p class="t-step" id="step3" style="color:#555; margin-top: 60px; font-size: 1.3rem; letter-spacing: 6px;"></p>
    </div>

    <script>
        let currentLang = 'es';
        let step = 0; let isTyping = false;

        const localization = {
            es: {
                cap: "[ CAPÍTULO 1 // LA CARAVANA ]", new: "Nueva Partida", cont: "Seguir con partida", sett: "AJUSTES", back: "VOLVER AL TERMINAL", game: "UN VIDEOJUEGO DE BREAKING BAD", sett_tit: "CONFIGURACIÓN DEL SISTEMA", lb_fs: "PANTALLA COMPLETA", lb_lang: "LOCALIZACIÓN GLOBAL",
                quotes: ["Cocinando cristales...", "Guardando en disco duro...", "No le tengo miedo a la muerte, la muerte me tiene miedo a mí.", "Heisenberg está naciendo...", "Sincronizando señal con la DEA..."],
                historia: [
                    { t: "Walter White es un genio de la química atrapado en una vida mediocre, trabajando en un lavadero donde nadie lo respeta.", i: "url('https://alphacoders.com')" },
                    { t: "Pero hoy, tras su diagnóstico de cáncer terminal, Walter ha decidido que el sistema ya no le sirve. Es hora de actuar.", i: "url('https://alphacoders.com')" },
                    { t: "Un hombre que ya no tiene nada que perder es el hombre más peligroso de la tierra. Walter está a punto de cambiar.", i: "url('https://alphacoders.com')" },
                    { t: "Junto a Jesse Pinkman, se adentra en el desierto de Alburquerque para cocinar el producto más puro jamás visto.", i: "url('https://alphacoders.com')" },
                    { t: "La caravana está lista. Heisenberg ha nacido. El destino está sellado.", i: "url('https://alphacoders.com')" },
                    { t: "'I AM THE ONE WHO KNOCKS.'", i: "url('https://alphacoders.com')" }
                ]
            },
            en: {
                cap: "[ CHAPTER 1 // THE RV ]", new: "New Game", cont: "Continue Mission", sett: "SETTINGS", back: "BACK TO TERMINAL", game: "A BREAKING BAD VIDEO GAME", sett_tit: "SYSTEM CONFIGURATION", lb_fs: "FULLSCREEN", lb_lang: "GLOBAL LOCALIZATION",
                quotes: ["Cooking crystals...", "Saving to local drive...", "I am not in danger, I am the danger.", "Heisenberg is rising...", "Syncing DEA frequencies..."],
                historia: [
                    { t: "Walter White is a chemistry genius trapped in a mediocre life, working at a car wash where no one respects him.", i: "url('https://alphacoders.com')" },
                    { t: "But today, after his terminal cancer diagnosis, Walter has decided the system no longer works. It's time to act.", i: "url('https://alphacoders.com')" },
                    { t: "A man with nothing to lose is the most dangerous man on earth. Walter is about to transform.", i: "url('https://alphacoders.com')" },
                    { t: "Together with Jesse Pinkman, he heads into the Albuquerque desert to cook the purest product ever seen.", i: "url('https://alphacoders.com')" },
                    { t: "The RV is ready. Heisenberg is born. Destiny is sealed.", i: "url('https://alphacoders.com')" },
                    { t: "'I AM THE ONE WHO KNOCKS.'", i: "url('https://alphacoders.com')" }
                ]
            },
            fr: {
                cap: "[ CHAPITRE 1 // LE CAMPING-CAR ]", new: "Nouvelle Partie", cont: "Continuer", sett: "PARAMÈTRES", back: "RETOUR", game: "UN JEU VIDÉO DE BREAKING BAD", sett_tit: "CONFIGURATION DU SYSTÈME", lb_fs: "PLEIN ÉCRAN", lb_lang: "LOCALISATION",
                quotes: ["Cuisine en cours...", "Sauvegarde sur le disque...", "Je suis celui qui frappe à la porte.", "Heisenberg arrive...", "Synchronisation avec la DEA..."],
                historia: [
                    { t: "Walter White est un génie de la chimie piégé dans une vie médiocre, travaillant dans un lave-auto où personne ne le respecte.", i: "url('https://alphacoders.com')" },
                    { t: "Mais aujourd'hui, après son diagnostic de cancer, Walter a décidé que le système ne lui servait plus. Il est temps d'agir.", i: "url('https://alphacoders.com')" },
                    { t: "Un homme qui n'a plus rien à perdre est l'homme le plus dangereux de la terre.", i: "url('https://alphacoders.com')" },
                    { t: "Avec Jesse Pinkman, il s'enfonce dans le désert pour cuisiner le produit le plus pur jamais vu.", i: "url('https://alphacoders.com')" },
                    { t: "Le camping-car est prêt. Heisenberg est né. Le destin est scellé.", i: "url('https://alphacoders.com')" },
                    { t: "'I AM THE ONE WHO KNOCKS.'", i: "url('https://alphacoders.com')" }
                ]
            }
        };

        function applyGlobalLanguage(lang) {
            currentLang = lang;
            const t = localization[lang];
            document.getElementById('txt-cap').innerText = t.cap;
            document.getElementById('btn-new').innerText = t.new;
            document.getElementById('btn-cont').innerText = t.cont;
            document.getElementById('btn-sett').innerText = t.sett;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('sett-tit').innerText = t.sett_tit;
            document.getElementById('lb-fs').innerText = t.lb_fs;
            document.getElementById('lb-lang').innerText = t.lb_lang;
            document.getElementById('step2').innerText = t.game;
            document.getElementById('step3').innerText = t.cap;
        }

        function legendaryStart() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('lt').classList.add('glitch-active');
            setTimeout(() => {
                document.getElementById('intro').style.transform = "scale(2.5)";
                document.getElementById('intro').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('intro').style.display = "none";
                    // SINCRONIZACIÓN LEGENDARIA
                    const wrapper = document.getElementById('game-interface');
                    wrapper.style.visibility = "visible";
                    wrapper.style.opacity = "1";
                    document.getElementById('menu').style.opacity = "1";
                    document.getElementById('bg-container').style.opacity = "0.45";
                }, 1200);
            }, 1600);
        }

        function nuevaPartida() {
            document.getElementById('game-interface').style.display = "none";
            document.getElementById('loading-screen').style.display = "flex";
            const q = localization[currentLang].quotes;
            document.getElementById('load-quote').innerText = q[Math.floor(Math.random()*q.length)];
            setTimeout(() => { document.getElementById('load-bar').style.width = "100%"; }, 100);
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = "none";
                document.getElementById('story-box').style.display = "block";
                showNextStory();
            }, 5500);
        }

        function showNextStory() {
            const h = localization[currentLang].historia;
            if (step < h.length) {
                const bg = document.getElementById('story-bg');
                bg.style.opacity = "0";
                setTimeout(() => {
                    bg.style.backgroundImage = h[step].i;
                    bg.style.opacity = "1";
                    typeWriter(h[step].t, "story-txt");
                    step++;
                }, 1000);
            } else {
                localStorage.setItem('narcos_save', 'true');
                showEpicTitle();
            }
        }

        function typeWriter(text, id) {
            isTyping = true; let i = 0; let el = document.getElementById(id); el.innerHTML = "";
            let timer = setInterval(() => {
                el.innerHTML += text.charAt(i); i++;
                if(i >= text.length) { clearInterval(timer); isTyping = false; }
            }, 35);
        }

        function handleStoryClick() { if(!isTyping) showNextStory(); }

        function showEpicTitle() {
            document.getElementById('story-box').style.display = "none";
            document.getElementById('epic-title-screen').style.display = "flex";
            setTimeout(() => { document.getElementById('step1').classList.add('reveal'); }, 500);
            setTimeout(() => { document.getElementById('step2').classList.add('reveal'); }, 2800);
            setTimeout(() => { document.getElementById('step3').classList.add('reveal'); }, 5000);
        }

        // SISTEMA
        function toggleSettings(s) { document.getElementById('settings-panel').style.display = s ? "block" : "none"; }
        function switchTab(e, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = "none");
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).style.display = "block";
            e.currentTarget.classList.add('active');
        }
        function changeBrightness(v) { document.body.style.filter = `brightness(${v}%)`; }
        function toggleFS() { 
            if(!document.fullscreenElement) { document.documentElement.requestFullscreen(); document.getElementById('fs-txt').innerText = "ON"; }
            else { document.exitFullscreen(); document.getElementById('fs-txt').innerText = "OFF"; }
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = () => { applyGlobalLanguage('es'); if(localStorage.getItem('narcos_save')) document.getElementById('btn-cont').disabled = false; };
    </script>
</body>
</html>
