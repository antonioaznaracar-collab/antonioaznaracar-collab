<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 { font-size: 50px; }

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #e50914;
  border: none;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
}

/* MENÚ (MEJORADO) */
.menu {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-width: 700px;
  margin: auto;
}

.card {
  height: 110px; /* MÁS PEQUEÑO */
  border-radius: 14px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  transition: transform 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.03);
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.7), transparent);
}

.content {
  position: absolute;
  bottom: 10px;
  left: 10px;
}

/* AJUSTES */
.settings {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 50;
}

.settings::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

.settings-panel {
  position: absolute;
  left: 0;
  top: 0;
  width: 340px;
  height: 100%;
  background: #141414;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.4s ease;
  display: flex;
  flex-direction: column;
}

.settings.show .settings-panel {
  transform: translateX(0);
}

/* HEADER */
.settings-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.settings-header button {
  background: none;
  border: none;
  color: white;
  font-size: 22px;
  cursor: pointer;
}

/* PERFIL */
.profile-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #333;
  background-size: cover;
  background-position: center;
  border: 2px solid white;
}

#usernameInput {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

/* BOTÓN GUARDAR MEJORADO */
.profile-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #e50914;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

/* CATEGORÍAS */
.avatar-category {
  font-size: 12px;
  color: #aaa;
  margin-top: 10px;
}

/* AVATARES */
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.avatar-grid img {
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
}

.avatar-grid img:hover {
  transform: scale(1.08);
}

@media(min-width: 768px) {
  .menu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  .avatar-grid {
    grid-template-columns: repeat(6, 1fr);
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="menu">
    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content">📅 Calendario</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content">👥 Social</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content">🎬 Explorar</div>
    </div>
  </div>
</div>

<!-- AJUSTES -->
<div class="settings" id="settings">
  <div class="settings-panel">

    <div class="settings-header">
      <button onclick="toggleSettings()">←</button>
      <h2>Perfil</h2>
    </div>

    <div class="settings-body">

      <div class="profile-box">
        <div class="avatar" id="avatar"></div>

        <input type="text" id="usernameInput">

        <button onclick="saveProfile(event)">Guardar</button>
      </div>

      <div class="avatar-category">🎬 Películas</div>
      <div class="avatar-grid">
        <img src="https://cdn.shopify.com/s/files/1/1943/7257/files/Harry-Potter_large_0dad831f-4b4a-4db5-b0eb-f96e70436102_large.jpg?v=1514443105" onclick="setAvatar(this.src)">
        <img src="https://im.ziffdavisinternational.com/ign_es/screenshot/t/top-10-mejores-personajes-del-cine/top-10-mejores-personajes-del-cine_gfhw.jpg" onclick="setAvatar(this.src)">
      </div>

      <div class="avatar-category">🦸 Superhéroes</div>
      <div class="avatar-grid">
        <img src="https://filmsymphony.es/wp-content/uploads/2023/04/superman-dia-del-superheroe.jpg" onclick="setAvatar(this.src)">
        <img src="<img src="<img src="https://fotografias-2.larazon.es/assets/videojuegos/2022/12/Iron-Man.1671135520.8546.jpg?width=1900&amp;height=1069" alt="Marvel: Iron Man ha copiado una de las mejores habilidades de Spider-Man"/>"/>" onclick="setAvatar(this.src)">
      </div>

    </div>
  </div>
</div>

<script>

/* INTRO */
window.onload = () => {
  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  app.style.display = "block";

  let user = localStorage.getItem("user") || "CineUser";
  let avatar = localStorage.getItem("avatar");

  document.getElementById("usernameInput").value = user;

  if (avatar) {
    document.getElementById("avatar").style.backgroundImage = `url(${avatar})`;
  }

  setTimeout(() => {
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      app.classList.add("show");
    }, 1200);

  }, 2000);
};

/* PANEL */
function toggleSettings() {
  const s = document.getElementById("settings");

  if (s.style.display === "block") {
    s.style.display = "none";
    s.classList.remove("show");
  } else {
    s.style.display = "block";
    setTimeout(() => s.classList.add("show"), 10);
  }
}

/* GUARDAR (FIX TOTAL) */
function saveProfile(e) {
  const name = document.getElementById("usernameInput").value.trim();

  if (!name) return;

  localStorage.setItem("user", name);

  const avatar = document.getElementById("avatar").style.backgroundImage;
  if (avatar) localStorage.setItem("avatar", avatar);

  // feedback real
  const btn = e.target;
  btn.textContent = "✔ Guardado";
  setTimeout(() => btn.textContent = "Guardar", 1500);
}

/* AVATAR */
function setAvatar(src) {
  localStorage.setItem("avatar", src);
  document.getElementById("avatar").style.backgroundImage = `url(${src})`;
}

</script>

</body>
</html>
