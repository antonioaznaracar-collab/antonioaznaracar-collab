<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>System Monitor - Dashboard</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #333; padding: 40px; border-radius: 10px; background: #222; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        button:hover { background: #00cc00; }
        .status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Secure Access Gateway</h2>
    <p>Iniciando tunelización para saltar restricciones de IMT Lazarus...</p>
    <button onclick="bypassLazarus()">LANZAR CONEXIÓN SEGURA</button>
    <div class="status" id="st">Estado: Esperando acción del usuario...</div>
</div>

<script>
    function bypassLazarus() {
        const st = document.getElementById('st');
        st.innerText = "Cifrando petición y buscando túnel abierto...";
        
        // No usamos la URL directa. La dividimos y la codificamos.
        const p1 = "aHR0cHM6Ly8="; // https://
        const p2 = "Y2hhdGdwdC5jb20="; // chatgpt.com
        
        // Intentamos usar un servicio de "Web Proxy" gratuito como puente.
        // Esto hace que IMT Lazarus vea que vas a "croxyproxy.com" en lugar de "chatgpt.com"
        const proxyBase = "https://croxyproxy.com";
        const target = atob(p1) + atob(p2);
        const finalURL = proxyBase + encodeURIComponent(target);

        setTimeout(() => {
            // Abrimos en una ventana con parámetros de ocultación
            const secureWindow = window.open('', '_blank');
            
            if (secureWindow) {
                st.innerText = "Túnel establecido. Redirigiendo...";
                // Escribimos el redireccionamiento dentro de una página en blanco 
                // para que la extensión pierda el hilo de la navegación original.
                secureWindow.document.write(`
                    <html>
                    <body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">
                        <div>
                            <h2>Cargando ChatGPT vía Proxy Seguro...</h2>
                            <p>Saltando bloqueo educativo de 24h.</p>
                            <script>window.location.href = "${finalURL}";<\/script>
                        </div>
                    </body>
                    </html>
                `);
            } else {
                alert("Error: El navegador bloqueó la ventana emergente. Por favor, permítela.");
            }
        }, 1000);
    }
</script>
</body>
</html>
