<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MELON SANDBOX: MOVIE STUDIO PRO</title>
    <style>
        :root { --main-green: #4caf50; --bg-dark: #0a0a0a; }
        body { margin: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Segoe UI', Tahoma, sans-serif; color: white; }
        
        /* Interfaz de Usuario Lateral */
        #studio-panel { 
            position: absolute; left: 0; top: 0; bottom: 0; width: 260px; 
            background: #111; border-right: 2px solid var(--main-green); 
            padding: 20px; z-index: 100; box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        
        .menu-title { color: var(--main-green); font-size: 22px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .category { margin-top: 20px; color: #888; font-size: 12px; font-weight: bold; letter-spacing: 2px; }
        
        button { 
            background: #222; border: 1px solid #333; color: #ddd; width: 100%; 
            padding: 12px; margin: 6px 0; cursor: pointer; border-radius: 6px; 
            transition: 0.2s; text-align: left; font-size: 14px;
        }
        button:hover { background: var(--main-green); color: black; font-weight: bold; transform: translateX(5px); }
        button.active { background: var(--main-green); color: black; border-color: white; }

        /* Lienzo de Juego */
        #game-view { margin-left: 260px; width: calc(100% - 260px); height: 100vh; position: relative; }
        #canvas-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.1; 
            background-image: radial-gradient(#4caf50 0.5px, transparent 0.5px); background-size: 30px 30px; }
        
        .overlay-info { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #444; pointer-events: none; }
    </style>
</head>
<body>

<div id="studio-panel">
    <div class="menu-title">🎬 MOVIE LAB</div>
    
    <div class="category">PERSONAJES</div>
    <button onclick="selectTool('melon')">🍈 Sujeto Melón (Ragdoll)</button>
    <button onclick="selectTool('apple')">🍎 Sujeto Manzana</button>
    <button onclick="selectTool('robot')">🤖 Droide Metálico</button>

    <div class="category">CONSTRUCCIÓN</div>
    <button onclick="selectTool('wall')">🧱 Ladrillo de Pared</button>
    <button onclick="selectTool('pillar')">🏛️ Pilar de Edificio</button>
    <button onclick="selectTool('glass')">💎 Cristal Frágil</button>

    <div class="category">ARSENAL Y POCIONES</div>
    <button onclick="selectTool('sword')">⚔️ Espada Larga</button>
    <button onclick="selectTool('knife')">🔪 Cuchillo Arrojadizo</button>
    <button onclick="selectTool('potion')">🧪 Poción de Tamaño</button>

    <div class="category">ESCENARIO</div>
    <button onclick="addWater()">🌊 Añadir Zona de Agua</button>
    <button onclick="addLava()">🔥 Inundación de Lava</button>
    
    <button onclick="clearScene()" style="margin-top:40px; background:#400; color:white;">🗑️ BORRAR TODO</button>
</div>

<div id="game-view">
    <div id="canvas-bg"></div>
    <div class="overlay-info">
        <b>CLIC:</b> Crear | <b>ARRASTRAR:</b> Mover | <b>ESPACIO:</b> Pausar Físicas | <b>F:</b> Congelar
    </div>
</div>

<script src="https://cloudflare.com"></script>

<script>
    // --- CONFIGURACIÓN DEL MOTOR ---
    const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Body, Vector, Events } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    let selectedTool = 'melon';

    const render = Render.create({
        element: document.getElementById('game-view'),
        engine: engine,
        options: {
            width: window.innerWidth - 260,
            height: window.innerHeight,
            wireframes: false,
            background: 'transparent'
        }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    // --- ESCENARIO BASE ---
    const ground = Bodies.rectangle(1000, window.innerHeight - 25, 4000, 50, { 
        isStatic: true, render: { fillStyle: '#151515', strokeStyle: '#4caf50', lineWidth: 3 } 
    });
    Composite.add(world, ground);

    // --- HERRAMIENTAS ---
    function selectTool(tool) {
        selectedTool = tool;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    // --- GENERADOR DE RAGDOLLS (EL "ALMA" DEL JUEGO) ---
    function spawnRagdoll(x, y, color) {
        const group = Body.nextGroup(true);
        const head = Bodies.circle(x, y-50, 15, { collisionFilter: { group: group }, render: { fillStyle: color } });
        const torso = Bodies.rectangle(x, y, 30, 50, { collisionFilter: { group: group }, render: { fillStyle: '#222' } });
        const armL = Bodies.rectangle(x-25, y, 10, 40, { collisionFilter: { group: group }, render: { fillStyle: color } });
        const armR = Bodies.rectangle(x+25, y, 10, 40, { collisionFilter: { group: group }, render: { fillStyle: color } });
        const legL = Bodies.rectangle(x-10, y+45, 12, 45, { collisionFilter: { group: group }, render: { fillStyle: '#111' } });
        const legR = Bodies.rectangle(x+10, y+45, 12, 45, { collisionFilter: { group: group }, render: { fillStyle: '#111' } });

        const joints = [
            Constraint.create({ bodyA: head, bodyB: torso, pointA: {x:0, y:15}, pointB: {x:0, y:-25}, stiffness: 0.5, render: {visible: false} }),
            Constraint.create({ bodyA: armL, bodyB: torso, pointA: {x:0, y:-15}, pointB: {x:-15, y:-20}, stiffness: 0.3 }),
            Constraint.create({ bodyA: armR, bodyB: torso, pointA: {x:0, y:-15}, pointB: {x:15, y:-20}, stiffness: 0.3 }),
            Constraint.create({ bodyA: legL, bodyB: torso, pointA: {x:0, y:-20}, pointB: {x:-10, y:25}, stiffness: 0.3 }),
            Constraint.create({ bodyA: legR, bodyB: torso, pointA: {x:0, y:-20}, pointB: {x:10, y:25}, stiffness: 0.3 })
        ];

        Composite.add(world, [head, torso, armL, armR, legL, legR, ...joints]);
    }

    // --- LÓGICA DE CLIC EN EL MUNDO ---
    window.addEventListener('mousedown', (e) => {
        if (e.clientX < 260) return;
        const x = e.clientX - 260;
        const y = e.clientY;

        switch(selectedTool) {
            case 'melon': spawnRagdoll(x, y, '#4caf50'); break;
            case 'apple': spawnRagdoll(x, y, '#ff4444'); break;
            case 'robot': spawnRagdoll(x, y, '#888'); break;
            case 'wall': Composite.add(world, Bodies.rectangle(x, y, 60, 30, { render: { fillStyle: '#522' } })); break;
            case 'pillar': Composite.add(world, Bodies.rectangle(x, y, 40, 150, { render: { fillStyle: '#444' } })); break;
            case 'sword': Composite.add(world, Bodies.rectangle(x, y, 10, 80, { render: { fillStyle: '#eee' }, friction: 0.1 })); break;
            case 'potion': 
                const pot = Bodies.circle(x, y, 12, { label: 'POTION', render: { fillStyle: '#a0f' } });
                Composite.add(world, pot);
                break;
        }
    });

    // --- AGUA Y LAVA ---
    function addWater() {
        const water = Bodies.rectangle(window.innerWidth/2, window.innerHeight-60, 600, 100, { isStatic: true, isSensor: true, label: 'WATER', render: { fillStyle: 'rgba(0, 100, 255, 0.3)' } });
        Composite.add(world, water);
    }

    function addLava() {
        const lava = Bodies.rectangle(window.innerWidth/2, window.innerHeight-40, 800, 60, { isStatic: true, isSensor: true, label: 'LAVA', render: { fillStyle: '#f40' } });
        Composite.add(world, lava);
    }

    // --- SISTEMA DE COLISIONES ESPECIALES ---
    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach(pair => {
            if (pair.bodyA.label === 'LAVA' || pair.bodyB.label === 'LAVA') {
                const victim = pair.bodyA.label === 'LAVA' ? pair.bodyB : pair.bodyA;
                if(!victim.isStatic) {
                    victim.render.opacity = 0.5;
                    setTimeout(() => Composite.remove(world, victim), 400);
                }
            }
        });
    });

    // --- ARRASTRAR Y SOLTAR ---
    const mouse = Mouse.create(render.canvas);
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse, constraint: { stiffness: 0.1, render: { visible: false } }
    });
    Composite.add(world, mouseConstraint);

    // --- UTILIDADES ---
    function clearScene() { Composite.clear(world, true); Composite.add(world, ground); }
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
