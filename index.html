<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 { font-size: 50px; }

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #e50914;
  border: none;
  padding: 14px;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  font-size: 18px;
  display: none;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
  margin: auto;
}

.card {
  height: 190px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* =========================
   📅 CALENDARIO
========================= */

.calendar {
  display: none;
  padding: 20px;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.calendar-header button {
  background: none;
  border: none;
  color: white;
  font-size: 22px;
}

.calendar-days {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  margin-top: 20px;
}

.day {
  min-width: 120px;
  height: 140px;
  border-radius: 12px;
  background: #222;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.day.past {
  opacity: 0.4;
  text-decoration: line-through;
}

.day.today {
  border: 2px solid #e50914;
}

.day h3 {
  font-size: 16px;
}

.movies {
  font-size: 12px;
}

/* AJUSTES */
.settings {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 50;
}

.settings::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
}

.settings-panel {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  max-width: 420px;
  height: 100%;
  background: #141414;
  padding: 20px;
  transform: translateX(-100%);
  transition: 0.4s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.settings.show .settings-panel {
  transform: translateX(0);
}

.settings-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.settings-header h2 {
  font-size: 22px;
}

.settings-header button {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
}

/* PERFIL */
.profile-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #333;
  background-size: cover;
  background-position: center;
  border: 2px solid white;
}

#usernameInput {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  text-align: center;
}

.profile-box button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #e50914;
  color: white;
}

/* AVATARES */
.avatar-category {
  font-size: 20px;
  font-weight: bold;
  margin-top: 18px;
}

.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.avatar-grid img {
  width: 100%;
  border-radius: 50%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  cursor: pointer;
}

.avatar-grid img:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <!-- MENÚ -->
  <div class="menu" id="menu">

    <div class="card" onclick="openCalendar()" style="background-image:url('https://images.unsplash.com/photo-1506784983877-45594efa4cbe')">
      <div class="overlay"></div>
      <div class="content">📅 Calendario</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f')">
      <div class="overlay"></div>
      <div class="content">👥 Social</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba')">
      <div class="overlay"></div>
      <div class="content">🎬 Explorar</div>
    </div>

  </div>

  <!-- CALENDARIO -->
  <div id="calendar" class="calendar">

    <div class="calendar-header">
      <button onclick="closeCalendar()">←</button>
      <h2>Calendario</h2>
    </div>

    <div id="calendarDays" class="calendar-days"></div>

  </div>

</div>

<!-- AJUSTES -->
<div class="settings" id="settings">
  <div class="settings-panel">

    <div class="settings-header">
      <button onclick="toggleSettings()">←</button>
      <h2>Perfil</h2>
    </div>

    <div class="profile-box">
      <div class="avatar" id="avatar"></div>
      <input id="usernameInput">
      <button onclick="saveProfile(event)">Guardar</button>
    </div>

  </div>
</div>

<script>

window.onload = () => {

  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  app.style.display = "block";

  let user = localStorage.getItem("user") || "CineUser";
  let avatar = localStorage.getItem("avatar");

  document.getElementById("usernameInput").value = user;

  if (avatar) {
    document.getElementById("avatar").style.backgroundImage = `url(${avatar})`;
  }

  setTimeout(() => {
    intro.classList.add("hide");
    setTimeout(() => {
      intro.style.display = "none";
      document.querySelector(".settings-btn").style.display = "block";
    }, 1200);
  }, 1500);
};

function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
  setTimeout(() => s.classList.toggle("show"), 10);
}

/* CALENDARIO */
function openCalendar() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("calendar").style.display = "block";
  generateCalendar();
}

function closeCalendar() {
  document.getElementById("menu").style.display = "flex";
  document.getElementById("calendar").style.display = "none";
}

function generateCalendar() {
  const container = document.getElementById("calendarDays");
  container.innerHTML = "";

  const today = new Date();
  const start = new Date(today.getFullYear(), 0, 1);

  for (let d = new Date(start); d <= new Date(today.getFullYear(), 11, 31); d.setDate(d.getDate() + 1)) {

    const day = document.createElement("div");
    day.className = "day";

    if (d < new Date(today.toDateString())) day.classList.add("past");
    if (d.toDateString() === today.toDateString()) day.classList.add("today");

    let movies = [];

    if (Math.random() > 0.85) {
      movies.push("🎬 Peli 1");
      if (Math.random() > 0.5) movies.push("VS");
      movies.push("🎬 Peli 2");
    }

    day.innerHTML = `
      <h3>${d.getDate()}/${d.getMonth()+1}</h3>
      <div class="movies">${movies.join("<br>") || "—"}</div>
    `;

    container.appendChild(day);
  }
}

/* PERFIL */
function saveProfile(e) {
  const name = document.getElementById("usernameInput").value.trim();
  if (!name) return;

  localStorage.setItem("user", name);

  const avatar = document.getElementById("avatar").style.backgroundImage;
  if (avatar) localStorage.setItem("avatar", avatar);

  e.target.textContent = "✔ Guardado";
  setTimeout(() => e.target.textContent = "Guardar", 1500);
}

</script>

</body>
</html>
