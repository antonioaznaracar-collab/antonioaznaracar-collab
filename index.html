<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMach</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0d0d0d;
      color: white;
    }

    /* CONTENEDOR MÓVIL */
    .app {
      max-width: 420px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* INTRO */
    #intro {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    #intro h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    #intro p {
      color: #aaa;
      margin-bottom: 30px;
    }

    #intro button {
      background: #e50914;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      color: white;
      border-radius: 25px;
      cursor: pointer;
    }

    /* MENÚ */
    #menu {
      display: none;
      padding: 20px;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
    }

    /* CARDS */
    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #e50914;
    }

    .icon {
      font-size: 30px;
    }

    .card-text {
      display: flex;
      flex-direction: column;
    }

    .card-text h2 {
      font-size: 18px;
    }

    .card-text p {
      font-size: 12px;
      color: #aaa;
    }

    /* CONTENIDO */
    #contenido {
      margin-top: 20px;
      text-align: center;
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- INTRO -->
  <div id="intro">
    <h1>🎬 CineMach</h1>
    <p>Organiza, descubre y disfruta películas con tus amigos</p>
    <button onclick="entrar()">Comenzar</button>
  </div>

  <!-- MENÚ -->
  <div id="menu">
    <div class="title">
      <h1>🎬 CineMach</h1>
    </div>

    <div class="card" onclick="abrir('calendario')">
      <div class="icon">📅</div>
      <div class="card-text">
        <h2>Calendario</h2>
        <p>Organiza y busca películas</p>
      </div>
    </div>

    <div class="card" onclick="abrir('social')">
      <div class="icon">👥</div>
      <div class="card-text">
        <h2>Social</h2>
        <p>Crea grupos con amigos</p>
      </div>
    </div>

    <div class="card" onclick="abrir('explorar')">
      <div class="icon">🎬</div>
      <div class="card-text">
        <h2>Explorar</h2>
        <p>Descubre nuevas películas</p>
      </div>
    </div>

    <div id="contenido"></div>
  </div>

</div>

<script>
  function entrar() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("menu").style.display = "block";
  }

  function abrir(seccion) {
    const cont = document.getElementById("contenido");

    if (seccion === "calendario") {
      cont.innerHTML = "📅 Próximamente: calendario de películas";
    }

    if (seccion === "social") {
      cont.innerHTML = "👥 Próximamente: grupos de amigos";
    }

    if (seccion === "explorar") {
      cont.innerHTML = "🎬 Próximamente: buscador de películas";
    }
  }
</script>

</body>
</html>
