<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>My Melon Sandbox Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #121212; color: white; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🍈 Mini Sandbox</h1>
        <p>Haz clic para spawnear objetos | Arrástralos para moverlos</p>
    </div>

    <!-- Cargamos el motor de físicas Matter.js desde un CDN -->
    <script src="https://cloudflare.com"></script>
    
    <script>
        // 1. Configuración del motor de físicas
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create();
        const world = engine.world;

        // 2. Crear el lienzo (Canvas)
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false, // Desactivar para ver colores
                background: '#1a1a1a'
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        // 3. Crear suelo y paredes (objetos estáticos)
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 60, { isStatic: true });
        const leftWall = Bodies.rectangle(-25, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
        const rightWall = Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 60, window.innerHeight, { isStatic: true });
        Composite.add(world, [ground, leftWall, rightWall]);

        // 4. Función para crear "Melones" (Cajas verdes)
        function spawnBox(x, y) {
            const box = Bodies.rectangle(x, y, 40, 40, {
                render: { fillStyle: '#4caf50', strokeStyle: '#2e7d32', lineWidth: 3 }
            });
            Composite.add(world, box);
        }

        // 5. Interacción: Clic para crear y Mouse para arrastrar
        window.addEventListener('mousedown', (e) => {
            // Solo spawnea si no estamos arrastrando algo
            if (!mouseConstraint.body) {
                spawnBox(e.clientX, e.clientY);
            }
        });

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(world, mouseConstraint);

        // Ajustar al cambiar el tamaño de ventana
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
