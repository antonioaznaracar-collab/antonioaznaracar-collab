<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
}

/* salida */
.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #e50914;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
}

.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  cursor: pointer;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
}

.content h2 {
  font-size: 22px;
}

.content p {
  font-size: 13px;
  color: #ccc;
}

/* SETTINGS PANEL */
.settings {
  display: none;
  max-width: 600px;
  margin: auto;
}

.setting {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 12px;
}

/* BOTÓN GOOGLE */
.google-btn {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: white;
  color: black;
  font-weight: bold;
}

/* LOCK SOCIAL */
.locked {
  opacity: 0.4;
  pointer-events: none;
}

/* SWITCH */
.switch {
  float: right;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="header">
    <h2 id="userName"></h2>
  </div>

  <!-- MENU -->
  <div class="menu" id="menu">

    <div class="card" onclick="openSection('calendar')" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content">
        <h2>📅 Calendario</h2>
        <p>Organiza maratones</p>
      </div>
    </div>

    <div class="card" id="socialCard" onclick="openSection('social')" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content">
        <h2>👥 Social</h2>
        <p>Decide con amigos</p>
      </div>
    </div>

    <div class="card" onclick="openSection('explore')" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content">
        <h2>🎬 Explorar</h2>
        <p>Descubre películas</p>
      </div>
    </div>

  </div>

  <!-- SETTINGS -->
  <div class="settings" id="settings">

    <h2>⚙️ Ajustes</h2>

    <div class="setting">
      👤 Usuario:
      <span id="userDisplay"></span>
    </div>

    <div class="setting">
      🌍 Idioma
      <select onchange="changeLang(this.value)">
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="setting">
      🔔 Notificaciones
      <input type="checkbox" checked>
    </div>

    <button class="google-btn" onclick="loginGoogle()">
      🔵 Sign in with Google
    </button>

  </div>

</div>

<script>

/* INTRO */
window.onload = () => {

  let user = localStorage.getItem("cinemach_user");

  if (!user) {
    user = "CineUser" + Math.floor(Math.random()*9999);
    localStorage.setItem("cinemach_user", user);
  }

  document.getElementById("userName").innerText = "👤 " + user;
  document.getElementById("userDisplay").innerText = user;

  checkLogin();

  setTimeout(() => {
    const intro = document.getElementById("intro");
    const app = document.getElementById("app");

    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      app.style.display = "block";

      setTimeout(() => app.classList.add("show"), 50);

    }, 1200);

  }, 2000);
};

/* SETTINGS */
function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
}

/* LOGIN SIMULADO */
function loginGoogle() {
  localStorage.setItem("cinemach_logged", "true");
  alert("Sesión iniciada (simulada)");
  checkLogin();
}

/* BLOQUEO SOCIAL */
function checkLogin() {
  const logged = localStorage.getItem("cinemach_logged");

  if (!logged) {
    document.getElementById("socialCard").classList.add("locked");
  } else {
    document.getElementById("socialCard").classList.remove("locked");
  }
}

/* IDIOMA */
function changeLang(lang) {
  localStorage.setItem("cinemach_lang", lang);
}

function openSection(sec) {
  alert("Abriste: " + sec);
}

</script>

</body>
</html>
