<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ULTIMATE SMASH BROS 2026 - FINAL MASTER CODE</title>
    <style>
        @import url('https://googleapis.com');
        :root { --red: #ff0055; --blue: #00d2ff; --gold: #f1c40f; --purple: #d300d3; --green: #2ecc71; --dark: #0a0a1a; }

        * { cursor: none !important; user-select: none; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; color: white; }

        /* CAPAS DE SISTEMA */
        #brightness-layer { position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 100000; }
        #hand { position: fixed; font-size: 50px; z-index: 110000; pointer-events: none; transition: opacity 0.3s; }

        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: var(--dark); }
        .active { display: flex !important; }

        /* 1. MENÚ PRINCIPAL (ESTILO ULTIMATE) */
        .menu-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 2fr 1fr; gap: 15px; width: 90%; height: 85%; }
        .m-item { position: relative; cursor: pointer; transition: 0.3s; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); overflow: hidden; border: 4px solid transparent; }
        .m-item:hover { transform: scale(1.03); border-color: white; filter: brightness(1.2); }
        .m-label { position: absolute; bottom: 25px; left: 30px; font-size: 45px; font-style: italic; text-shadow: 3px 3px #000; }
        
        #btn-smash { background: linear-gradient(135deg, var(--red), #700); grid-column: 1/2; grid-row: 1/2; }
        #btn-espiritus { background: linear-gradient(135deg, var(--green), #050); }
        #btn-cajon { background: linear-gradient(135deg, var(--blue), #005); grid-column: 2/4; }
        #btn-baul { background: linear-gradient(135deg, var(--purple), #505); }

        .sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 80px; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; border-left: 2px solid #444; }
        .side-btn { font-size: 40px; transition: 0.3s; cursor: pointer; }
        .side-btn:hover { transform: rotate(90deg) scale(1.2); color: var(--gold); }

        /* 2. AJUSTES INTERACTIVOS */
        #options-screen { background: #3b0062; }
        .opt-box { background: white; color: #3b0062; padding: 20px; width: 600px; margin: 10px; display: flex; justify-content: space-between; align-items: center; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); font-size: 24px; }
        .key-cap { width: 50px; height: 50px; border: 2px solid white; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; transition: 0.1s; }
        .key-glow { background: var(--gold); color: black; box-shadow: 0 0 20px var(--gold); transform: scale(0.9); }

        /* 3. VOLVER */
        .back-btn { position: absolute; top: 30px; left: 30px; font-size: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; padding: 15px; transition: 0.3s; z-index: 1000; }
        .back-btn:hover { background: var(--red); transform: translateX(-10px); }

        /* 4. CAMPO DE BATALLA */
        #game-screen { background: radial-gradient(circle, #2a5298, #1e3c72); }
        #stage { position: absolute; bottom: 150px; width: 900px; height: 40px; background: #4CAF50; left: 50%; transform: translateX(-50%); border-bottom: 12px solid #5d3a1a; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .fighter { position: absolute; width: 110px; height: 160px; bottom: 195px; background-size: contain; background-repeat: no-repeat; background-position: bottom; z-index: 500; transition: transform 0.1s; }
        .god-mode { animation: godGlow 0.4s infinite alternate; }
        @keyframes godGlow { from { filter: drop-shadow(0 0 10px gold) hue-rotate(0deg); transform: scale(1.1); } to { filter: drop-shadow(0 0 30px white) hue-rotate(360deg); transform: scale(1.3); } }

        /* HUD JUEGO */
        #timer { position: absolute; top: 20px; font-size: 70px; font-weight: 900; }
        .dmg-ui { font-size: 90px; font-weight: 900; -webkit-text-stroke: 3px black; text-shadow: 4px 4px 0 rgba(0,0,0,0.5); }

        /* OBJETOS */
        .item { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 50%; z-index: 600; display: flex; align-items: center; justify-content: center; font-size: 40px; animation: fall 5s linear forwards; }
        @keyframes fall { from { top: -50px; } to { top: 70%; } }
    </style>
</head>
<body>

    <div id="brightness-layer"></div>
    <div id="hand">👆</div>

    <!-- PANTALLA: MENÚ -->
    <div id="menu-screen" class="screen active">
        <div class="menu-grid">
            <div class="m-item" id="btn-smash" onclick="navigate('select-screen')"><span class="m-label" id="txt-smash">Smash ⚔️</span></div>
            <div class="m-item" id="btn-espiritus"><span class="m-label" id="txt-espiritus">Espíritus 👻</span></div>
            <div class="m-item" id="btn-cajon"><span class="m-label" id="txt-cajon">Cajón de sastre 🛠️</span></div>
            <div class="m-item" id="btn-baul"><span class="m-label" id="txt-baul">Baúl 📦</span></div>
        </div>
        <div class="sidebar">
            <div class="side-btn" onclick="navigate('options-screen')">⚙️</div>
            <div class="side-btn">🏠</div>
        </div>
    </div>

    <!-- PANTALLA: OPCIONES -->
    <div id="options-screen" class="screen">
        <div class="back-btn" onclick="navigate('menu-screen')">⬅️</div>
        <h1 id="txt-opt-title">⚙️ AJUSTES</h1>
        <div class="opt-box"><span id="txt-bright">BRILLO</span> <input type="range" min="0" max="0.8" step="0.1" value="0" oninput="document.getElementById('brightness-layer').style.opacity = this.value"></div>
        <div class="opt-box"><span id="txt-diff">DIFICULTAD</span> 
            <select id="diff-sel" style="font-size:20px;">
                <option value="1">FÁCIL</option>
                <option value="2">SMASH (DIOS)</option>
            </select>
        </div>
        <div class="opt-box"><span id="txt-lang">IDIOMA</span> 
            <select id="lang-sel" style="font-size:20px;" onchange="changeLang()">
                <option value="es">Español</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <p id="txt-test">TEST TECLADO:</p>
        <div style="display:flex; gap:10px;">
            <div id="key-w" class="key-cap">W</div><div id="key-a" class="key-cap">A</div><div id="key-s" class="key-cap">S</div><div id="key-d" class="key-cap">D</div><div id="key-k" class="key-cap">K</div><div id="key-m" class="key-cap">M</div>
        </div>
    </div>

    <!-- PANTALLA: SELECCIÓN -->
    <div id="select-screen" class="screen">
        <div class="back-btn" onclick="navigate('menu-screen')">⬅️</div>
        <h1 id="txt-select-title" style="font-size: 60px;">ELIGE TU LUCHADOR</h1>
        <div style="display:flex; gap:20px;">
            <button onclick="preStart('MARIO')" style="padding:15px; font-size:20px; cursor:pointer;">MARIO</button>
            <button onclick="preStart('SONIC')" style="padding:15px; font-size:20px; cursor:pointer;">SONIC</button>
            <button onclick="preStart('KIRBY')" style="padding:15px; font-size:20px; cursor:pointer;">KIRBY</button>
            <button onclick="preStart('LINK')" style="padding:15px; font-size:20px; cursor:pointer;">LINK</button>
            <button onclick="preStart('STEVE')" style="padding:15px; font-size:20px; cursor:pointer;">STEVE</button>
        </div>
    </div>

    <!-- PANTALLA: JUEGO -->
    <div id="game-screen" class="screen">
        <div id="timer">10:00</div>
        <div id="stage"></div>
        <div id="p1" class="fighter"></div>
        <div id="ia" class="fighter"></div>
        <div style="position:absolute; bottom:30px; width:100%; display:flex; justify-content:space-around;">
            <div id="p1-dmg" class="dmg-ui" style="color:var(--red)">0%</div>
            <div id="ia-dmg" class="dmg-ui" style="color:var(--blue)">0%</div>
        </div>
    </div>

    <!-- PANTALLA: RESULTADOS -->
    <div id="results-screen" class="screen">
        <div class="back-btn" onclick="navigate('menu-screen')">🏠</div>
        <h1 style="font-size: 100px; color: var(--gold); font-style: italic;">¡VICTORIA!</h1>
        <p id="winner-name" style="font-size: 60px;"></p>
    </div>

    <script>
        const hand = document.getElementById('hand');
        let gameActive = false, p1X = 300, iaX = 850, p1Dmg = 0, iaDmg = 0, p1Hero = "";
        let p1God = false, iaTrapped = false;

        const imgs = {
            MARIO: "https://gstatic.com",
            SONIC: "https://smashbros.com",
            KIRBY: "https://smashbros.com",
            LINK: "https://smashbros.com",
            STEVE: "https://gstatic.com"
        };

        const trans = {
            es: { smash: "Smash ⚔️", espíritus: "Espíritus 👻", cajon: "Cajón de sastre 🛠️", baul: "Baúl 📦", opt: "⚙️ AJUSTES", bright: "BRILLO", lang: "IDIOMA", test: "TEST TECLADO:", select: "ELIGE TU LUCHADOR" },
            en: { smash: "Smash ⚔️", espíritus: "Spirits 👻", cajon: "Games & More 🛠️", baul: "Vault 📦", opt: "⚙️ SETTINGS", bright: "BRIGHTNESS", lang: "LANGUAGE", test: "KEYBOARD TEST:", select: "CHOOSE YOUR FIGHTER" },
            fr: { smash: "Smash ⚔️", espíritus: "Esprits 👻", cajon: "Coffre de tout 🛠️", baul: "Coffre 📦", opt: "⚙️ RÉGLAGES", bright: "LUMINOSITÉ", lang: "LANGUE", test: "TEST CLAVIER:", select: "CHOISIS TON LUTTEUR" }
        };

        window.onmousemove = (e) => { hand.style.left = e.clientX+'px'; hand.style.top = e.clientY+'px'; };

        function navigate(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            gameActive = (id === 'game-screen');
            hand.style.opacity = gameActive ? '0' : '1';
        }

        function changeLang() {
            const l = document.getElementById('lang-sel').value;
            const t = trans[l];
            document.getElementById('txt-smash').innerText = t.smash;
            document.getElementById('txt-espiritus').innerText = t.espíritus;
            document.getElementById('txt-cajon').innerText = t.cajon;
            document.getElementById('txt-baul').innerText = t.baul;
            document.getElementById('txt-opt-title').innerText = t.opt;
            document.getElementById('txt-bright').innerText = t.bright;
            document.getElementById('txt-lang').innerText = t.lang;
            document.getElementById('txt-test').innerText = t.test;
            document.getElementById('txt-select-title').innerText = t.select;
        }

        let keys = {};
        window.onkeydown = (e) => {
            const k = e.key.toLowerCase();
            keys[k] = true;
            if(k === 'escape') navigate('menu-screen');
            const cap = document.getElementById('key-'+k);
            if(cap) cap.classList.add('key-glow');
            if(gameActive && k === 'k') attack();
        };
        window.onkeyup = (e) => {
            const k = e.key.toLowerCase();
            keys[k] = false;
            const cap = document.getElementById('key-'+k);
            if(cap) cap.classList.remove('key-glow');
        };

        function preStart(hero) {
            p1Hero = hero; p1X = 300; iaX = 850; p1Dmg = 0; iaDmg = 0;
            document.getElementById('p1').style.backgroundImage = `url(${imgs[hero]})`;
            document.getElementById('ia').style.backgroundImage = `url(${imgs['STEVE']})`;
            navigate('game-screen');
            spawnItemLoop();
            battleLoop();
        }

        function attack() {
            if(Math.abs(p1X - iaX) < 100) {
                iaDmg += p1God ? 50 : 7;
                iaX += (p1X < iaX ? 60 : -60);
                updateHUD();
            }
        }

        function updateHUD() {
            document.getElementById('p1-dmg').innerText = p1Dmg + "%";
            document.getElementById('ia-dmg').innerText = iaDmg + "%";
        }

        function battleLoop() {
            if(!gameActive) return;
            if(keys['arrowleft']) p1X -= 8;
            if(keys['arrowright']) p1X += 8;

            if(!iaTrapped) {
                let speed = (document.getElementById('diff-sel').value == "2") ? 9 : 3;
                if(iaX > p1X + 85) iaX -= speed; else if(iaX < p1X - 85) iaX += speed;
                if(Math.abs(iaX - p1X) < 100 && Math.random() < 0.06) {
                    p1Dmg += 6; p1X += (iaX < p1X ? 50 : -50); updateHUD();
                }
            }

            document.getElementById('p1').style.left = p1X + "px";
            document.getElementById('ia').style.left = iaX + "px";

            if(iaX > window.innerWidth || iaX < -150) finalizeMatch(p1Hero);
            if(p1X > window.innerWidth || p1X < -150) finalizeMatch("IA STEVE");

            requestAnimationFrame(battleLoop);
        }

        function spawnItemLoop() {
            if(!gameActive) return;
            const items = [{i:'❂', t:'GOD'}, {i:'🔴', t:'POKE'}, {i:'❤️', t:'HEAL'}, {i:'⚡', t:'SPEED'}];
            const sel = items[Math.floor(Math.random()*items.length)];
            const el = document.createElement('div');
            el.className = 'item'; el.innerHTML = sel.i;
            el.style.left = Math.random()*70+15+"%";
            document.getElementById('game-screen').appendChild(el);

            let check = setInterval(() => {
                if(!gameActive) { clearInterval(check); el.remove(); return; }
                if(Math.abs(el.offsetLeft - p1X) < 60) {
                    if(sel.t === 'GOD') { p1God = true; document.getElementById('p1').classList.add('god-mode'); setTimeout(()=>{p1God=false; document.getElementById('p1').classList.remove('god-mode')}, 10000); }
                    else if(sel.t === 'POKE') { iaTrapped = true; document.getElementById('ia').style.opacity = "0.5"; setTimeout(()=>iaTrapped=false, 5000); }
                    else if(sel.t === 'HEAL') { p1Dmg = 0; updateHUD(); }
                    el.remove(); clearInterval(check);
                }
            }, 50);
            setTimeout(spawnItemLoop, 12000);
        }

        function finalizeMatch(winner) {
            gameActive = false;
            document.getElementById('winner-name').innerText = "GANADOR: " + winner;
            navigate('results-screen');
        }
    </script>
</body>
</html>
