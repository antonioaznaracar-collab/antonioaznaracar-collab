<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMach</title>

  <style>
    /* =========================
       VARIABLES Y RESET
    ==========================*/
    :root {
      --bg: #0b0b0f;
      --primary: #e50914;
      --text: #ffffff;
      --muted: #aaaaaa;
      --card: #1a1a1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, Arial;
    }

    body {
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* =========================
       INTRO
    ==========================*/
    .intro {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .intro h1 {
      font-size: 60px;
      letter-spacing: 3px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    .intro p {
      margin-top: 15px;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1s;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px var(--primary); }
      to { text-shadow: 0 0 25px #ff3b3b; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .exit {
      animation: slideUp 1s forwards;
    }

    @keyframes slideUp {
      to {
        transform: translateY(-100%);
        opacity: 0;
      }
    }

    /* =========================
       APP
    ==========================*/
    .app {
      display: none;
      padding: 20px;
      animation: fadeInApp 1s ease;
    }

    @keyframes fadeInApp {
      from {
        opacity: 0;
        transform: scale(1.05);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h2 {
      font-size: 28px;
    }

    /* CARDS */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: var(--primary);
      transform: translateY(-5px) scale(1.02);
    }

    .card h3 {
      margin-bottom: 5px;
    }

    .card p {
      font-size: 13px;
      color: var(--muted);
    }

    /* CONTENIDO */
    .content {
      margin-top: 30px;
      text-align: center;
      color: var(--muted);
      min-height: 100px;
    }

    /* RESPONSIVE */
    @media (min-width: 768px) {
      .grid {
        flex-direction: row;
        justify-content: center;
      }

      .card {
        width: 200px;
      }
    }
  </style>

</head>

<body>

  <!-- =========================
       INTRO
  ==========================-->
  <section class="intro" id="intro">
    <h1>🎬 CineMach</h1>
    <p>La nueva forma de vivir el cine con amigos</p>
  </section>

  <!-- =========================
       APP
  ==========================-->
  <section class="app" id="app">

    <div class="header">
      <h2>🎬 CineMach</h2>
    </div>

    <div class="grid">

      <div class="card" onclick="navigate('calendario')">
        <h3>📅 Calendario</h3>
        <p>Organiza tus planes de cine</p>
      </div>

      <div class="card" onclick="navigate('social')">
        <h3>👥 Social</h3>
        <p>Grupos y amigos</p>
      </div>

      <div class="card" onclick="navigate('explorar')">
        <h3>🎬 Explorar</h3>
        <p>Descubre películas</p>
      </div>

    </div>

    <div class="content" id="content"></div>

  </section>

  <!-- =========================
       SCRIPT
  ==========================-->
  <script>

    /* INTRO AUTOMÁTICA */
    window.onload = () => {
      setTimeout(() => {
        document.getElementById("intro").classList.add("exit");

        setTimeout(() => {
          document.getElementById("intro").style.display = "none";
          document.getElementById("app").style.display = "block";
        }, 1000);

      }, 2500);
    };

    /* NAVEGACIÓN */
    function navigate(section) {
      const content = document.getElementById("content");

      switch(section) {
        case "calendario":
          content.innerHTML = `
            <h3>📅 Calendario</h3>
            <p>Organiza tus películas y planes con amigos.</p>
          `;
          break;

        case "social":
          content.innerHTML = `
            <h3>👥 Social</h3>
            <p>Crea grupos y vota películas.</p>
          `;
          break;

        case "explorar":
          content.innerHTML = `
            <h3>🎬 Explorar</h3>
            <p>Busca y descubre nuevas películas.</p>
          `;
          break;
      }
    }

  </script>

</body>
</html>
