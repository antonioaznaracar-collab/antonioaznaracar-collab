<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch 2027 | Evolution</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff003c;
            --neon-blue: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- INTRO "EL TÚNEL" --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease-in-out;
        }

        /* Animación del Escáner Adaptable */
        .scanner {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 30px var(--accent);
            opacity: 0;
            animation: moveScanner 2.5s infinite;
        }

        /* MÓVIL: HORIZONTAL */
        @media (orientation: landscape) or (min-width: 800px) {
            .scanner {
                width: 5px; height: 100%;
                left: -10%;
                background: linear-gradient(to bottom, transparent, var(--accent), transparent);
            }
            @keyframes moveScanner {
                0% { left: -10%; opacity: 0; }
                50% { opacity: 1; }
                100% { left: 110%; opacity: 0; }
            }
            .menu-grid { grid-template-columns: repeat(3, 1fr) !important; }
        }

        /* PC / MÓVIL VERTICAL: VERTICAL */
        @media (orientation: portrait) and (max-width: 799px) {
            .scanner {
                width: 100%; height: 5px;
                top: -10%;
                background: linear-gradient(to right, transparent, var(--accent), transparent);
            }
            @keyframes moveScanner {
                0% { top: -10%; opacity: 0; }
                50% { opacity: 1; }
                100% { top: 110%; opacity: 0; }
            }
            .menu-grid { grid-template-columns: 1fr !important; }
        }

        .logo-intro {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 15px;
            z-index: 1000;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: pulseLogo 2s infinite alternate;
        }

        @keyframes pulseLogo {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.05); opacity: 1; }
        }

        /* --- EL MENÚ (COMO TE GUSTÓ) --- */
        #main-app {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .menu-grid {
            display: grid;
            gap: 25px;
            width: 85%;
            max-width: 1200px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.08);
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.3);
        }

        .icon { font-size: 4rem; display: block; margin-bottom: 15px; }
        .label { font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: 1.2rem; }
        .subtitle { font-size: 0.8rem; color: var(--neon-blue); margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body>

    <!-- INTRO ADAPTABLE -->
    <div id="intro-screen">
        <div class="scanner"></div>
        <div class="logo-intro">CINEMATCH</div>
    </div>

    <!-- APP PRINCIPAL -->
    <main id="main-app">
        <div class="menu-grid">
            <div class="card" onclick="alert('Maratones')">
                <span class="icon">🍿</span>
                <div class="label">Maratones</div>
                <div class="subtitle">Orden Cronológico</div>
            </div>
            <div class="card" onclick="alert('Calendario')">
                <span class="icon">📅</span>
                <div class="label">Calendario</div>
                <div class="subtitle">Hype 2027</div>
            </div>
            <div class="card" style="position: relative;" onclick="alert('Social')">
                <div style="position:absolute; top:25px; right:35px; width:12px; height:12px; background:var(--accent); border-radius:50%; box-shadow: 0 0 10px var(--accent);"></div>
                <span class="icon">👥</span>
                <div class="label">Social</div>
                <div class="subtitle">Chat de 10</div>
            </div>
        </div>
    </main>

    <script>
        // Lógica de transición
        setTimeout(() => {
            document.getElementById('intro-screen').style.opacity = '0';
            document.getElementById('main-app').style.opacity = '1';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
            }, 1000);
        }, 3500); // 3.5 segundos para apreciar el efecto
    </script>
</body>
</html>
