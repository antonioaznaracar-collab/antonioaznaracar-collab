<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
}

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* PANTALLAS */
.screen {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BOTÓN AJUSTES */
.settings-btn {
  background: #e50914;
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
  margin-top: 20px;
}

.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background-size: cover;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
}

/* SETTINGS */
.setting-box {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.back-btn {
  margin-bottom: 15px;
  background: #333;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.google-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* LOCK SOCIAL */
.locked {
  opacity: 0.4;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- MENÚ -->
<div class="screen active" id="menuScreen">

  <div class="header">
    <h2 id="userName"></h2>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
  </div>

  <div class="menu">

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content" id="calendarText">📅 Calendario</div>
    </div>

    <div class="card" id="socialCard" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content" id="socialText">👥 Social</div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content" id="exploreText">🎬 Explorar</div>
    </div>

  </div>

</div>

<!-- AJUSTES -->
<div class="screen" id="settingsScreen">

  <button class="back-btn" onclick="goBack()">⬅</button>

  <h2>⚙️ Ajustes</h2>

  <div class="setting-box">
    👤 Usuario: <span id="userDisplay"></span>
  </div>

  <div class="setting-box">
    🌍 Idioma:
    <select onchange="changeLang(this.value)">
      <option value="es">Español</option>
      <option value="en">English</option>
    </select>
  </div>

  <div class="setting-box">
    🔐 Login
    <button class="google-btn" onclick="loginGoogle()">🔵 Sign in with Google</button>
  </div>

</div>

<script>

/* TEXTO */
const t = {
  es: {
    calendar: "📅 Calendario",
    social: "👥 Social",
    explore: "🎬 Explorar",
    settings: "⚙️ Ajustes",
  },
  en: {
    calendar: "📅 Calendar",
    social: "👥 Social",
    explore: "🎬 Explore",
    settings: "⚙️ Settings",
  }
};

/* INTRO */
window.onload = () => {

  let user = localStorage.getItem("user");

  if (!user) {
    user = "User" + Math.floor(Math.random()*9999);
    localStorage.setItem("user", user);
  }

  document.getElementById("userName").innerText = "👤 " + user;
  document.getElementById("userDisplay").innerText = user;

  let lang = localStorage.getItem("lang") || "es";
  applyLang(lang);

  checkLogin();

  setTimeout(() => {
    document.getElementById("intro").classList.add("hide");
    setTimeout(() => {
      document.getElementById("intro").style.display = "none";
    }, 1200);
  }, 2000);
};

/* NAVEGACIÓN */
function openSettings() {
  switchScreen("settingsScreen");
}

function goBack() {
  switchScreen("menuScreen");
}

function switchScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* LOGIN */
function loginGoogle() {
  localStorage.setItem("logged", "true");
  alert("Sesión iniciada (simulada)");
  checkLogin();
}

/* BLOQUEO SOCIAL */
function checkLogin() {
  if (!localStorage.getItem("logged")) {
    document.getElementById("socialCard").classList.add("locked");
  } else {
    document.getElementById("socialCard").classList.remove("locked");
  }
}

/* IDIOMA */
function changeLang(lang) {
  localStorage.setItem("lang", lang);
  applyLang(lang);
}

function applyLang(lang) {
  document.getElementById("calendarText").innerText = t[lang].calendar;
  document.getElementById("socialText").innerText = t[lang].social;
  document.getElementById("exploreText").innerText = t[lang].explore;
}

</script>

</body>
</html>
