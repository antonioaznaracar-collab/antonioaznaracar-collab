<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Physics Lab Studio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; }
        #menu { position: absolute; left: 0; top: 0; width: 200px; height: 100%; background: #111; border-right: 2px solid #4caf50; padding: 15px; z-index: 10; }
        button { background: #333; border: 1px solid #444; color: #eee; width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 4px; text-align: left; font-size: 13px; }
        button:hover { background: #4caf50; color: black; }
        #view { margin-left: 200px; width: calc(100% - 200px); height: 100vh; cursor: crosshair; }
        .hint { position: absolute; bottom: 10px; right: 10px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

<div id="menu">
    <h2 style="color:#4caf50">🍈 LAB PRO</h2>
    <p style="font-size:10px">CLIC EN EL FONDO PARA CREAR</p>
    <button onclick="setMode('melon')">🟢 Sujeto Melón</button>
    <button onclick="setMode('apple')">🔴 Sujeto Manzana</button>
    <button onclick="setMode('box')">📦 Caja Pesada</button>
    <button onclick="setMode('sword')">⚔️ Espada</button>
    <button onclick="setMode('bomb')">💣 Explosivo</button>
    <hr style="border:0; border-top:1px solid #333">
    <button onclick="toggleGravity()">🌌 Gravedad ON/OFF</button>
    <button onclick="clearAll()" style="color:#ff4444">🗑️ Limpiar Todo</button>
</div>

<div id="view"></div>
<div class="hint">Shift + Clic para borrar | R para rotar</div>

<script src="https://cloudflare.com"></script>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Body, Vector } = Matter;
    const engine = Engine.create();
    const world = engine.world;
    let mode = 'melon';

    const render = Render.create({
        element: document.getElementById('view'),
        engine: engine,
        options: { width: window.innerWidth - 200, height: window.innerHeight, wireframes: false, background: '#0d0d0d' }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    // Suelo y Peligros
    const ground = Bodies.rectangle(1000, window.innerHeight - 10, 4000, 20, { isStatic: true, render: { fillStyle: '#222' } });
    const lava = Bodies.rectangle(500, window.innerHeight - 5, 600, 10, { isStatic: true, isSensor: true, label: 'LAVA', render: { fillStyle: '#f40' } });
    Composite.add(world, [ground, lava]);

    function setMode(m) { mode = m; }

    window.addEventListener('mousedown', (e) => {
        if(e.clientX < 200) return;
        const x = e.clientX - 200;
        const y = e.clientY;

        if(mode === 'melon' || mode === 'apple') {
            const c = mode === 'melon' ? '#4caf50' : '#f44336';
            const head = Bodies.circle(x, y, 15, { render: { fillStyle: c } });
            const body = Bodies.rectangle(x, y + 40, 25, 45, { render: { fillStyle: '#333' } });
            const neck = Constraint.create({ bodyA: head, bodyB: body, pointA: {x:0, y:15}, pointB: {x:0, y:-25}, stiffness: 0.4 });
            Composite.add(world, [head, body, neck]);
        } else if(mode === 'box') {
            Composite.add(world, Bodies.rectangle(x, y, 50, 50, { render: { fillStyle: '#852' } }));
        } else if(mode === 'sword') {
            Composite.add(world, Bodies.rectangle(x, y, 10, 80, { render: { fillStyle: '#ddd' } }));
        } else if(mode === 'bomb') {
            const bomb = Bodies.circle(x, y, 15, { render: { fillStyle: '#f00' }, label: 'BOMB' });
            Composite.add(world, bomb);
            setTimeout(() => {
                const bodies = Composite.allBodies(world);
                bodies.forEach(b => {
                    if(!b.isStatic) Body.applyForce(b, b.position, Vector.mult(Vector.normalise(Vector.sub(b.position, bomb.position)), 0.1));
                });
                Composite.remove(world, bomb);
            }, 2000);
        }
    });

    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: Mouse.create(render.canvas),
        constraint: { stiffness: 0.1, render: { visible: false } }
    });
    Composite.add(world, mouseConstraint);

    function toggleGravity() { engine.gravity.y = engine.gravity.y === 0 ? 1 : 0; }
    function clearAll() { Composite.clear(world, true); Composite.add(world, [ground, lava]); }
</script>
</body>
</html>
