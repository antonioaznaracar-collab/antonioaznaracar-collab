<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NARCOS: DISPATCH | Tiñi Games</title>
    <style>
        :root { --accent: #4ec9f0; --accent-dark: #1a3c4d; --police-red: #ff0000; --police-blue: #0000ff; --brightness: 100%; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; filter: brightness(var(--brightness)); }

        /* --- FONDO --- */
        #bg-container { position: fixed; width: 100%; height: 100%; background: url('https://redd.it') center/cover; z-index: 0; transition: transform 15s ease-out; }
        .vignette { position: fixed; width: 100%; height: 100%; box-shadow: inset 0 0 250px rgba(0,0,0,0.95); z-index: 1; pointer-events: none; }

        /* --- INTRO --- */
        #intro { position: fixed; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; }
        .flash { position: absolute; width: 100%; height: 100%; animation: sirenas 0.1s infinite; opacity: 0; }
        @keyframes sirenas { 0% { background: var(--police-red); opacity: 0.1; } 50% { background: var(--police-blue); opacity: 0.1; } }
        #humo { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #8a2be2 0%, transparent 80%); z-index: 999; opacity: 0; pointer-events: none; transition: 1.5s; filter: blur(60px); }

        /* --- MENÚ PRINCIPAL --- */
        #menu { position: relative; z-index: 10; height: 100%; display: none; flex-direction: column; justify-content: center; padding-left: 80px; opacity: 0; transition: 2s; }
        .logo-juego { font-size: 6rem; font-weight: 900; letter-spacing: -5px; margin-bottom: 30px; text-shadow: 0 0 30px rgba(0,0,0,1); }
        .btn-main { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 18px 40px; width: 320px; text-align: left; cursor: pointer; margin: 10px 0; font-size: 1.1rem; letter-spacing: 2px; clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%); transition: 0.3s; }
        .btn-main:hover { border-color: var(--accent); background: var(--accent-dark); padding-left: 55px; }

        /* --- AJUSTES ESTILO DISPATCH (MÁXIMO NIVEL) --- */
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 20, 30, 0.95); z-index: 200; padding: 50px 100px; box-sizing: border-box; backdrop-filter: blur(10px); }
        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        .tab { padding: 15px 40px; border: 1px solid rgba(255,255,255,0.2); border-bottom: none; border-radius: 10px 10px 0 0; cursor: pointer; background: rgba(255,255,255,0.05); color: #888; font-weight: bold; margin-right: 5px; }
        .tab.active { background: var(--accent-dark); color: var(--accent); border-top: 3px solid var(--accent); }
        
        .setting-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .setting-row:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }
        .st-name { font-weight: bold; letter-spacing: 1px; }
        
        /* Controles */
        .control { background: #000; border: 1px solid #333; padding: 10px 20px; color: var(--accent); font-weight: bold; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 20px; }
        input[type="range"] { width: 200px; accent-color: var(--accent); }
        select { background: transparent; color: var(--accent); border: none; font-size: 1rem; font-family: inherit; cursor: pointer; }

        /* --- UI RADAR --- */
        .radar { position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; border: 1px solid var(--accent); border-radius: 50%; opacity: 0.3; }
        .radar-line { position: absolute; width: 50%; height: 2px; background: var(--accent); top: 50%; left: 50%; transform-origin: left; animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="siren" loop src="https://soundjay.com"></audio>

    <div id="humo"></div>
    <div class="vignette"></div>
    <div id="bg-container"></div>

    <!-- Intro -->
    <div id="intro" onclick="start()">
        <div class="flash" id="f"></div>
        <h1 id="lt" style="font-size: 4rem; letter-spacing: 15px; opacity:0; transition: 2.5s;">TIÑI GAMES</h1>
    </div>

    <!-- Radar y Coordenadas -->
    <div class="radar"><div class="radar-line"></div></div>
    <div style="position:fixed; top:30px; right:40px; color:var(--accent); text-align:right; font-size:0.8rem; opacity:0.6;">
        COORD: 35.0844 N / 106.6504 W<br>SYSTEM: ACTIVE_SCAN_001
    </div>

    <!-- Menú Principal -->
    <div id="menu">
        <div style="color:var(--accent); letter-spacing:4px; font-size:0.8rem; margin-bottom:10px;">CAPÍTULO 1 // DESIERTO</div>
        <div class="logo-juego">NARCOS</div>
        <button class="btn-main" onclick="alert('Iniciando...')">NUEVA PARTIDA</button>
        <button class="btn-main" onclick="alert('Cargando...')">CONTINUAR</button>
        <button class="btn-main" onclick="toggleSettings(true)">AJUSTES</button>
    </div>

    <!-- Panel Ajustes (Estilo Dispatch) -->
    <div id="settings-panel">
        <h1 style="margin-top:0; letter-spacing:5px;">SETTINGS</h1>
        <div class="tabs">
            <div class="tab active">GENERAL</div>
            <div class="tab">DISPLAY</div>
            <div class="tab">SOUND</div>
        </div>

        <div class="setting-row">
            <div class="st-name">BRILLO DE PANTALLA</div>
            <div class="control">
                <input type="range" min="30" max="150" value="100" oninput="document.documentElement.style.setProperty('--brightness', this.value + '%')">
            </div>
        </div>

        <div class="setting-row">
            <div class="st-name">LANGUAGE</div>
            <div class="control">
                <select>
                    <option>ENGLISH</option>
                    <option selected>ESPAÑOL</option>
                    <option>DEUTSCH</option>
                </select>
            </div>
        </div>

        <div class="setting-row">
            <div class="st-name">MODO PANTALLA COMPLETA</div>
            <div class="control">ACTIVO (ON)</div>
        </div>

        <button class="btn-main" style="margin-top:40px;" onclick="toggleSettings(false)">BACK / ATRÁS</button>
    </div>

    <script>
        function start() {
            // Pantalla Completa Automática
            if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); }
            
            document.getElementById('siren').play();
            document.getElementById('f').style.opacity = '1';
            document.getElementById('lt').style.opacity = '1';

            setTimeout(() => {
                document.getElementById('humo').style.opacity = '1';
                document.getElementById('lt').style.opacity = '0';
            }, 3000);

            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('humo').style.opacity = '0';
                document.getElementById('menu').style.display = 'flex';
                setTimeout(() => { document.getElementById('menu').style.opacity = '1'; }, 100);
                document.getElementById('bg-container').style.transform = 'scale(1.15)';
            }, 4500);
        }

        function toggleSettings(s) { document.getElementById('settings-panel').style.display = s ? 'block' : 'none'; }
    </script>
</body>
</html>
