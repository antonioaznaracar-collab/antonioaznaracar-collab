<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* =====================
   INTRO
===================== */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
  letter-spacing: 2px;
}

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* =====================
   APP
===================== */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #e50914;
  border: none;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  color: white;
}

/* =====================
   MENÚ NETFLIX STYLE
===================== */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
}

.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.35s ease;
}

.card:hover {
  transform: scale(1.03);
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  z-index: 2;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

/* =========================
   🔥 AJUSTES PRO
========================= */
.settings {
  position: fixed;
  inset: 0;
  background: #0b0b0f;
  display: none;
  flex-direction: column;
  z-index: 20;
}

/* HEADER */
.settings-header {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 20px;
}

.settings-header button {
  background: transparent;
  border: none;
  color: white;
  font-size: 28px;
  cursor: pointer;
}

/* CONTENIDO */
.settings-content {
  padding: 30px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

/* PERFIL */
.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
}

/* AVATAR */
.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: #222;
  background-size: cover;
  background-position: center;
  border: 3px solid white;
}

/* INPUT */
#usernameInput {
  padding: 12px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

/* BOTÓN GUARDAR */
.save-btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #e50914;
  color: white;
  cursor: pointer;
}

/* GRID AVATARES */
.avatar-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.avatar-grid img {
  width: 100%;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s;
}

.avatar-grid img:hover {
  transform: scale(1.1);
}

@media(min-width: 768px) {
  .menu {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    max-width: 1000px;
  }

  .avatar-grid {
    grid-template-columns: repeat(6, 1fr);
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="header">
    <h1>CineMach</h1>
  </div>

  <div class="menu">

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
      <div class="overlay"></div>
      <div class="content"><h2>📅 Calendario</h2></div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
      <div class="overlay"></div>
      <div class="content"><h2>👥 Social</h2></div>
    </div>

    <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
      <div class="overlay"></div>
      <div class="content"><h2>🎬 Explorar</h2></div>
    </div>

  </div>
</div>

<!-- AJUSTES -->
<div class="settings" id="settings">

  <div class="settings-header">
    <button onclick="toggleSettings()">←</button>
    <h2>⚙️ Ajustes</h2>
  </div>

  <div class="settings-content">

    <div class="profile">
      <div class="avatar" id="avatar"></div>

      <input type="text" id="usernameInput" placeholder="Tu nombre">

      <button class="save-btn" onclick="saveProfile()">💾 Guardar</button>
    </div>

    <h3>🎭 Elegir personaje</h3>

    <div class="avatar-grid">
      <img src="https://image.tmdb.org/t/p/w200/5Kg76ldv7V1q7v9Zp1R6.jpg" onclick="setAvatar(this.src)">
      <img src="https://image.tmdb.org/t/p/w200/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg" onclick="setAvatar(this.src)">
      <img src="https://image.tmdb.org/t/p/w200/9G2hQnVZ9y8Q7lY7R8r5v7Z.jpg" onclick="setAvatar(this.src)">
      <img src="https://image.tmdb.org/t/p/w200/4U9G4Yk5Xh9.jpg" onclick="setAvatar(this.src)">
    </div>

  </div>
</div>

<script>

/* INTRO */
window.onload = () => {

  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  let user = localStorage.getItem("user");
  if (!user) {
    user = "CineUser" + Math.floor(Math.random()*9999);
    localStorage.setItem("user", user);
  }

  document.getElementById("usernameInput").value = user;
  document.getElementById("avatar").style.backgroundImage = `url(${localStorage.getItem("avatar") || ''})`;

  app.style.display = "block";

  setTimeout(() => {
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      app.classList.add("show");
    }, 1200);

  }, 2000);
};

/* AJUSTES */
function toggleSettings() {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "flex" ? "none" : "flex";
}

/* GUARDAR PERFIL */
function saveProfile() {
  const name = document.getElementById("usernameInput").value;

  if (name) {
    localStorage.setItem("user", name);
  }
}

/* AVATAR */
function setAvatar(src) {
  localStorage.setItem("avatar", src);
  document.getElementById("avatar").style.backgroundImage = `url(${src})`;
}

</script>

</body>
</html>
