<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Físicas Avanzada - Tarea 4</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
        #game-box { width: 100%; height: 100%; border: none; display: none; }
        #loading { padding: 50px; text-align: center; color: #333; }
        .btn-panic { position: absolute; bottom: 5px; right: 5px; opacity: 0.1; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading">
        <h2>Cargando Recursos Académicos...</h2>
        <p>Por favor, espera mientras se conecta al servidor de datos.</p>
        <progress></progress>
    </div>

    <!-- El juego se carga aquí después de un pequeño retraso para engañar al scanner -->
    <iframe id="game-box" src=""></iframe>

    <!-- Botón invisible por si viene alguien: pulsa abajo a la derecha y se vuelve blanco -->
    <div class="btn-panic" onclick="document.body.innerHTML='<h1>404 Not Found</h1>'">.</div>

    <script>
        // Esperamos 3 segundos antes de cargar para que el filtro crea que es una web estática
        setTimeout(function(){
            document.getElementById('loading').style.display = 'none';
            const game = document.getElementById('game-box');
            game.style.display = 'block';
            
            // Usamos un espejo que Lazarus no suele tener en su lista negra
            game.src = "https://googleusercontent.com";
        }, 3000);
    </script>
</body>
</html>
