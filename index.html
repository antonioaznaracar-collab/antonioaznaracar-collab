<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMatch 2027 | Pro Fix</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://google.com" async defer></script>
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff003c;
            --glass: rgba(255, 255, 255, 0.08);
            --text-sec: #00f2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- INTRO --- */
        #intro-screen { position: fixed; inset: 0; background: black; z-index: 2000; display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .logo-intro { font-family: 'Bebas Neue', sans-serif; font-size: 15vw; letter-spacing: 10px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* --- PÁGINAS --- */
        .page { position: absolute; inset: 0; display: none; background: radial-gradient(circle at center, #151525 0%, #050505 100%); padding: 20px; overflow-y: auto; }
        .active-page { display: flex !important; flex-direction: column; align-items: center; justify-content: center; }

        .menu-container { display: grid; gap: 30px; width: 95%; max-width: 1400px; margin: auto; }
        
        /* MÓVIL VERTICAL */
        @media (orientation: portrait) { 
            .menu-container { grid-template-columns: 1fr; padding-top: 40px; padding-bottom: 80px; } 
            .card { height: 25vh; } 
        }
        
        /* PC HORIZONTAL */
        @media (orientation: landscape) { 
            .menu-container { grid-template-columns: repeat(3, 1fr); height: 75vh; } 
            .card { height: 100%; }
        }

        /* --- TARJETAS GRANDES Y CON HOVER --- */
        .card { 
            background: var(--glass); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 35px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 40px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(20px); 
            position: relative; 
            cursor: pointer;
        }

        /* EL EFECTO ROJO QUE FALTABA */
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-15px) scale(1.03);
            background: rgba(255, 0, 60, 0.05);
            box-shadow: 0 20px 60px rgba(255, 0, 60, 0.3);
        }

        .card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .card.locked:hover { transform: none; border-color: rgba(255,255,255,0.1); box-shadow: none; }

        .icon { font-size: clamp(3.5rem, 12vh, 6rem); margin-bottom: 20px; }
        .label { font-weight: 900; text-transform: uppercase; letter-spacing: 3px; font-size: clamp(1.2rem, 3vh, 2rem); }
        .subtitle { font-size: 0.8rem; color: var(--text-sec); margin-top: 10px; font-weight: bold; }

        /* --- BOTÓN GOOGLE --- */
        .google-btn {
            background-color: #131314; color: white; border: 1px solid #8e918f;
            border-radius: 20px; padding: 12px 28px; display: flex; align-items: center;
            justify-content: center; gap: 12px; cursor: pointer; font-weight: 500;
            transition: background 0.3s; margin-top: 20px;
        }
        .google-btn:hover { background-color: #1e1e1f; }
        .google-icon { width: 20px; height: 20px; }

        /* AJUSTES */
        .settings-card { background: var(--glass); width: 100%; max-width: 600px; padding: 25px; border-radius: 25px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .btn { background: var(--accent); border: none; color: white; padding: 15px 30px; border-radius: 18px; font-weight: 900; cursor: pointer; }
        #user-input { background: #111; color: var(--text-sec); border: 1px solid var(--accent); padding: 12px; border-radius: 12px; width: 100%; text-align: center; font-family: 'Inter', sans-serif; font-size: 1.1rem; }
        #settings-btn { position: fixed; top: 25px; right: 25px; z-index: 100; font-size: 1.8rem; background: var(--glass); padding: 12px; border-radius: 50%; cursor: pointer; transition: transform 0.3s; }
        #settings-btn:hover { transform: rotate(90deg); }
        
        .error-msg { color: var(--accent); font-size: 0.8rem; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="intro-screen"><div class="logo-intro">CINEMATCH</div></div>
    <div id="settings-btn" onclick="goTo('settings')">⚙️</div>

    <!-- PÁGINA: HOME -->
    <main id="page-home" class="page active-page">
        <div class="menu-container">
            <div class="card" onclick="vibrate()">
                <span class="icon">🍿</span>
                <div class="label" data-key="marathons">Maratones</div>
                <div class="subtitle">Orden Cronológico</div>
            </div>
            <div class="card" onclick="vibrate()">
                <span class="icon">📅</span>
                <div class="label" data-key="calendar">Calendario</div>
                <div class="subtitle">Hype 2027</div>
            </div>
            <div id="card-social" class="card locked" onclick="checkSocial()">
                <div id="social-lock" style="position:absolute; top:20px; right:25px; font-size: 1.5rem;">🔒</div>
                <span class="icon">👥</span>
                <div class="label" data-key="social">Social</div>
                <div class="subtitle">Club de 10</div>
            </div>
        </div>
    </main>

    <!-- PÁGINA: AJUSTES -->
    <div id="page-settings" class="page">
        <div class="settings-card">
            <button class="btn" onclick="goTo('home')">← <span data-key="back">Volver</span></button>
            <h1 style="font-family:'Bebas Neue'; letter-spacing:4px; margin: 10px 0;" data-key="settings">Ajustes</h1>
            
            <div style="display:flex; justify-content:space-between; align-items: center;"><b data-key="lang">Idioma</b>
                <select onchange="changeLang(this.value)" style="background:#111; color:white; border:1px solid var(--accent); padding: 10px; border-radius: 10px;">
                    <option value="es">Español</option><option value="en">English</option><option value="fr">Français</option>
                </select>
            </div>

            <div style="margin-top: 20px;">
                <b data-key="user">Usuario</b>
                <input type="text" id="user-input" placeholder="Tu apodo..." oninput="validateAndSave(this.value)">
                <div id="name-error" class="error-msg">⚠️ Este nombre ya está en uso</div>
            </div>

            <div id="login-section" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <div data-key="session" style="text-align:center; font-size: 0.9rem; margin-bottom: 10px;">Inicia sesión para Social Hub</div>
                <div class="google-btn" onclick="fakeLogin()">
                    <img src="https://wikimedia.org" class="google-icon">
                    Sign in with Google
                </div>
            </div>
        </div>
    </div>

    <script>
        const langData = {
            es: { marathons: "Maratones", calendar: "Calendario", social: "Social", settings: "Ajustes", back: "Volver", lang: "Idioma", user: "Usuario", session: "Sesión", login_req: "¡Inicia sesión primero!" },
            en: { marathons: "Marathons", calendar: "Calendar", social: "Social", settings: "Settings", back: "Back", lang: "Language", user: "Username", session: "Session", login_req: "Login required!" },
            fr: { marathons: "Marathons", calendar: "Calendrier", social: "Social", settings: "Réglages", back: "Retour", lang: "Langue", user: "Utilisateur", session: "Session", login_req: "Connexion requise !" }
        };

        const takenNames = ["Thanos_271", "IronMan", "Admin"];
        let userLoggedIn = false;
        let currentLang = 'es';

        window.onload = () => {
            const saved = localStorage.getItem('cineMatch_name');
            if (saved) document.getElementById('user-input').value = saved;
            setTimeout(() => { document.getElementById('intro-screen').style.transform = 'translateY(-100%)'; }, 2500);
        };

        function validateAndSave(name) {
            const errorEl = document.getElementById('name-error');
            if (takenNames.includes(name)) {
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';
            localStorage.setItem('cineMatch_name', name);
        }

        function fakeLogin() {
            userLoggedIn = true;
            const newName = "User_" + Math.floor(Math.random() * 888);
            document.getElementById('user-input').value = newName;
            localStorage.setItem('cineMatch_name', newName);
            document.getElementById('card-social').classList.remove('locked');
            document.getElementById('social-lock').innerText = "🟢";
            document.getElementById('login-section').style.display = 'none';
            alert("¡Login Exitoso!");
            goTo('home');
        }

        function goTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('page-' + id).classList.add('active-page');
            vibrate();
        }

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-key]').forEach(el => {
                el.innerText = langData[lang][el.getAttribute('data-key')];
            });
        }

        function checkSocial() {
            if(!userLoggedIn) alert(langData[currentLang].login_req);
            else alert("¡Entrando a Social!");
        }

        function vibrate() { if (navigator.vibrate) navigator.vibrate(15); }
    </script>
</body>
</html>
