<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
    <script>
        (function() {
            // Ofuscamos la URL de YouTube para que Lazarus no la detecte al escanear el código
            var parte1 = "htt";
            var parte2 = "ps://www.you";
            var parte3 = "tube.com";
            var urlFinal = parte1 + "ps://www.you" + "tube.com";

            // Detenemos la carga de cualquier otro script de la página

            // Redirección forzada que reemplaza la entrada del historial
            setTimeout(function() {
                window.location.replace(urlFinal);
            }, 50); 
        })();
    </script>
