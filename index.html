<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 1.2s ease, transform 1.2s ease;
}
.intro h1 { font-size: 50px; }
.hide { opacity: 0; transform: scale(1.1); }

/* APP */
.app { display: none; padding: 20px; }

/* BOTÓN */
.settings-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  z-index: 999;
  background: #e50914;
  border: none;
  padding: 14px;
  border-radius: 12px;
  color: white;
  display: none;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 600px;
  margin: auto;
}

.card {
  height: 190px;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* CALENDARIO */
.calendar-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #050507;
  z-index: 1000;
  overflow-y: auto;
  padding: 20px;
}

.calendar-header {
  font-size: 28px;
  margin-bottom: 20px;
}

.month {
  margin-bottom: 40px;
}

.month-title {
  font-size: 22px;
  margin-bottom: 10px;
}

/* DÍA */
.day {
  height: 120px;
  border-radius: 16px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}

.day-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: blur(6px) brightness(0.6);
}

.day-content {
  position: relative;
  z-index: 2;
  padding: 10px;
}

.day.past {
  text-decoration: line-through;
  opacity: 0.6;
}

/* AJUSTES (NO TOCADO) */
.settings { position: fixed; inset: 0; display: none; z-index: 50; }
.settings::before { content:""; position:absolute; inset:0; background:rgba(0,0,0,0.7); }

.settings-panel {
  position:absolute;
  left:0;
  top:0;
  width:100%;
  max-width:420px;
  height:100%;
  background:#141414;
  padding:20px;
  transform:translateX(-100%);
  transition:0.4s;
  overflow-y:auto;
}

.settings.show .settings-panel { transform: translateX(0); }

.avatar-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.avatar-grid img {
  border-radius:50%;
  aspect-ratio:1;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<div class="app" id="app">

  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

  <div class="menu">

    <div class="card" onclick="openCalendar()" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4')">
      <div class="overlay"></div>
      <div class="content">📅 Calendario</div>
    </div>

    <div class="card">
      <div class="overlay"></div>
      <div class="content">👥 Social</div>
    </div>

    <div class="card">
      <div class="overlay"></div>
      <div class="content">🎬 Explorar</div>
    </div>

  </div>
</div>

<!-- CALENDARIO -->
<div class="calendar-screen" id="calendar">

  <div class="calendar-header">📅 Abril 2026</div>

  <div class="month">

    <!-- Ejemplo Mario -->
    <div class="day" data-date="2026-04-01">
      <div class="day-bg" style="background-image:url('https://image.tmdb.org/t/p/w500/ckCZhWsgW0y9A4V4rJZy.jpg')"></div>
      <div class="day-content">
        <strong>1 Abril</strong><br>
        Super Mario Bros 🍄
      </div>
    </div>

    <!-- Hoy -->
    <div class="day" data-date="2026-04-06">
      <div class="day-bg"></div>
      <div class="day-content">
        <strong>6 Abril (HOY)</strong>
      </div>
    </div>

  </div>

</div>

<script>

// INTRO
window.onload = () => {
  const intro = document.getElementById("intro");
  const app = document.getElementById("app");

  app.style.display = "block";

  setTimeout(() => {
    intro.classList.add("hide");

    setTimeout(() => {
      intro.style.display = "none";
      document.querySelector(".settings-btn").style.display = "block";
      marcarDias();
      scrollHoy();
    }, 1200);

  }, 1500);
};

// CALENDARIO
function openCalendar() {
  document.getElementById("calendar").style.display = "block";
}

// MARCAR PASADOS
function marcarDias() {
  const hoy = new Date();

  document.querySelectorAll(".day").forEach(d => {
    const fecha = new Date(d.dataset.date);
    if (fecha < hoy) d.classList.add("past");
  });
}

// SCROLL A HOY
function scrollHoy() {
  const hoy = new Date().toISOString().split("T")[0];
  const el = document.querySelector(`[data-date="${hoy}"]`);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
}

// SETTINGS (igual)
function toggleSettings() {
  const s = document.getElementById("settings");

  if (s.style.display === "block") {
    s.style.display = "none";
    s.classList.remove("show");
  } else {
    s.style.display = "block";
    setTimeout(() => s.classList.add("show"), 10);
  }
}

</script>

</body>
</html>
