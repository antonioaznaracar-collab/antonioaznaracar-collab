<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NARCOS: DISPATCH | Tiñi Games Official</title>
    <style>
        :root { --accent: #39ff14; --purple: #8a2be2; --police-red: #ff0000; --police-blue: #0000ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: white; }

        /* --- FONDO DINÁMICO --- */
        #bg-container { position: fixed; width: 100%; height: 100%; background: url('https://redd.it') center/cover; z-index: 0; transition: transform 20s ease-out; }
        .vignette { position: fixed; width: 100%; height: 100%; box-shadow: inset 0 0 200px rgba(0,0,0,0.9); z-index: 1; pointer-events: none; }

        /* --- INTRO & HUMO --- */
        #intro { position: fixed; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; }
        .flash { position: absolute; width: 100%; height: 100%; animation: sirenas 0.1s infinite; opacity: 0; }
        @keyframes sirenas { 0% { background: var(--police-red); opacity: 0.1; } 50% { background: var(--police-blue); opacity: 0.1; } }
        
        #humo-transicion { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, var(--purple) 0%, transparent 80%); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 2s ease; filter: blur(60px); }

        /* --- MENÚ PRINCIPAL --- */
        #menu { position: relative; z-index: 10; height: 100%; display: none; flex-direction: column; justify-content: center; padding-left: 100px; opacity: 0; transition: opacity 3s ease; }
        
        .logo-juego { font-size: 7rem; font-weight: 900; letter-spacing: -8px; margin-bottom: 5px; animation: glitch 5s infinite; position: relative; }
        @keyframes glitch { 0% { text-shadow: 2px 2px var(--police-red); } 1% { transform: skew(2deg); } 2% { transform: skew(0deg); text-shadow: -2px -2px var(--police-blue); } 100% { text-shadow: 3px 3px rgba(0,0,0,0.5); } }

        .capitulo-tag { color: var(--accent); letter-spacing: 5px; font-size: 0.8rem; margin-bottom: 50px; opacity: 0.8; }

        .btn-group { display: flex; flex-direction: column; gap: 20px; }
        button { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 18px 40px; width: 320px; text-align: left; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); letter-spacing: 3px; }
        button:hover { color: #fff; border-color: var(--accent); box-shadow: 0 0 30px rgba(57, 255, 20, 0.3); padding-left: 60px; background: rgba(57, 255, 20, 0.05); }

        /* --- INTERFAZ RADAR --- */
        .radar { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; border: 1px solid var(--accent); border-radius: 50%; opacity: 0.3; }
        .radar::after { content: ''; position: absolute; width: 50%; height: 2px; background: var(--accent); top: 50%; left: 50%; transform-origin: left; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .ui-top { position: absolute; top: 30px; right: 50px; text-align: right; color: var(--accent); font-size: 0.7rem; opacity: 0.5; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- Audio (Sirenas) -->
    <audio id="sirena-audio" loop>
        <source src="https://soundjay.com" type="audio/mpeg">
    </audio>

    <div id="humo-transicion"></div>
    <div class="vignette"></div>
    <div id="bg-container"></div>

    <!-- Pantalla de Inicio / Intro -->
    <div id="intro" onclick="iniciarExperiencia()">
        <div class="flash" id="flash-efecto"></div>
        <h1 id="logo-tiñi" style="font-size: 3rem; letter-spacing: 20px; transition: 3s; opacity:0;">TIÑI GAMES</h1>
        <p id="tap-msg" style="position:absolute; bottom:20%; font-size:0.8rem; color:#444;">[ HAZ CLIC PARA INICIAR SISTEMA ]</p>
    </div>

    <!-- Decoración UI -->
    <div class="ui-top">
        FREQ: 460.125 MHz (DEA_BAND)<br>
        ALBUQUERQUE SECTOR: 7-G<br>
        <span id="reloj">00:00:00</span>
    </div>
    <div class="radar"></div>

    <!-- Menú Principal -->
    <div id="menu">
        <div class="capitulo-tag">CAPÍTULO 1 // DESIERTO DE CRISTAL</div>
        <div class="logo-juego">NARCOS</div>
        <div class="btn-group">
            <button onclick="alert('Iniciando Conexión con Jesse...')">NUEVA PARTIDA</button>
            <button onclick="alert('No hay grabaciones previas.')">CONTINUAR</button>
            <button onclick="alert('Ajustes no disponibles en v1.0')">CONFIGURACIÓN</button>
        </div>
    </div>

    <script>
        function iniciarExperiencia() {
            const audio = document.getElementById('sirena-audio');
            const flash = document.getElementById('flash-efecto');
            const logo = document.getElementById('logo-tiñi');
            const intro = document.getElementById('intro');
            const humo = document.getElementById('humo-transicion');
            const menu = document.getElementById('menu');

            // Quitar mensaje de clic
            document.getElementById('tap-msg').style.opacity = '0';

            // Iniciar Audio y Luces
            audio.play();
            flash.style.opacity = '1';
            logo.style.opacity = '1';

            // 3 segundos después: Humo Púrpura y transición
            setTimeout(() => {
                humo.style.opacity = '1';
                logo.style.transform = 'scale(1.3)';
                logo.style.filter = 'blur(10px)';
                logo.style.opacity = '0';
            }, 3000);

            // 5 segundos después: Aparece Menú y baja volumen
            setTimeout(() => {
                intro.style.display = 'none';
                humo.style.opacity = '0';
                menu.style.display = 'flex';
                setTimeout(() => { menu.style.opacity = '1'; }, 100);
                
                // Efecto zoom suave en el fondo
                document.getElementById('bg-container').style.transform = 'scale(1.15)';
                
                // Bajar volumen poco a poco
                let fadeAudio = setInterval(() => {
                    if (audio.volume > 0.1) { audio.volume -= 0.1; } 
                    else { clearInterval(fadeAudio); }
                }, 200);
            }, 5000);
        }

        // Reloj UI
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
