<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMach</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  background: #050507;
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.intro h1 {
  font-size: 50px;
}

.hide {
  opacity: 0;
  transform: scale(1.1);
}

/* APP */
.app {
  display: none;
  padding: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 15px;
}

/* BOTÓN AJUSTES */
.settings-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #e50914;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* MENÚ */
.menu {
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 700px;
  margin: auto;
}

.card {
  position: relative;
  height: 170px;
  border-radius: 20px;
  background-size: cover;
  background-position: center;
  overflow: hidden;
  cursor: pointer;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75), transparent);
}

.content {
  position: absolute;
  bottom: 15px;
  left: 15px;
}

/* PANTALLAS */
.screen {
  display: none;
}

.active {
  display: block;
}

/* SETTINGS */
.settings-box {
  max-width: 600px;
  margin: auto;
}

.setting {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 12px;
}

.back-btn {
  margin-bottom: 15px;
  background: #333;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.google-btn {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: white;
  color: black;
  font-weight: bold;
}

/* BLOQUEO */
.locked {
  opacity: 0.4;
  pointer-events: none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>🎬 CineMach</h1>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- MENÚ -->
  <div class="screen active" id="menuScreen">

    <button class="settings-btn" onclick="openSettings()">⚙️</button>

    <div class="header">
      <h2 id="userName"></h2>
    </div>

    <div class="menu">

      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">
        <div class="overlay"></div>
        <div class="content" id="calendarText">📅 Calendario</div>
      </div>

      <div class="card" id="socialCard" style="background-image:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f');">
        <div class="overlay"></div>
        <div class="content" id="socialText">👥 Social</div>
      </div>

      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">
        <div class="overlay"></div>
        <div class="content" id="exploreText">🎬 Explorar</div>
      </div>

    </div>

  </div>

  <!-- AJUSTES -->
  <div class="screen" id="settingsScreen">

    <div class="settings-box">

      <button class="back-btn" onclick="goBack()">⬅ Volver</button>

      <h2>⚙️ Ajustes</h2>

      <div class="setting">
        👤 Usuario: <span id="userDisplay"></span>
      </div>

      <div class="setting">
        🌍 Idioma:
        <select onchange="changeLang(this.value)">
          <option value="es">Español</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="setting">
        🔐 Sesión:
        <button class="google-btn" onclick="loginGoogle()">🔵 Sign in with Google</button>
      </div>

    </div>

  </div>

</div>

<script>

/* TEXTO */
const t = {
  es: {
    calendar: "📅 Calendario",
    social: "👥 Social",
    explore: "🎬 Explorar",
  },
  en: {
    calendar: "📅 Calendar",
    social: "👥 Social",
    explore: "🎬 Explore",
  }
};

/* INTRO */
window.onload = () => {

  let user = localStorage.getItem("user");

  if (!user) {
    user = "User" + Math.floor(Math.random()*9999);
    localStorage.setItem("user", user);
  }

  document.getElementById("userName").innerText = "👤 " + user;
  document.getElementById("userDisplay").innerText = user;

  let lang = localStorage.getItem("lang") || "es";
  applyLang(lang);

  checkLogin();

  setTimeout(() => {
    document.getElementById("intro").classList.add("hide");

    setTimeout(() => {
      document.getElementById("intro").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("app").classList.add("show");
    }, 1200);

  }, 2000);
};

/* NAVEGACIÓN */
function openSettings() {
  document.getElementById("menuScreen").classList.remove("active");
  document.getElementById("settingsScreen").classList.add("active");
}

function goBack() {
  document.getElementById("settingsScreen").classList.remove("active");
  document.getElementById("menuScreen").classList.add("active");
}

/* LOGIN */
function loginGoogle() {
  localStorage.setItem("logged", "true");
  alert("Sesión iniciada (simulada)");
  checkLogin();
}

/* BLOQUEO SOCIAL */
function checkLogin() {
  if (!localStorage.getItem("logged")) {
    document.getElementById("socialCard").classList.add("locked");
  } else {
    document.getElementById("socialCard").classList.remove("locked");
  }
}

/* IDIOMA */
function changeLang(lang) {
  localStorage.setItem("lang", lang);
  applyLang(lang);
}

function applyLang(lang) {
  document.getElementById("calendarText").innerText = t[lang].calendar;
  document.getElementById("socialText").innerText = t[lang].social;
  document.getElementById("exploreText").innerText = t[lang].explore;
}

</script>

</body>
</html>
