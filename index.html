<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SMASH NINJA: BATTLEFIELD</title>
    <style>
        @import url('https://googleapis.com');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Permanent Marker', cursive; color: white; user-select: none; }
        
        /* FONTO FANTÁSTICO ANIMADO */
        #bg-fantastic { 
            position: fixed; inset: 0; 
            background: linear-gradient(to bottom, #1e3c72, #2a5298, #70e1ff);
            z-index: -1;
        }
        .cloud { position: absolute; background: rgba(255,255,255,0.3); border-radius: 50%; filter: blur(20px); animation: moveCloud 30s linear infinite; }
        .island { position: absolute; width: 200px; height: 100px; background: #444; border-radius: 50% / 20%; box-shadow: inset 0 -20px 0 #222; animation: floatIsland 5s ease-in-out infinite; }

        /* INTRO Y MENÚS */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .fire-anim { font-size: 140px; animation: burn 0.2s infinite alternate; filter: drop-shadow(0 0 30px orange); }
        .logo-smash { font-size: 110px; color: #ff2200; display: none; text-shadow: 0 0 50px red; text-align: center; }
        .screen-crack { position: absolute; inset: 0; background: url('https://pngimg.com') center/cover; display: none; opacity: 0.8; pointer-events: none; }

        /* ESCENARIO BATTLEFIELD (Multiplataforma) */
        #stage-container { display: none; position: absolute; inset: 0; }
        #main-stage { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); width: 800px; height: 40px; background: #5c3d2e; border-bottom: 10px solid #221100; border-radius: 10px; }
        .plat { position: absolute; width: 180px; height: 15px; background: rgba(255,255,255,0.4); border-top: 5px solid gold; border-radius: 5px; box-shadow: 0 0 15px gold; }

        /* LUCHADORES (Basados en tu imagen) */
        .fighter { position: absolute; width: 90px; height: 120px; background-size: contain; background-repeat: no-repeat; bottom: 220px; z-index: 10; transition: transform 0.05s; }
        #ninja-p1 { background-image: url('https://ibb.co'); }
        #rival-ia { background-image: url('https://ibb.co'); filter: hue-rotate(180deg) brightness(0.7); transform: scaleX(-1); }

        /* HUD */
        #hud-smash { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; font-size: 45px; text-shadow: 3px 3px #000; }
        .perc { font-size: 85px; color: #ff0000; font-weight: 900; }

        /* ANIMACIONES */
        @keyframes moveCloud { from { left: -200px; } to { left: 100vw; } }
        @keyframes floatIsland { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes burn { from { transform: scale(1); } to { transform: scale(1.15); } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(15px,-15px); } 75% { transform: translate(-15px,15px); } }
    </style>
</head>
<body>

<div id="bg-fantastic">
    <!-- Nubes e Islas de fondo -->
    <div class="cloud" style="top:10%; width:300px; height:100px; animation-duration:40s"></div>
    <div class="cloud" style="top:40%; width:200px; height:80px; animation-duration:25s; opacity:0.5"></div>
    <div class="island" style="top:20%; left:15%"></div>
    <div class="island" style="top:35%; right:20%; animation-delay:1s"></div>
</div>

<div id="intro-screen">
    <div class="fire-anim">🔥</div>
    <div class="logo-smash" id="l-smash">SUPER NINJA<br><span style="font-size:150px">SMASH</span></div>
    <div class="screen-crack" id="glass-fx"></div>
    <p id="hint" style="font-size:30px; margin-top:50px">PULSA [ X ] PARA EL IMPACTO</p>
</div>

<div id="stage-container">
    <!-- Campo de Batalla -->
    <div id="main-stage"></div>
    <div class="plat" id="p-top" style="bottom: 500px; left: 50%; transform: translateX(-50%);"></div>
    <div class="plat" id="p-left" style="bottom: 350px; left: 35%;"></div>
    <div class="plat" id="p-right" style="bottom: 350px; right: 35%;"></div>

    <!-- Luchadores -->
    <div id="ninja-p1" class="fighter"></div>
    <div id="rival-ia" class="fighter"></div>

    <!-- HUD -->
    <div id="hud-smash">
        <div style="text-align:center">P1: <span id="p1-p" class="perc">0</span>% <br> STOCKS: <span id="p1-s">●●●</span></div>
        <div id="timer">20:00</div>
        <div style="text-align:center">IA: <span id="p2-p" class="perc">0</span>% <br> STOCKS: <span id="p2-s">●●●</span></div>
    </div>
</div>

<script>
    /** MOTOR FÍSICO SMASH AVANZADO **/
    let p1 = { x: 300, y: 0, vY: 0, vX: 0, dmg: 0, stocks: 3, jumps: 0 };
    let p2 = { x: 800, y: 0, vY: 0, vX: 0, dmg: 0, stocks: 3, jumps: 0 };
    let state = "INTRO";
    let timer = 1200;
    const input = {};

    window.onkeydown = e => {
        if(e.code === 'KeyX' && state === "INTRO") startIntro();
        input[e.code] = true;
    };
    window.onkeyup = e => input[e.code] = false;

    function startIntro() {
        state = "ANIMATING";
        document.querySelector('.fire-anim').style.display = 'none';
        document.getElementById('hint').style.display = 'none';
        document.getElementById('l-smash').style.display = 'block';
        setTimeout(() => {
            document.getElementById('glass-fx').style.display = 'block';
            document.body.style.animation = "shake 0.4s 4";
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('stage-container').style.display = 'block';
                state = "BATTLE";
                setInterval(countDown, 1000);
            }, 800);
        }, 900);
    }

    function loop() {
        if(state === "BATTLE") {
            // JUGADOR 1 (W A S D + ESPACIO)
            if(input['KeyA']) p1.vX = -10;
            else if(input['KeyD']) p1.vX = 10;
            else p1.vX *= 0.85;

            if(input['Space'] && p1.jumps < 2) { 
                p1.vY = 22; p1.jumps++; input['Space'] = false; 
            }

            // ATAQUE (K, M, E)
            if(input['KeyK'] || input['KeyM'] || input['KeyE']) {
                if(dist(p1, p2) < 120 && Math.abs(p1.y - p2.y) < 100) { hit(p1, p2); }
            }

            // IA INTELIGENTE (Battlefield Logic)
            const gap = p1.x - p2.x;
            const onStage = (p2.x > window.innerWidth/2 - 400 && p2.x < window.innerWidth/2 + 400);

            if (!onStage && p2.y < 0) { // RECUPERACIÓN IA
                p2.vX = (window.innerWidth/2 - p2.x) * 0.08;
                if(p2.jumps < 2 && p2.vY < 0) { p2.vY = 22; p2.jumps++; }
            } else { // PERSECUCIÓN
                if(Math.abs(gap) > 80) p2.vX = gap > 0 ? 5 : -5;
                else { p2.vX *= 0.8; if(Math.random() > 0.95) hit(p2, p1); }
            }

            physics(p1, 'ninja-p1');
            physics(p2, 'rival-ia');
        }
        requestAnimationFrame(loop);
    }

    function physics(obj, domId) {
        obj.x += obj.vX;
        obj.y += obj.vY;
        obj.vY -= 1.1; // Gravedad

        // Plataformas (Colisión)
        checkCol(obj, window.innerWidth/2 - 400, window.innerWidth/2 + 400, 0); // Suelo
        checkCol(obj, window.innerWidth/2 - 90, window.innerWidth/2 + 90, 320); // Top Plat
        checkCol(obj, window.innerWidth/2 - 300, window.innerWidth/2 - 120, 170); // Left Plat
        checkCol(obj, window.innerWidth/2 + 120, window.innerWidth/2 + 300, 170); // Right Plat

        // Ring Out (Explosión)
        if(obj.y < -500 || Math.abs(obj.x - window.innerWidth/2) > 900) {
            obj.stocks--;
            obj.dmg = 0;
            obj.y = 800; obj.x = window.innerWidth/2; obj.vY = 0;
            updateHUD();
            if(obj.stocks <= 0) { alert("¡FIN DE LA PARTIDA!"); location.reload(); }
        }

        const el = document.getElementById(domId);
        el.style.left = obj.x + "px";
        el.style.bottom = (180 + obj.y + 40) + "px";
    }

    function checkCol(obj, left, right, height) {
        if(obj.vY <= 0 && obj.x > left && obj.x < right && obj.y <= height && obj.y > height - 30) {
            obj.y = height; obj.vY = 0; obj.jumps = 0;
        }
    }

    function hit(atk, def) {
        def.dmg += 8;
        const dir = def.x > atk.x ? 1 : -1;
        def.vX = dir * (def.dmg * 0.5);
        def.vY = def.dmg * 0.2;
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('p1-p').innerText = p1.dmg;
        document.getElementById('p2-p').innerText = p2.dmg;
        document.getElementById('p1-s').innerText = "●".repeat(p1.stocks);
        document.getElementById('p2-s').innerText = "●".repeat(p2.stocks);
    }

    function countDown() {
        timer--;
        let m = Math.floor(timer/60), s = timer % 60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
    }

    function dist(a, b) { return Math.abs(a.x - b.x); }

    loop();
</script>
</body>
</html>
